<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0f1a; color: #f1f5f9;
    }
    .header {
      padding: 16px; border-bottom: 1px solid #2d3a4f;
      display: flex; align-items: center; gap: 10px;
    }
    .header .accent { width: 3px; height: 18px; background: linear-gradient(180deg,#f97316,#f59e0b); border-radius: 2px; }
    .header h1 { font-size: 14px; font-weight: 700; }
    .section { padding: 14px 16px; border-bottom: 1px solid #2d3a4f; }
    .section-title { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }

    .toggle-row { display: flex; justify-content: space-between; align-items: center; }
    .toggle-label { font-size: 13px; font-weight: 600; }
    .toggle {
      width: 40px; height: 22px; border-radius: 11px; background: #2d3a4f;
      position: relative; cursor: pointer; transition: background .2s;
    }
    .toggle.on { background: #22c55e; }
    .toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; transition: transform .2s;
    }
    .toggle.on::after { transform: translateX(18px); }

    .input-group { margin-bottom: 10px; }
    .input-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
    .input-group input {
      width: 100%; padding: 8px 10px; background: #1a2234; border: 1px solid #2d3a4f;
      border-radius: 6px; color: #f1f5f9; font-size: 12px; font-family: monospace;
    }
    .input-group input:focus { outline: none; border-color: #f97316; }

    .save-btn {
      width: 100%; padding: 10px; border: none; border-radius: 6px;
      background: linear-gradient(135deg,#f97316,#f59e0b);
      color: #fff; font-size: 12px; font-weight: 700; cursor: pointer;
    }
    .save-btn:active { opacity: .8; }

    .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
    .stat-label { color: #94a3b8; }
    .stat-value { font-family: monospace; font-weight: 600; }
    .stat-value.ok { color: #22c55e; }
    .stat-value.warn { color: #f59e0b; }
    .stat-value.err { color: #ef4444; }

    .status-dot {
      width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px;
    }
    .status-dot.ok { background: #22c55e; }
    .status-dot.err { background: #ef4444; }

    .clear-btn {
      width: 100%; margin-top: 8px; padding: 7px; border: 1px solid #2d3a4f;
      background: transparent; border-radius: 6px; color: #94a3b8;
      font-size: 11px; cursor: pointer;
    }
    .clear-btn:hover { border-color: #ef4444; color: #ef4444; }

    .msg { padding: 8px 16px; font-size: 11px; text-align: center; }
    .msg.ok { color: #22c55e; }
    .msg.err { color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <span class="accent"></span>
    <h1>HE Swiggy AutoPush</h1>
  </div>

  <div class="section">
    <div class="toggle-row">
      <span class="toggle-label">Auto-Push Enabled</span>
      <div class="toggle" id="toggleEnabled" onclick="toggleEnabled()"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Configuration</div>
    <div class="input-group">
      <label>Dashboard API Key</label>
      <input type="text" id="apiKeyInput" placeholder="Enter DASHBOARD_API_KEY" spellcheck="false">
    </div>
    <button class="save-btn" onclick="saveConfig()">Save & Connect</button>
    <div class="msg" id="saveMsg"></div>
  </div>

  <div class="section">
    <div class="section-title">Status</div>
    <div class="stat-row">
      <span class="stat-label">Extension</span>
      <span class="stat-value" id="statEnabled">--</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">API Connection</span>
      <span class="stat-value" id="statConnected">--</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Odoo Products</span>
      <span class="stat-value" id="statProducts">--</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Interceptor</span>
      <span class="stat-value" id="statInterceptor">--</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Orders Pushed</span>
      <span class="stat-value" id="statPushed">--</span>
    </div>
    <button class="clear-btn" onclick="clearPushed()">Clear Pushed History</button>
  </div>

  <script>
    let currentEnabled = false;

    function $(id) { return document.getElementById(id); }

    // Load saved config
    chrome.storage.local.get(['apiKey', 'enabled'], result => {
      $('apiKeyInput').value = result.apiKey || '';
      currentEnabled = result.enabled !== false;
      updateToggle();
      refreshStatus();
    });

    function toggleEnabled() {
      currentEnabled = !currentEnabled;
      chrome.storage.local.set({ enabled: currentEnabled });
      updateToggle();
      notifyContentScript();
    }

    function updateToggle() {
      const el = $('toggleEnabled');
      el.className = 'toggle' + (currentEnabled ? ' on' : '');
    }

    function saveConfig() {
      const key = $('apiKeyInput').value.trim();
      if (!key) {
        $('saveMsg').textContent = 'Enter an API key';
        $('saveMsg').className = 'msg err';
        return;
      }
      chrome.storage.local.set({ apiKey: key, enabled: true }, () => {
        currentEnabled = true;
        updateToggle();
        $('saveMsg').textContent = 'Saved! Refresh Swiggy tab.';
        $('saveMsg').className = 'msg ok';
        notifyContentScript();
        setTimeout(() => { $('saveMsg').textContent = ''; }, 2000);
      });
    }

    function notifyContentScript() {
      chrome.tabs.query({ url: 'https://partner.swiggy.com/*' }, tabs => {
        const key = $('apiKeyInput').value.trim();
        for (const tab of tabs) {
          chrome.tabs.sendMessage(tab.id, {
            type: 'CONFIG_UPDATE',
            apiKey: key,
            enabled: currentEnabled,
          }).catch(() => {});
        }
      });
      setTimeout(refreshStatus, 500);
    }

    function refreshStatus() {
      chrome.tabs.query({ url: 'https://partner.swiggy.com/*' }, tabs => {
        if (tabs.length === 0) {
          $('statEnabled').textContent = 'No Swiggy tab';
          $('statEnabled').className = 'stat-value warn';
          return;
        }
        chrome.tabs.sendMessage(tabs[0].id, { type: 'GET_STATUS' }, response => {
          if (chrome.runtime.lastError || !response) {
            $('statEnabled').textContent = 'Not injected';
            $('statEnabled').className = 'stat-value err';
            return;
          }
          $('statEnabled').innerHTML = '<span class="status-dot ' + (response.enabled ? 'ok' : 'err') + '"></span>' + (response.enabled ? 'Active' : 'Paused');
          $('statEnabled').className = 'stat-value';
          $('statConnected').innerHTML = '<span class="status-dot ' + (response.connected ? 'ok' : 'err') + '"></span>' + (response.connected ? 'Connected' : 'No Key');
          $('statConnected').className = 'stat-value';
          $('statProducts').textContent = response.productsLoaded || 0;
          $('statProducts').className = 'stat-value ' + (response.productsLoaded > 0 ? 'ok' : 'warn');
          $('statInterceptor').innerHTML = '<span class="status-dot ' + (response.interceptorActive ? 'ok' : 'err') + '"></span>' + (response.interceptorActive ? 'Active' : 'Inactive');
          $('statInterceptor').className = 'stat-value';
          $('statPushed').textContent = response.pushedCount || 0;
          $('statPushed').className = 'stat-value ok';
        });
      });
    }

    function clearPushed() {
      chrome.tabs.query({ url: 'https://partner.swiggy.com/*' }, tabs => {
        for (const tab of tabs) {
          chrome.tabs.sendMessage(tab.id, { type: 'CLEAR_PUSHED' }).catch(() => {});
        }
      });
      chrome.storage.local.set({ pushedOrders: [] });
      setTimeout(refreshStatus, 300);
    }

    // Auto-refresh status every 3s while popup is open
    setInterval(refreshStatus, 3000);
  </script>
</body>
</html>
