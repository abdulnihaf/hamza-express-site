<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HE Waiter</title>
  <link rel="manifest" href="/ops/waiter/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0f1a;--bg2:#111827;--card:#1a2234;--border:#2d3a4f;--text:#f1f5f9;--text2:#94a3b8;--green:#22c55e;--green-dim:rgba(34,197,94,.12);--red:#ef4444;--red-dim:rgba(239,68,68,.12);--blue:#3b82f6;--blue-dim:rgba(59,130,246,.12);--purple:#a855f7;--yellow:#eab308;--yellow-dim:rgba(234,179,8,.12);--orange:#f97316;--orange-dim:rgba(249,115,22,.12);--amber:#f59e0b;--amber-dim:rgba(245,158,11,.12)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;-webkit-tap-highlight-color:transparent}
    .mono{font-family:'JetBrains Mono',monospace}

    /* Header */
    .header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
    .header h1{font-size:16px;display:flex;align-items:center;gap:8px}
    .header h1 .accent{width:4px;height:20px;background:var(--green);border-radius:2px}
    .header-right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
    .icon-btn:active{background:var(--border)}
    .conn-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
    .conn-dot.offline{background:var(--red);animation:blink 1s infinite}
    @keyframes blink{50%{opacity:.3}}

    /* Tabs */
    .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:99}
    .tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
    .tab.active{color:var(--green);border-bottom-color:var(--green)}
    .tab .badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;background:var(--green);color:#000;border-radius:9px;font-size:11px;font-weight:700;margin-left:4px;padding:0 5px}
    .tab .badge.urgent{background:var(--red);color:#fff}
    .tab .badge.blue{background:var(--blue);color:#fff}

    /* Screens */
    .screen{display:none;padding:16px;max-width:600px;margin:0 auto;padding-bottom:100px}
    .screen.active{display:block}

    /* PIN Screen */
    #pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:20px}
    #pin-screen .pin-title{font-size:22px;font-weight:700;margin-bottom:6px}
    #pin-screen .pin-sub{color:var(--text2);font-size:14px;margin-bottom:30px}
    .pin-dots{display:flex;gap:12px;margin-bottom:30px}
    .pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
    .pin-dot.filled{background:var(--green);border-color:var(--green)}
    .pin-dot.error{background:var(--red);border-color:var(--red)}
    .pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:10px}
    .pin-key{width:72px;height:56px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:22px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
    .pin-key:active{background:var(--border)}
    .pin-key.del{font-size:14px;color:var(--text2)}

    /* Shift Screen */
    #shift-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:20px}
    .shift-greeting{font-size:24px;font-weight:700;margin-bottom:8px}
    .shift-sub{color:var(--text2);font-size:15px;margin-bottom:40px;text-align:center}
    .shift-btn{width:200px;height:200px;border-radius:50%;border:3px solid var(--green);background:var(--green-dim);color:var(--green);font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
    .shift-btn:active{transform:scale(.95);background:var(--green);color:#000}
    .shift-btn .shift-icon{font-size:48px}
    .shift-btn.end{border-color:var(--red);color:var(--red);background:var(--red-dim)}
    .shift-btn.end:active{background:var(--red);color:#fff}
    .shift-time{color:var(--text2);font-size:13px;margin-top:16px}
    .shift-logout{color:var(--text2);font-size:13px;cursor:pointer;margin-top:20px;text-decoration:underline}

    /* Status summary bar */
    .status-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .stat-chip{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;flex-shrink:0;text-align:center}
    .stat-chip .num{font-size:20px;font-weight:700}
    .stat-chip .label{font-size:10px;color:var(--text2);margin-top:2px}
    .stat-chip.orange .num{color:var(--orange)}
    .stat-chip.green .num{color:var(--green)}
    .stat-chip.blue .num{color:var(--blue)}

    /* ── Table card (one per table) ── */
    .table-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden}
    .table-card-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 10px;border-bottom:1px solid var(--border)}
    .table-card-header .tbl{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
    .table-card-header .ord{font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace}
    .table-card-body{padding:6px 0}

    /* Serving timer in header */
    .serve-timer{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;padding:2px 8px;border-radius:6px}
    .serve-timer.green{color:var(--green);background:var(--green-dim)}
    .serve-timer.yellow{color:var(--yellow);background:var(--yellow-dim)}
    .serve-timer.red{color:var(--red);background:var(--red-dim);animation:pulse 1s infinite}
    @keyframes pulse{50%{opacity:.6}}

    /* Station section inside table card */
    .station-section{padding:0 14px 8px}
    .station-section:last-child{padding-bottom:12px}
    .station-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:6px 0 4px;display:flex;align-items:center;gap:6px}
    .station-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

    /* Item row inside station */
    .stn-item{display:flex;justify-content:space-between;align-items:center;padding:7px 8px;margin:3px 0;border-radius:8px;background:var(--bg2);border:1px solid transparent}
    .stn-item .item-name{font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .stn-item .item-status{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 7px;border-radius:4px;flex-shrink:0;margin-left:8px}

    /* Strikethrough states (at_counter and beyond) */
    .stn-item.struck .item-name{text-decoration:line-through;color:var(--text2)}
    .stn-item.struck{border-color:var(--border)}
    .stn-item.collected .item-name{text-decoration:line-through;color:var(--blue);opacity:.6}
    .stn-item.served-item .item-name{text-decoration:line-through;color:var(--text2);opacity:.35}
    .stn-item.served-item .item-status{opacity:.35}

    /* Status colors */
    .st-cooking{color:var(--orange);background:var(--orange-dim)}
    .st-ready{color:var(--amber);background:var(--amber-dim)}
    .st-done{color:var(--green);background:var(--green-dim)}
    .st-collected{color:var(--blue);background:var(--blue-dim)}
    .st-served{color:var(--text2);background:var(--bg)}

    /* Table card action buttons */
    .table-serve-btn{width:calc(100% - 28px);margin:4px 14px 12px;padding:14px;background:var(--green);color:#000;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
    .table-serve-btn:active{opacity:.8;transform:scale(.98)}
    .table-accept-btn{width:calc(100% - 28px);margin:4px 14px 12px;padding:16px;background:var(--orange);color:#000;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;animation:acceptPulse 2s infinite}
    .table-accept-btn:active{opacity:.8;transform:scale(.98)}
    @keyframes acceptPulse{0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,.4)}50%{box-shadow:0 0 0 8px rgba(249,115,22,0)}}
    .table-card.new-order{border-color:var(--orange);border-width:2px}

    /* Deliver cards */
    .deliver-card{background:var(--card);border:2px solid var(--blue);border-radius:14px;padding:16px;margin-bottom:12px}
    .deliver-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .deliver-table{font-size:22px;font-weight:700}
    .deliver-count{font-size:14px;color:var(--text2)}
    .deliver-items{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
    .deliver-item{font-size:12px;padding:4px 8px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);color:var(--text)}
    .served-btn{width:100%;padding:16px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
    .served-btn:active{opacity:.8;transform:scale(.98)}

    /* ── New Order Alert Overlay ── */
    .alert-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:alertPulse 1s infinite}
    @keyframes alertPulse{0%,100%{border:4px solid var(--orange)}50%{border:4px solid transparent}}
    .alert-overlay .alert-title{font-size:32px;font-weight:700;color:var(--orange);margin-bottom:12px;text-align:center}
    .alert-overlay .alert-detail{font-size:18px;color:var(--text);margin-bottom:8px;text-align:center}
    .alert-overlay .alert-items{font-size:14px;color:var(--text2);margin-bottom:32px;text-align:center}
    .alert-overlay .alert-dismiss{width:80%;max-width:320px;padding:20px;background:var(--orange);color:#000;border:none;border-radius:16px;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit}
    .alert-overlay .alert-dismiss:active{opacity:.8;transform:scale(.97)}

    /* ── Item ready toast (top bar) ── */
    .ready-toast{position:fixed;top:0;left:0;right:0;background:var(--green);color:#000;padding:10px 16px;font-size:14px;font-weight:600;z-index:400;transform:translateY(-100%);transition:transform .3s;text-align:center}
    .ready-toast.show{transform:translateY(0)}

    /* Empty */
    .empty-state{text-align:center;padding:40px 20px}
    .empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.5}
    .empty-state p{color:var(--text2);font-size:14px}

    /* Toast */
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1}
    .toast.error{border-color:var(--red);color:var(--red)}
    .toast.success{border-color:var(--green);color:var(--green)}
  </style>
  <script src="/ops/setup-wizard.js"></script>
</head>
<body>

<!-- PIN Screen -->
<div id="pin-screen">
  <a href="/ops/" style="color:var(--text2);font-size:13px;text-decoration:none;margin-bottom:16px;display:inline-flex;align-items:center;gap:4px">&larr; Back to Hub</a>
  <div class="pin-title">Waiter Login</div>
  <div class="pin-sub">Enter your 4-digit PIN</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-pad" id="pin-pad">
    <button class="pin-key" data-key="1">1</button>
    <button class="pin-key" data-key="2">2</button>
    <button class="pin-key" data-key="3">3</button>
    <button class="pin-key" data-key="4">4</button>
    <button class="pin-key" data-key="5">5</button>
    <button class="pin-key" data-key="6">6</button>
    <button class="pin-key" data-key="7">7</button>
    <button class="pin-key" data-key="8">8</button>
    <button class="pin-key" data-key="9">9</button>
    <button class="pin-key" style="visibility:hidden"></button>
    <button class="pin-key" data-key="0">0</button>
    <button class="pin-key del" data-key="del">DEL</button>
  </div>
</div>

<!-- Shift Screen -->
<div id="shift-screen">
  <div class="shift-greeting" id="shift-greeting">Hello!</div>
  <div class="shift-sub">Tap the button to start your shift<br>and begin receiving orders</div>
  <button class="shift-btn" id="shift-btn" onclick="toggleShift()">
    <span class="shift-icon">&#x25B6;</span>
    Start Shift
  </button>
  <div class="shift-time" id="shift-time"></div>
  <div class="shift-logout" onclick="logout()">Logout</div>
</div>

<!-- Main App -->
<div id="app" style="display:none">
  <div class="header">
    <h1><span class="accent"></span>Waiter</h1>
    <div class="header-right">
      <span id="staff-name" style="font-size:13px;color:var(--text2)"></span>
      <div class="conn-dot" id="conn-dot"></div>
      <button class="icon-btn" onclick="refresh()" title="Refresh">&#x21bb;</button>
      <button class="icon-btn" onclick="showEndShift()" title="End Shift" style="color:var(--red)">&#x23F9;</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="tables" onclick="switchTab('tables')">All Tables<span class="badge" id="tables-badge" style="display:none">0</span></div>
    <div class="tab" data-tab="deliver" onclick="switchTab('deliver')">Deliver<span class="badge blue" id="deliver-badge" style="display:none">0</span></div>
  </div>

  <!-- All Tables Screen -->
  <div class="screen active" id="screen-tables">
    <div id="tables-content"></div>
  </div>

  <!-- Deliver Screen -->
  <div class="screen" id="screen-deliver">
    <div id="deliver-content"></div>
  </div>
</div>

<!-- New order alert overlay (hidden) -->
<div id="alert-overlay" style="display:none"></div>

<!-- Item ready toast (top bar) -->
<div class="ready-toast" id="ready-toast"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API_BASE = '/api/whatsapp';
// Auto-login from hub token if available
let token = localStorage.getItem('floor_waiter_token') || localStorage.getItem('floor_hub_token') || '';
let staffInfo = JSON.parse(localStorage.getItem('floor_waiter_staff') || localStorage.getItem('floor_hub_staff') || 'null');
// Block if staff doesn't have waiter access
if (staffInfo && !staffInfo.can_waiter) { window.location.href = '/ops/'; }
// Sync hub token to waiter-specific storage
if (!localStorage.getItem('floor_waiter_token') && localStorage.getItem('floor_hub_token') && staffInfo?.can_waiter) {
  localStorage.setItem('floor_waiter_token', localStorage.getItem('floor_hub_token'));
  localStorage.setItem('floor_waiter_staff', localStorage.getItem('floor_hub_staff'));
}
let myData = null;
let knownOrderIds = new Set();
let prevAtCounterIds = new Set();
let prevReadyCount = 0;
let pollInterval = null;
let timerInterval = null;
let currentTab = 'tables';
let firstLoad = true;

// ── Audio: Web Audio API alarm ──
let audioCtx = null;
let activeAlarm = null;
let alarmTimeout = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function startAlarm() {
  if (!audioCtx) return null;
  // Stop any existing alarm first (idempotency)
  stopAlarm();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.value = 800;
  const now = audioCtx.currentTime;
  // Pulse: 200ms on, 200ms off, for 20 seconds
  for (let i = 0; i < 50; i++) {
    gain.gain.setValueAtTime(0.4, now + i * 0.4);
    gain.gain.setValueAtTime(0, now + i * 0.4 + 0.2);
  }
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(now + 20);
  // Auto-dismiss overlay after 20s if user doesn't tap
  alarmTimeout = setTimeout(() => { dismissAlert(); }, 20000);
  return { stop: () => { try { osc.stop(); } catch(e) {} } };
}

function stopAlarm() {
  if (activeAlarm) { activeAlarm.stop(); activeAlarm = null; }
  if (alarmTimeout) { clearTimeout(alarmTimeout); alarmTimeout = null; }
}

// ── Counter display names & colors ──
const COUNTER_DISPLAY = { 'Kitchen Pass': 'Kitchen Counter', 'Bain Marie': 'Bain Marie Counter' };
const COUNTER_COLOR = { 'Kitchen Pass': 'amber', 'Bain Marie': 'blue', 'Juice Counter': 'green', 'Shawarma Counter': 'orange', 'Grill Counter': 'red' };
const COUNTER_ORDER = ['Kitchen Pass', 'Bain Marie', 'Juice Counter', 'Shawarma Counter', 'Grill Counter'];

function getStatusLabel(counter, status) {
  if (status === 'cooking')    return 'Preparing';
  if (status === 'at_counter') return counter === 'Bain Marie' ? 'Prepared' : 'Ready';
  if (status === 'picked_up')  return 'Collected';
  if (status === 'delivered')  return 'Served';
  return status;
}

function getStatusClass(status) {
  switch (status) {
    case 'cooking':    return 'st-cooking';
    case 'cooked':     return 'st-ready';
    case 'at_counter': return 'st-done';
    case 'picked_up':  return 'st-collected';
    case 'delivered':  return 'st-served';
    default:           return '';
  }
}

// ── Timer helpers ──
function elapsedSince(isoStr) {
  if (!isoStr) return { min: 0, sec: 0, total: 0 };
  const ms = Date.now() - new Date(isoStr).getTime();
  const total = Math.max(0, Math.floor(ms / 1000));
  return { min: Math.floor(total / 60), sec: total % 60, total };
}

function formatTimer(min, sec) {
  return String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function timerClass(totalSec) {
  if (totalSec < 300) return 'green';   // < 5 min
  if (totalSec < 600) return 'yellow';  // 5-10 min
  return 'red';                          // > 10 min
}

// ── Toast ──
function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2500);
}

function showReadyToast(msg) {
  const el = document.getElementById('ready-toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Vibrate ──
function vibrate(pattern) { try { navigator.vibrate && navigator.vibrate(pattern); } catch(e) {} }

// ── API helper ──
async function api(action, method = 'GET', body = null) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + token } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  try {
    const res = await fetch(`${API_BASE}?action=${action}`, opts);
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 401) { toast('Session expired', 'error'); setTimeout(logout, 1500); throw new Error('Session expired'); }
      throw new Error(data.error || 'Request failed');
    }
    document.getElementById('conn-dot').className = 'conn-dot';
    return data;
  } catch (e) {
    if (e.message !== 'Session expired') {
      const dot = document.getElementById('conn-dot');
      if (dot) dot.className = 'conn-dot offline';
    }
    throw e;
  }
}

// ── PIN Login ──
let pinBuffer = '';
document.getElementById('pin-pad').addEventListener('click', async (e) => {
  const key = e.target.closest('.pin-key')?.dataset.key;
  if (!key) return;

  if (key === 'del') { pinBuffer = pinBuffer.slice(0, -1); }
  else if (pinBuffer.length < 4) { pinBuffer += key; }

  document.querySelectorAll('#pin-dots .pin-dot').forEach((d, i) => {
    d.className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
  });

  if (pinBuffer.length === 4) {
    try {
      const data = await fetch(`${API_BASE}?action=floor-login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin: pinBuffer })
      }).then(r => r.json());

      if (data.error) throw new Error(data.error);
      if (!data.can_waiter) throw new Error('Waiter access required');

      // Init audio on user interaction (browser requirement)
      initAudio();

      token = data.token;
      staffInfo = data;
      localStorage.setItem('floor_waiter_token', token);
      localStorage.setItem('floor_waiter_staff', JSON.stringify(data));
      afterLogin();
    } catch (e) {
      document.querySelectorAll('#pin-dots .pin-dot').forEach(d => d.className = 'pin-dot error');
      toast(e.message, 'error');
      setTimeout(() => {
        pinBuffer = '';
        document.querySelectorAll('#pin-dots .pin-dot').forEach(d => d.className = 'pin-dot');
      }, 800);
    }
  }
});

// ── Web Push Notifications ──
const VAPID_PUBLIC_KEY = 'BPpmu5i8gica_zlVUgKHD7Tk81biJSviatNFuL23Y66htjsjYtly4sHm_y-e9wOloubbbeH0DxCll6P_RjtYi1w';
function urlBase64ToUint8Array(base64String) {
  const p = base64String.replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(p + '='.repeat((4 - p.length % 4) % 4));
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}
function isNativeApp() {
  return !!(window.HENative || window.nativeFcmToken || (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()));
}
async function sendFcmTokenToServer(fcmToken) {
  if (!fcmToken) return;
  await api('floor-push-subscribe', 'POST', { fcm_token: fcmToken, platform: 'native' });
  if (window.HENative) window.HENative.setAuthInfo(token, staffInfo?.staff_id || '');
  console.log('FCM token sent to server');
}
async function setupPush() {
  try {
    // Native app: FCM token injected by MainActivity.java
    if (isNativeApp()) {
      // Try getting token immediately
      let fcmToken = window.nativeFcmToken || (window.HENative && window.HENative.getFcmToken()) || '';
      if (fcmToken) { await sendFcmTokenToServer(fcmToken); return; }
      // Token not ready — listen for event + poll with retries
      window.addEventListener('fcmTokenReady', (e) => sendFcmTokenToServer(e.detail), { once: true });
      // Also retry a few times (token fetch is async in Java)
      for (let i = 0; i < 10; i++) {
        await new Promise(r => setTimeout(r, 1000));
        fcmToken = window.nativeFcmToken || (window.HENative && window.HENative.getFcmToken()) || '';
        if (fcmToken) { await sendFcmTokenToServer(fcmToken); return; }
      }
      console.warn('FCM token not available after retries');
      return;
    }
    // Browser/PWA: use Web Push (VAPID)
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    const reg = await navigator.serviceWorker.register('/sw.js');
    await navigator.serviceWorker.ready;
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') return;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    await api('floor-push-subscribe', 'POST', { subscription: sub.toJSON() });
  } catch (e) { console.warn('Push setup failed:', e); }
}
async function teardownPush() {
  try {
    if (!('serviceWorker' in navigator)) return;
    const reg = await navigator.serviceWorker.getRegistration('/sw.js');
    if (!reg) return;
    const sub = await reg.pushManager.getSubscription();
    if (sub) await sub.unsubscribe();
    api('floor-push-unsubscribe', 'POST').catch(() => {});
  } catch (e) { /* best effort */ }
}

function logout() {
  teardownPush();
  token = '';
  staffInfo = null;
  localStorage.removeItem('floor_waiter_token');
  localStorage.removeItem('floor_waiter_staff');
  localStorage.removeItem('floor_hub_token');
  localStorage.removeItem('floor_hub_staff');
  clearInterval(pollInterval);
  clearInterval(timerInterval);
  stopAlarm();
  // Redirect to hub instead of showing local PIN screen
  window.location.href = '/ops/';
  return;
  pinBuffer = '';
  document.querySelectorAll('#pin-dots .pin-dot').forEach(d => d.className = 'pin-dot');
}

function afterLogin() {
  document.getElementById('pin-screen').style.display = 'none';
  if (staffInfo.on_shift) { enterApp(); } else { showShiftScreen(); }
}

function showShiftScreen() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('shift-screen').style.display = 'flex';
  document.getElementById('shift-greeting').textContent = `Hello, ${staffInfo.name}!`;
  document.getElementById('shift-time').textContent = '';
  const btn = document.getElementById('shift-btn');
  btn.className = 'shift-btn';
  btn.innerHTML = '<span class="shift-icon">&#x25B6;</span>Start Shift';
}

async function toggleShift() {
  try {
    initAudio(); // ensure audio ready on tap
    await api('floor-start-shift', 'POST');
    staffInfo.on_shift = true;
    localStorage.setItem('floor_waiter_staff', JSON.stringify(staffInfo));
    vibrate([200]);
    toast('Shift started!');
    setupPush();
    enterApp();
  } catch (e) { toast(e.message, 'error'); }
}

function showEndShift() {
  if (confirm('End your shift?')) endShift();
}

async function endShift() {
  try {
    teardownPush();
    await api('floor-end-shift', 'POST');
    staffInfo.on_shift = false;
    localStorage.setItem('floor_waiter_staff', JSON.stringify(staffInfo));
    clearInterval(pollInterval);
    clearInterval(timerInterval);
    stopAlarm();
    vibrate([100]);
    toast('Shift ended');
    showShiftScreen();
  } catch (e) { toast(e.message, 'error'); }
}

function enterApp() {
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('shift-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('staff-name').textContent = staffInfo.name;
  firstLoad = true;
  refresh();
  pollInterval = setInterval(refresh, 2000);
  // Update timers every second
  timerInterval = setInterval(updateTimers, 1000);
  // Setup wizard — auto-request permissions + device-specific guide
  if (window.SetupWizard) SetupWizard.init({
    apiBase: API_BASE, token, vapidPublicKey: VAPID_PUBLIC_KEY,
    setupPush, appName: 'HE Waiter', storagePrefix: 'floor_waiter'
  });
}

// ── Stop polling when tab is hidden, resume on return ──
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    clearInterval(pollInterval);
    clearInterval(timerInterval);
  } else if (token && staffInfo?.on_shift) {
    refresh();
    pollInterval = setInterval(refresh, 2000);
    timerInterval = setInterval(updateTimers, 1000);
  }
});

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
}

// ── Main refresh (single atomic call — polls Odoo + returns data) ──
let refreshLock = false;
async function refresh() {
  if (refreshLock) return; // prevent concurrent refreshes
  try {
    myData = await api('floor-live');
    if (myData._poll?.odoo_error) toast('Odoo sync issue — data may be stale', 'error');
    renderTables();
    renderDeliver();
    checkNotifications();
    firstLoad = false;
  } catch (e) { console.error('Refresh error:', e); }
}

// ── Notifications: new orders + item status changes ──
function checkNotifications() {
  if (!myData) return;

  // 1. Detect NEW orders (not seen before)
  const currentOrderIds = new Set(myData.orders.map(o => o.id));
  if (!firstLoad) {
    const newOrders = [];
    for (const o of myData.orders) {
      if (!knownOrderIds.has(o.id)) newOrders.push(o);
    }
    if (newOrders.length > 0) {
      // LOUD alarm + overlay
      activeAlarm = startAlarm();
      vibrate([500, 200, 500, 200, 500]);
      showNewOrderAlert(newOrders);
    }
  }
  knownOrderIds = currentOrderIds;

  // 2. Detect new items at counter
  const currentAtCounter = new Set();
  let newReadyItems = 0;
  for (const order of myData.orders) {
    for (const item of (order.items || [])) {
      if (item.status === 'at_counter') {
        currentAtCounter.add(item.id);
        if (!prevAtCounterIds.has(item.id) && !firstLoad) newReadyItems++;
      }
    }
  }
  if (newReadyItems > 0) {
    vibrate([300, 100, 300, 100, 300]);
    showReadyToast(`${newReadyItems} item${newReadyItems > 1 ? 's' : ''} ready at counter`);
  }
  prevAtCounterIds = currentAtCounter;

  // 3. Detect new items cooked (status change)
  const currentReady = myData.ready_count || 0;
  if (currentReady > prevReadyCount && !firstLoad && prevReadyCount > 0) {
    vibrate([100, 50, 100]);
  }
  prevReadyCount = currentReady;
}

// ── New Order Alert Overlay ──
function showNewOrderAlert(orders) {
  const overlay = document.getElementById('alert-overlay');
  const totalItems = orders.reduce((s, o) => s + (o.items?.length || 0), 0);
  const tables = orders.map(o => o.table_number || '?').join(', ');

  overlay.innerHTML = `
    <div class="alert-overlay" onclick="dismissAlert()">
      <div class="alert-title">NEW ORDER</div>
      <div class="alert-detail">Table ${tables}</div>
      <div class="alert-items">${totalItems} item${totalItems !== 1 ? 's' : ''}</div>
      <button class="alert-dismiss" onclick="dismissAlert()">TAP TO ACKNOWLEDGE</button>
    </div>
  `;
  overlay.style.display = 'block';
}

function dismissAlert() {
  document.getElementById('alert-overlay').style.display = 'none';
  stopAlarm();
  if (navigator.vibrate) navigator.vibrate(0); // stop vibration
}

// ── Update timers every second (without re-fetching) ──
function updateTimers() {
  document.querySelectorAll('[data-timer-from]').forEach(el => {
    const from = el.dataset.timerFrom;
    const e = elapsedSince(from);
    el.textContent = formatTimer(e.min, e.sec);
    el.className = 'serve-timer ' + timerClass(e.total);
  });
}

// ── All Tables Screen ──
function renderTables() {
  const d = myData;
  if (!d) return;

  // Group orders by table_number
  const tableMap = {};
  for (const o of d.orders) {
    const tbl = o.table_number || 'none';
    if (!tableMap[tbl]) tableMap[tbl] = { table_number: o.table_number, orders: [], allItems: [], earliest_created: o.created_at };
    tableMap[tbl].orders.push(o);
    if (o.created_at < tableMap[tbl].earliest_created) tableMap[tbl].earliest_created = o.created_at;
    for (const item of (o.items || [])) tableMap[tbl].allItems.push(item);
  }
  const tables = Object.values(tableMap);

  // Badges
  const tBadge = document.getElementById('tables-badge');
  if (tables.length > 0) { tBadge.style.display = ''; tBadge.textContent = tables.length; }
  else { tBadge.style.display = 'none'; }

  const dBadge = document.getElementById('deliver-badge');
  const deliverCount = d.deliver_batches.reduce((s, b) => s + b.item_count, 0);
  if (deliverCount > 0) { dBadge.style.display = ''; dBadge.textContent = deliverCount; }
  else { dBadge.style.display = 'none'; }

  const div = document.getElementById('tables-content');
  if (tables.length === 0) {
    div.innerHTML = '<div class="empty-state"><div class="icon">&#x2615;</div><p>No active tables</p><p style="margin-top:8px;font-size:12px;color:var(--text2)">New orders will appear here automatically</p></div>';
    return;
  }

  // Status summary bar
  let html = '<div class="status-bar">';
  html += `<div class="stat-chip orange"><div class="num">${d.cooking_count}</div><div class="label">Preparing</div></div>`;
  html += `<div class="stat-chip green"><div class="num">${d.ready_count}</div><div class="label">Ready</div></div>`;
  html += `<div class="stat-chip blue"><div class="num">${d.picked_up_count}</div><div class="label">Collected</div></div>`;
  html += '</div>';

  html += tables.map(tbl => {
    const items = tbl.allItems;
    const orderNames = tbl.orders.map(o => o.odoo_order_name).filter(Boolean).join(', ');
    const e = elapsedSince(tbl.earliest_created);
    const tc = timerClass(e.total);

    // Determine order state for action buttons
    const needsAccept = tbl.orders.some(o => o.status === 'new' || o.status === 'assigned');
    const isInProgress = tbl.orders.some(o => o.status === 'in_progress');
    const firstOrderId = tbl.orders[0]?.id;

    // Group items by counter
    const byCounter = {};
    for (const item of items) {
      const counter = item.counter || 'Other';
      if (!byCounter[counter]) byCounter[counter] = [];
      byCounter[counter].push(item);
    }

    let card = `<div class="table-card${needsAccept ? ' new-order' : ''}">`;
    card += `<div class="table-card-header">
      <span class="tbl">${tbl.table_number ? 'Table ' + tbl.table_number : 'No Table'}
        <span class="serve-timer ${tc}" data-timer-from="${tbl.earliest_created}">${formatTimer(e.min, e.sec)}</span>
      </span>
      <span class="ord">${orderNames}</span>
    </div>`;
    card += '<div class="table-card-body">';

    const rendered = new Set();
    for (const counterKey of COUNTER_ORDER) {
      if (!byCounter[counterKey]) continue;
      card += renderStation(counterKey, byCounter[counterKey]);
      rendered.add(counterKey);
    }
    for (const counterKey of Object.keys(byCounter)) {
      if (rendered.has(counterKey)) continue;
      card += renderStation(counterKey, byCounter[counterKey]);
    }

    card += '</div>';

    // Action buttons: ACCEPT for new/assigned, SERVED for in_progress
    if (needsAccept) {
      const orderIds = tbl.orders.filter(o => o.status === 'new' || o.status === 'assigned').map(o => o.id);
      card += `<button class="table-accept-btn" onclick="acceptOrders([${orderIds.join(',')}])">ACCEPT ORDER</button>`;
    } else if (isInProgress) {
      const orderIds = tbl.orders.filter(o => o.status === 'in_progress').map(o => o.id);
      card += `<button class="table-serve-btn" onclick="serveOrders([${orderIds.join(',')}])">&#x2713; SERVED</button>`;
    }

    card += '</div>';
    return card;
  }).join('');

  div.innerHTML = html;
}

function renderStation(counterKey, items) {
  const displayName = COUNTER_DISPLAY[counterKey] || counterKey;
  const color = COUNTER_COLOR[counterKey] || 'text2';

  let html = '<div class="station-section">';
  html += `<div class="station-label" style="color:var(--${color})"><span class="station-dot" style="background:var(--${color})"></span>${displayName}</div>`;

  for (const item of items) {
    const isStruck = item.status === 'at_counter' || item.status === 'picked_up' || item.status === 'delivered';
    const isCollected = item.status === 'picked_up';
    const isServed = item.status === 'delivered';
    const label = getStatusLabel(counterKey, item.status);
    const stClass = getStatusClass(item.status);
    const rowClass = isServed ? 'stn-item served-item' : isCollected ? 'stn-item collected' : isStruck ? 'stn-item struck' : 'stn-item';

    html += `<div class="${rowClass}">
      <span class="item-name">${item.quantity > 1 ? item.quantity + 'x ' : ''}${item.product_name}</span>
      <span class="item-status ${stClass}">${isStruck && !isCollected && !isServed ? '&#x2713; ' : ''}${label}</span>
    </div>`;
  }

  html += '</div>';
  return html;
}

// ── Deliver Screen ──
function renderDeliver() {
  const d = myData;
  if (!d) return;
  const div = document.getElementById('deliver-content');

  if (d.deliver_batches.length === 0) {
    div.innerHTML = '<div class="empty-state"><div class="icon">&#x1F6CD;</div><p>No items to deliver</p><p style="margin-top:8px;font-size:12px;color:var(--text2)">When the counter confirms pickup,<br>items will appear here for delivery</p></div>';
    return;
  }

  div.innerHTML = d.deliver_batches.map(batch =>
    `<div class="deliver-card">
      <div class="deliver-top">
        <span class="deliver-table">Table ${batch.table_number}</span>
        <span class="deliver-count">${batch.item_count} item${batch.item_count > 1 ? 's' : ''}</span>
      </div>
      <div class="deliver-items">${batch.items.map(i =>
        `<span class="deliver-item">${i.quantity > 1 ? i.quantity + 'x ' : ''}${i.product_name}</span>`
      ).join('')}</div>
      <button class="served-btn" onclick="serveTable('${batch.table_number}')">
        &#x2713; Served to Table ${batch.table_number}
      </button>
    </div>`
  ).join('');
}

// ── Accept Orders (waiter acknowledges) ──
async function acceptOrders(orderIds) {
  refreshLock = true; // prevent poll from re-rendering during action
  try {
    for (const id of orderIds) {
      await api('floor-accept-order', 'POST', { order_id: id });
    }
    vibrate([100, 50, 100]);
    toast('Order accepted!');
  } catch (e) { toast(e.message, 'error'); }
  refreshLock = false;
  refresh();
}

// ── Serve Orders (mark all items delivered + order served) ──
async function serveOrders(orderIds) {
  refreshLock = true;
  try {
    for (const id of orderIds) {
      await api('floor-serve-table', 'POST', { order_id: id });
    }
    vibrate([100]);
    toast('Table served!');
  } catch (e) { toast(e.message, 'error'); }
  refreshLock = false;
  refresh();
}

// ── Legacy serve by table (for deliver tab) ──
async function serveTable(tableNumber) {
  refreshLock = true;
  try {
    await api('floor-deliver', 'POST', { table_number: tableNumber });
    vibrate([100]);
    toast(`Served Table ${tableNumber}!`);
  } catch (e) { toast(e.message, 'error'); }
  refreshLock = false;
  refresh();
}

// ── Init ──
if (token && staffInfo) {
  afterLogin();
  // Always register FCM token for native app (token may have changed or device may be new)
  if (staffInfo.on_shift) setupPush();
  else if (isNativeApp()) setupPush(); // native: register FCM even before shift starts
} else {
  // No token — redirect to hub for login
  window.location.href = '/ops/';
}
// Force re-register FCM token when native app fires the token event (handles late injection)
if (isNativeApp()) {
  window.addEventListener('fcmTokenReady', (e) => {
    if (token && e.detail) sendFcmTokenToServer(e.detail);
  });
}
</script>
