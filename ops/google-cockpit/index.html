<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HE Google Ads Cockpit</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1a;--bg2:#111827;--card:#1a2234;--border:#2d3a4f;--text:#f1f5f9;--text2:#94a3b8;--muted:#64748b;--green:#10b981;--red:#ef4444;--orange:#f97316;--yellow:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;--cyan:#06b6d4;--ggreen:#34a853;--gblue:#4285f4;--gyellow:#fbbc05;--gred:#ea4335}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
.container{max-width:1300px;margin:0 auto;padding:16px}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.header h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.header h1::before{content:'';width:5px;height:20px;background:linear-gradient(180deg,var(--gblue),var(--ggreen));border-radius:3px}
.status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.status-dot.red{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Filters */
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fbtn{padding:5px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s}
.fbtn:hover{border-color:var(--gblue);color:var(--text)}
.fbtn.active{background:var(--gblue);color:#fff;border-color:var(--gblue)}
.campaign-badge{margin-left:auto;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.blue::before{background:var(--gblue)}
.kpi.green::before{background:var(--ggreen)}
.kpi.orange::before{background:var(--orange)}
.kpi.cyan::before{background:var(--cyan)}
.kpi.yellow::before{background:var(--gyellow)}
.kpi.purple::before{background:var(--purple)}
.kpi-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.kpi-value{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
.kpi-value.blue{color:var(--gblue)}.kpi-value.green{color:var(--ggreen)}.kpi-value.orange{color:var(--orange)}
.kpi-value.cyan{color:var(--cyan)}.kpi-value.yellow{color:var(--gyellow)}.kpi-value.muted{color:var(--muted)}
.kpi-sub{font-size:10px;color:var(--text2);margin-top:2px}

/* Sections */
.section{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.section-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';width:3px;height:14px;background:var(--gblue);border-radius:2px}
.section-title .tip{font-size:10px;color:var(--muted);font-weight:400;margin-left:4px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:6px 8px;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:7px 8px;border-bottom:1px solid rgba(45,58,79,.4);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(66,133,244,.04)}
.best-row td{background:rgba(52,168,83,.06);border-left:2px solid var(--ggreen)}
.best-row td:first-child{border-left:2px solid var(--ggreen)}

/* Badges */
.badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.badge-nearme{background:rgba(66,133,244,.15);color:var(--gblue)}
.badge-shivaji{background:rgba(52,168,83,.15);color:var(--ggreen)}
.badge-serving{background:rgba(16,185,129,.15);color:var(--green)}
.badge-paused{background:rgba(239,68,68,.15);color:var(--red)}

/* Position cards */
.pos-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pos-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center}
.pos-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.pos-value{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:3px}
.pos-hint{font-size:9px;color:var(--muted);margin-top:2px}

/* Chart */
.chart-wrap{overflow-x:auto}
.chart{display:flex;align-items:flex-end;gap:3px;height:80px;min-width:400px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;position:relative}
.chart-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;cursor:pointer;transition:opacity .15s;position:relative}
.chart-bar:hover{opacity:.75}
.chart-bar[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg);border:1px solid var(--border);padding:3px 7px;border-radius:4px;font-size:9px;white-space:nowrap;z-index:10;font-family:'JetBrains Mono',monospace}
.bar-impr{background:var(--gblue)}
.bar-clicks{background:var(--ggreen);width:60%}
.chart-legend{display:flex;gap:16px;font-size:10px;color:var(--muted);margin-bottom:6px}
.chart-legend span{display:flex;align-items:center;gap:5px}
.legend-dot{width:8px;height:8px;border-radius:2px}
.chart-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:4px;padding:0 2px}

/* Search terms */
.st-row{display:flex;justify-content:space-between;align-items:center;padding:6px 2px;border-bottom:1px solid rgba(45,58,79,.3);gap:8px}
.st-row:last-child{border-bottom:none}
.st-term{flex:1;font-weight:600;font-size:11px;color:var(--text)}
.st-match{font-size:9px;color:var(--muted);background:var(--bg2);padding:1px 5px;border-radius:4px;white-space:nowrap}
.st-metrics{display:flex;gap:10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);white-space:nowrap}

/* GBP banner */
.gbp-banner{background:linear-gradient(135deg,rgba(66,133,244,.08),rgba(52,168,83,.08));border:1px solid rgba(66,133,244,.2);border-radius:8px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.gbp-icon{font-size:20px}
.gbp-text{font-size:11px;color:var(--text2);line-height:1.5}
.gbp-text strong{color:var(--text);display:block;margin-bottom:2px;font-size:12px}

/* G logo */
.g-logo{display:inline-flex;gap:1px;font-weight:700;font-size:14px;margin-right:4px}
.g-logo span:nth-child(1){color:var(--gblue)}.g-logo span:nth-child(2){color:var(--gred)}.g-logo span:nth-child(3){color:var(--gyellow)}.g-logo span:nth-child(4){color:var(--gblue)}.g-logo span:nth-child(5){color:var(--ggreen)}.g-logo span:nth-child(6){color:var(--gred)}

/* Empty */
.empty{text-align:center;padding:30px;color:var(--muted);font-size:12px;line-height:1.6}
.empty small{display:block;margin-top:4px;font-size:10px}

/* Organic section */
.organic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.org-kpi{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px;text-align:center}
.org-kpi-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.org-kpi-value{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace}
.org-kpi-sub{font-size:9px;color:var(--muted);margin-top:2px}
.connect-banner{background:rgba(66,133,244,.06);border:1px dashed rgba(66,133,244,.3);border-radius:8px;padding:16px;text-align:center;color:var(--muted);font-size:11px;line-height:1.7}
.connect-banner code{background:var(--bg2);padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2)}
.tab-row{display:flex;gap:2px;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:8px}
.tab{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);background:none;border:none;transition:all .15s}
.tab.active{background:var(--bg2);color:var(--text)}

/* Urgency bar (shared across cockpits) */
.urg-bar{display:none;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.urg-bar.has-items{display:flex}
.urg-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s;white-space:nowrap}
.urg-chip:hover{transform:translateY(-1px);filter:brightness(1.1)}
.urg-chip.critical{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.35)}
.urg-chip.warning{background:rgba(249,115,22,.15);color:var(--orange);border:1px solid rgba(249,115,22,.35)}
.urg-chip.info{background:rgba(66,133,244,.15);color:var(--gblue);border:1px solid rgba(66,133,244,.35)}
.urg-dot{width:6px;height:6px;border-radius:50%;animation:pulse 1.8s infinite}
.urg-chip.critical .urg-dot{background:var(--red)}
.urg-chip.warning .urg-dot{background:var(--orange)}
.urg-chip.info .urg-dot{background:var(--gblue)}
.urg-src{font-size:9px;opacity:.7;text-transform:uppercase;letter-spacing:.4px}

/* Quality Score pill */
.qs{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;font-family:'JetBrains Mono',monospace;min-width:28px;text-align:center}
.qs.excellent{background:rgba(52,168,83,.2);color:var(--ggreen);border:1px solid rgba(52,168,83,.4)}
.qs.good{background:rgba(251,188,5,.18);color:var(--gyellow);border:1px solid rgba(251,188,5,.4)}
.qs.poor{background:rgba(234,67,53,.18);color:var(--gred);border:1px solid rgba(234,67,53,.4)}
.qs.unrated{background:var(--bg2);color:var(--muted);border:1px solid var(--border)}

/* Responsive */
@media(max-width:900px){.grid-2{grid-template-columns:1fr}.pos-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.kpis{grid-template-columns:repeat(2,1fr)}.pos-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1><span class="g-logo"><span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span></span> Ads Command Center</h1>
    <div class="status"><div class="status-dot" id="statusDot"></div><span id="statusText">Loading...</span></div>
  </div>

  <!-- Urgency bar (cross-dashboard) -->
  <div class="urg-bar" id="urgBar"></div>

  <!-- Filters -->
  <div class="filters">
    <button class="fbtn active" data-period="today">Today</button>
    <button class="fbtn" data-period="7d">7 Days</button>
    <button class="fbtn" data-period="30d">30 Days</button>
    <button class="fbtn" data-period="all">All Time</button>
    <div class="campaign-badge" id="campaignBadge"></div>
  </div>

  <!-- KPIs -->
  <div class="kpis" id="kpis"></div>

  <!-- Ad Group + Position -->
  <div class="grid-2">
    <div class="section">
      <div class="section-title">Ad Group Performance <span class="tip">— paid impressions only</span></div>
      <div id="adGroups"></div>
    </div>
    <div class="section">
      <div class="section-title">Search Position</div>
      <div class="pos-grid" id="position"></div>
    </div>
  </div>

  <!-- Organic Impressions Section -->
  <div class="section">
    <div class="section-title">Organic Reach <span class="tip">— Google Maps + Search (free, no ad spend)</span></div>
    <div class="tab-row">
      <button class="tab active" data-org-tab="gbp">📍 Google Maps &amp; GBP</button>
      <button class="tab" data-org-tab="gsc">🔍 Organic Search</button>
    </div>
    <div id="organicContent"></div>
  </div>

  <!-- Keywords -->
  <div class="section">
    <div class="section-title">Keyword Performance <span class="tip">— what triggers your ad</span></div>
    <div id="keywords"></div>
  </div>

  <!-- Daily Trend -->
  <div class="section">
    <div class="section-title">Daily Trend</div>
    <div class="chart-legend">
      <span><div class="legend-dot" style="background:var(--gblue)"></div>Impressions</span>
      <span><div class="legend-dot" style="background:var(--ggreen)"></div>Clicks</span>
    </div>
    <div class="chart-wrap">
      <div class="chart" id="dailyChart"></div>
    </div>
    <div class="chart-labels" id="dailyLabels"></div>
  </div>

  <!-- Search Terms -->
  <div class="section">
    <div class="section-title">What People Actually Searched <span class="tip">— exact queries that showed your ad</span></div>
    <div id="searchTerms"></div>
  </div>

</div>

<script>
const API = '/api/google-cockpit';
const ORGANIC_API = '/api/organic-insights';
let currentPeriod = 'today';
let organicData = null;
let orgTab = 'gbp';

document.querySelectorAll('.fbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod = btn.dataset.period;
    loadData();
  });
});

async function loadData() {
  const statusText = document.getElementById('statusText');
  const statusDot = document.getElementById('statusDot');
  statusText.textContent = 'Fetching...';
  try {
    const resp = await fetch(`${API}?period=${currentPeriod}`);
    const data = await resp.json();
    if (!data.success) {
      statusText.textContent = 'Error: ' + (data.error || 'unknown');
      statusDot.classList.add('red');
      return;
    }
    render(data);
    statusDot.classList.remove('red');
    statusText.textContent = `Updated ${new Date().toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit' })} IST`;
  } catch (err) {
    statusText.textContent = 'Offline — ' + err.message;
    statusDot.classList.add('red');
  }
}

function render(data) {
  const o = data.overview;

  // Campaign badge
  const servingLabel = o.servingStatus === 'SERVING' ? '🟢 Serving' : o.status === 'ENABLED' ? '🟡 Enabled' : '🔴 ' + o.status;
  document.getElementById('campaignBadge').textContent = `Campaign ID: ${data.campaignId} · ${servingLabel}`;

  // KPIs
  const budgetInfo = currentPeriod === 'today' ? '₹500 daily budget' : '';
  document.getElementById('kpis').innerHTML = `
    <div class="kpi blue">
      <div class="kpi-label">Impressions</div>
      <div class="kpi-value blue">${fmt(o.impressions)}</div>
      <div class="kpi-sub">Paid ad shown ${fmt(o.impressions)}×</div>
    </div>
    <div class="kpi green">
      <div class="kpi-label">Clicks</div>
      <div class="kpi-value green">${fmt(o.clicks)}</div>
      <div class="kpi-sub">CTR: ${o.impressions > 0 ? ((o.clicks/o.impressions)*100).toFixed(2) : 0}%</div>
    </div>
    <div class="kpi orange">
      <div class="kpi-label">Spend</div>
      <div class="kpi-value orange">₹${o.spend}</div>
      <div class="kpi-sub">${budgetInfo}</div>
    </div>
    <div class="kpi cyan">
      <div class="kpi-label">Avg CPC</div>
      <div class="kpi-value cyan">${o.clicks > 0 ? '₹' + o.avgCPC : '—'}</div>
      <div class="kpi-sub">Cost per click</div>
    </div>
    <div class="kpi yellow">
      <div class="kpi-label">CPM</div>
      <div class="kpi-value yellow">${o.avgCPM > 0 ? '₹' + o.avgCPM : '—'}</div>
      <div class="kpi-sub">Cost per 1000 impr</div>
    </div>
    <div class="kpi purple">
      <div class="kpi-label">Conversions</div>
      <div class="kpi-value ${o.conversions > 0 ? 'green' : 'muted'}">${o.conversions || '—'}</div>
      <div class="kpi-sub">Tracked actions</div>
    </div>
  `;

  // Ad Groups
  const ags = data.adGroups;
  if (ags.length > 0) {
    const bestIdx = ags.reduce((bi, a, i, arr) => a.impressions > arr[bi].impressions ? i : bi, 0);
    document.getElementById('adGroups').innerHTML = `<table>
      <tr>
        <th>Ad Group</th><th>Bid</th><th>Impr</th><th>Clicks</th><th>CTR</th><th>Spend</th>
      </tr>
      ${ags.map((a, i) => {
        const badge = a.name.includes('Near Me')
          ? '<span class="badge badge-nearme">Near Me</span>'
          : '<span class="badge badge-shivaji">Shivajinagar</span>';
        const bidLabel = a.bidINR ? `₹${a.bidINR}` : '—';
        const ctr = a.impressions > 0 ? ((a.clicks / a.impressions) * 100).toFixed(1) + '%' : '0%';
        return `<tr class="${i === bestIdx && a.impressions > 0 ? 'best-row' : ''}">
          <td>${badge}</td>
          <td class="mono" style="color:var(--text2)">${bidLabel}</td>
          <td class="mono">${fmt(a.impressions)}</td>
          <td class="mono">${a.clicks}</td>
          <td class="mono">${ctr}</td>
          <td class="mono">₹${a.spend}</td>
        </tr>`;
      }).join('')}
    </table>`;
  } else {
    document.getElementById('adGroups').innerHTML = `<div class="empty">No data yet<small>Campaign is warming up — data appears after first impressions</small></div>`;
  }

  // Position metrics
  const hasPositionData = o.searchImprShare > 0 || o.topImprPct > 0 || o.absTopImprPct > 0;
  document.getElementById('position').innerHTML = `
    <div class="pos-card">
      <div class="pos-label">Impr Share</div>
      <div class="pos-value" style="color:var(--gblue)">${hasPositionData ? o.searchImprShare + '%' : '—'}</div>
      <div class="pos-hint">% of eligible auctions won</div>
    </div>
    <div class="pos-card">
      <div class="pos-label">Top of Page</div>
      <div class="pos-value" style="color:var(--ggreen)">${hasPositionData ? o.topImprPct + '%' : '—'}</div>
      <div class="pos-hint">Shown above organic results</div>
    </div>
    <div class="pos-card">
      <div class="pos-label">Abs. #1</div>
      <div class="pos-value" style="color:var(--gyellow)">${hasPositionData ? o.absTopImprPct + '%' : '—'}</div>
      <div class="pos-hint">First position on page</div>
    </div>
    <div class="pos-card">
      <div class="pos-label">Conversions</div>
      <div class="pos-value" style="color:var(--orange)">${o.conversions || '—'}</div>
      <div class="pos-hint">Tracked actions</div>
    </div>
  `;

  // Keywords — includes Quality Score + first-page-CPC bid estimate
  const kws = data.keywords;
  if (kws.length > 0) {
    const bestKw = kws.reduce((bi, k, i, arr) => k.impressions > arr[bi].impressions ? i : bi, 0);
    document.getElementById('keywords').innerHTML = `<table>
      <tr>
        <th>Keyword</th><th>Group</th><th>QS</th><th>Bid</th><th>1st Pg CPC</th><th>Impr</th><th>Clicks</th><th>CTR</th><th>Spend</th><th>Impr Share</th>
      </tr>
      ${kws.map((k, i) => {
        const badge = k.adGroup.includes('Near Me')
          ? '<span class="badge badge-nearme">NM</span>'
          : '<span class="badge badge-shivaji">SJ</span>';
        const bidLabel = k.bidINR ? `₹${k.bidINR}` : '—';
        const imprShare = k.imprShare > 0 ? k.imprShare + '%' : '—';
        const ctr = k.impressions > 0 ? ((k.clicks / k.impressions) * 100).toFixed(1) + '%' : '0%';
        const qs = qualityPill(k.qualityScore);
        const firstPage = k.firstPageCpc
          ? `<span class="mono" style="color:${k.bidINR && k.bidINR < k.firstPageCpc ? 'var(--gred)' : 'var(--text2)'}" title="To show on page 1">₹${k.firstPageCpc}</span>`
          : '<span class="mono" style="color:var(--muted)">—</span>';
        return `<tr class="${i === bestKw && k.impressions > 0 ? 'best-row' : ''}">
          <td style="font-weight:600">"${k.keyword}"</td>
          <td>${badge}</td>
          <td>${qs}</td>
          <td class="mono" style="color:var(--text2)">${bidLabel}</td>
          <td>${firstPage}</td>
          <td class="mono">${fmt(k.impressions)}</td>
          <td class="mono">${k.clicks}</td>
          <td class="mono">${ctr}</td>
          <td class="mono">₹${k.spend}</td>
          <td class="mono" style="color:${k.imprShare > 20 ? 'var(--ggreen)' : 'var(--text2)'}">${imprShare}</td>
        </tr>`;
      }).join('')}
    </table>
    <div style="font-size:10px;color:var(--muted);margin-top:8px;line-height:1.5">
      <strong style="color:var(--text2)">QS</strong> (Quality Score, 1-10) is Google's prediction of keyword quality — higher = cheaper clicks and better position.
      <strong style="color:var(--text2)">1st Pg CPC</strong> = minimum bid to appear on page 1 (red if your current bid is below this).
    </div>`;
  } else {
    document.getElementById('keywords').innerHTML = `<div class="empty">No keyword data yet<small>Appears after first impressions are logged</small></div>`;
  }

  // Daily chart
  const days = data.daily;
  if (days.length > 0) {
    const maxI = Math.max(...days.map(d => d.impressions), 1);
    const maxC = Math.max(...days.map(d => d.clicks), 1);
    document.getElementById('dailyChart').innerHTML = days.map(d => {
      const ih = Math.max(2, Math.round((d.impressions / maxI) * 76));
      const ch = d.clicks > 0 ? Math.max(2, Math.round((d.clicks / maxC) * 76)) : 0;
      return `<div class="chart-col">
        <div class="chart-bar bar-impr" style="height:${ih}px" data-tip="${d.date}: ${d.impressions} impr · ${d.clicks} clicks · ₹${d.spend}"></div>
        ${ch > 0 ? `<div class="chart-bar bar-clicks" style="height:${ch}px"></div>` : '<div style="height:2px"></div>'}
      </div>`;
    }).join('');

    const labels = document.getElementById('dailyLabels');
    if (days.length <= 14) {
      labels.innerHTML = days.map(d => `<span>${d.date.slice(5)}</span>`).join('');
    } else {
      const step = Math.ceil(days.length / 7);
      labels.innerHTML = days.filter((_, i) => i % step === 0 || i === days.length - 1)
        .map(d => `<span>${d.date.slice(5)}</span>`).join('');
    }
  } else {
    document.getElementById('dailyChart').innerHTML = '<div class="empty" style="width:100%">No daily data yet</div>';
    document.getElementById('dailyLabels').innerHTML = '';
  }

  // Search terms
  const sts = data.searchTerms;
  if (sts.length > 0) {
    document.getElementById('searchTerms').innerHTML = sts.map(s =>
      `<div class="st-row">
        <div class="st-term">"${s.term}"</div>
        <div class="st-match">${s.matchType}</div>
        <div class="st-metrics">
          <span>${fmt(s.impressions)} impr</span>
          <span>${s.clicks} clicks</span>
          ${s.spend > 0 ? `<span>₹${s.spend}</span>` : ''}
        </div>
      </div>`
    ).join('');
  } else {
    document.getElementById('searchTerms').innerHTML = `<div class="empty">No search terms yet<small>Google reports these after a few hours of impressions</small></div>`;
  }
}

function fmt(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return (n || 0).toString();
}

// Google Quality Score → pill. Score is 1-10, null/0 = not yet rated (new keyword).
function qualityPill(score) {
  if (!score || score === 0) return '<span class="qs unrated" title="Not rated yet — needs more impressions">—</span>';
  const cls = score >= 8 ? 'excellent' : score >= 5 ? 'good' : 'poor';
  const tip = score >= 8
    ? 'Excellent — cheap clicks, good position'
    : score >= 5
    ? 'OK — some room to improve'
    : 'Poor — fix landing page / ad copy or pause';
  return `<span class="qs ${cls}" title="${tip}">${score}/10</span>`;
}

// ─── Shared urgency bar ───────────────────────────────────────────────
async function loadUrgency() {
  const bar = document.getElementById('urgBar');
  if (!bar) return;
  try {
    const res = await fetch('/api/urgency');
    const d = await res.json();
    if (!d.success || !d.items || d.items.length === 0) {
      bar.classList.remove('has-items');
      bar.innerHTML = '';
      return;
    }
    bar.innerHTML = d.items.map(it => `
      <a class="urg-chip ${it.severity}" href="${it.action}" title="${it.source}">
        <span class="urg-dot"></span>
        <span class="urg-src">${it.source}</span>
        <span>${it.text}</span>
      </a>
    `).join('');
    bar.classList.add('has-items');
  } catch (e) {
    bar.classList.remove('has-items');
  }
}

// Organic tab switching
document.querySelectorAll('[data-org-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-org-tab]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    orgTab = btn.dataset.orgTab;
    if (organicData) renderOrganic(organicData);
  });
});

async function loadOrganic() {
  try {
    const resp = await fetch(`${ORGANIC_API}?period=28d`);
    const data = await resp.json();
    organicData = data;
    renderOrganic(data);
  } catch (e) {
    document.getElementById('organicContent').innerHTML =
      `<div class="connect-banner">Could not reach /api/organic-insights</div>`;
  }
}

function renderOrganic(data) {
  const el = document.getElementById('organicContent');

  if (!data.available) {
    el.innerHTML = `<div class="connect-banner">
      <strong style="color:var(--text);display:block;margin-bottom:8px">🔗 One-time setup required to unlock organic data</strong>
      Run this on your Mac to generate a token with Search Console + Maps permissions:<br><br>
      <code>node scripts/generate-organic-token.js</code><br><br>
      Then add it to Cloudflare:<br>
      <code>wrangler pages secret put GOOGLE_ORGANIC_REFRESH_TOKEN</code><br><br>
      <span style="font-size:10px">Takes 2 minutes. Data will appear here automatically after setup.</span>
    </div>`;
    return;
  }

  if (orgTab === 'gbp') {
    const g = data.gbp || {};
    if (g.error) {
      const isQuota = g.error.includes('GBP_QUOTA_ZERO') || g.error.includes('quota') || g.error.includes('RESOURCE_EXHAUSTED');
      el.innerHTML = isQuota
        ? `<div class="connect-banner">
            <strong style="color:var(--text);display:block;margin-bottom:6px">⏳ GBP Access Pending</strong>
            Google restricts Business Profile API access for new projects. A one-time quota request has been filed.<br>
            <span style="font-size:10px;color:var(--muted)">Maps impressions, direction requests & call data will appear here once Google approves (~1–3 days).</span>
          </div>`
        : `<div class="connect-banner">GBP Error: ${g.error}</div>`;
      return;
    }
    const totalImpr = (g.mapsImpressions || 0) + (g.searchImpressions || 0);
    el.innerHTML = `
      <div style="font-size:10px;color:var(--muted);margin-bottom:10px">Last 28 days · ${g.locationName || 'Hamza Express'}</div>
      <div class="organic-grid">
        <div class="org-kpi">
          <div class="org-kpi-label">Maps Impressions</div>
          <div class="org-kpi-value" style="color:var(--gblue)">${fmt(g.mapsImpressions || 0)}</div>
          <div class="org-kpi-sub">Seen on Google Maps</div>
        </div>
        <div class="org-kpi">
          <div class="org-kpi-label">Search Impressions</div>
          <div class="org-kpi-value" style="color:var(--ggreen)">${fmt(g.searchImpressions || 0)}</div>
          <div class="org-kpi-sub">Seen in Search results</div>
        </div>
        <div class="org-kpi">
          <div class="org-kpi-label">Direction Requests</div>
          <div class="org-kpi-value" style="color:var(--orange)">${fmt(g.directionRequests || 0)}</div>
          <div class="org-kpi-sub">Tapped "Get Directions"</div>
        </div>
        <div class="org-kpi">
          <div class="org-kpi-label">Call Clicks</div>
          <div class="org-kpi-value" style="color:var(--gyellow)">${fmt(g.callClicks || 0)}</div>
          <div class="org-kpi-sub">Tapped phone number</div>
        </div>
        <div class="org-kpi">
          <div class="org-kpi-label">Website Clicks</div>
          <div class="org-kpi-value" style="color:var(--cyan)">${fmt(g.websiteClicks || 0)}</div>
          <div class="org-kpi-sub">Clicked website link</div>
        </div>
        <div class="org-kpi">
          <div class="org-kpi-label">Total Organic</div>
          <div class="org-kpi-value" style="color:var(--purple)">${fmt(totalImpr)}</div>
          <div class="org-kpi-sub">Maps + Search combined</div>
        </div>
      </div>
      <div style="font-size:10px;color:var(--muted);padding:4px 0">
        ↑ These are free, organic — no ad spend. Paid ads add impressions on top of these.
      </div>`;
  } else {
    const s = data.gsc || {};
    if (s.error) {
      el.innerHTML = `<div class="connect-banner">GSC Error: ${s.error}</div>`;
      return;
    }
    el.innerHTML = `
      <div style="font-size:10px;color:var(--muted);margin-bottom:10px">Last 28 days · hamzaexpress.in organic search</div>
      <div class="organic-grid" style="margin-bottom:14px">
        <div class="org-kpi">
          <div class="org-kpi-label">Impressions</div>
          <div class="org-kpi-value" style="color:var(--gblue)">${fmt(s.impressions || 0)}</div>
          <div class="org-kpi-sub">Shown in search results</div>
        </div>
        <div class="org-kpi">
          <div class="org-kpi-label">Clicks</div>
          <div class="org-kpi-value" style="color:var(--ggreen)">${fmt(s.clicks || 0)}</div>
          <div class="org-kpi-sub">Organic website visits</div>
        </div>
        <div class="org-kpi">
          <div class="org-kpi-label">Avg CTR</div>
          <div class="org-kpi-value" style="color:var(--orange)">${s.ctr || 0}%</div>
          <div class="org-kpi-sub">Click-through rate</div>
        </div>
        <div class="org-kpi">
          <div class="org-kpi-label">Avg Position</div>
          <div class="org-kpi-value" style="color:${(s.avgPosition||99) <= 5 ? 'var(--ggreen)' : (s.avgPosition||99) <= 10 ? 'var(--gyellow)' : 'var(--gred)'}">#${s.avgPosition || '—'}</div>
          <div class="org-kpi-sub">Google ranking</div>
        </div>
      </div>
      <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px">Top Queries</div>
      ${(s.topQueries || []).slice(0, 10).map(q => `
        <div class="st-row">
          <div class="st-term">${q.query}</div>
          <div class="st-metrics">
            <span>${fmt(q.impressions)} impr</span>
            <span>${q.clicks} clicks</span>
            <span>#${q.position}</span>
          </div>
        </div>`).join('') || '<div class="empty">No query data</div>'}
    `;
  }
}

// Auto-refresh every 60s
loadData();
loadOrganic();
loadUrgency();
setInterval(loadData, 60000);
setInterval(loadOrganic, 300000); // organic refreshes every 5 min (GSC data lags ~2 days anyway)
setInterval(loadUrgency, 60000);
</script>
