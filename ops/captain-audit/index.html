<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HE Captain Audit</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0f1a;--bg2:#111827;--card:#1a2234;--border:#2d3a4f;--text:#f1f5f9;--text2:#94a3b8;--muted:#64748b;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;--cyan:#06b6d4;--orange:#f97316;--pink:#ec4899}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .container{max-width:1400px;margin:0 auto;padding:16px}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
    .header h1{font-size:22px;font-weight:700;display:flex;align-items:center;gap:10px}
    .header h1::before{content:'';width:5px;height:26px;background:linear-gradient(180deg,var(--orange),var(--yellow));border-radius:3px}
    .status{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--card);border-radius:6px;font-size:11px;font-family:'JetBrains Mono',monospace}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
    .status-dot.offline{background:var(--red);animation:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .btn{padding:7px 14px;border:none;border-radius:6px;font-weight:600;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
    .btn-primary{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#fff}
    .btn-primary:hover{opacity:.9}
    .btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--text2)}
    .btn-secondary:hover{border-color:var(--orange);color:var(--text)}
    .btn-secondary.active{background:var(--orange);color:#fff;border-color:var(--orange)}
    .filter-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:16px;display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}
    .filter-group{display:flex;flex-direction:column;gap:3px}
    .filter-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
    input[type="datetime-local"],select{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;font-family:'JetBrains Mono',monospace}
    input:focus,select:focus{outline:none;border-color:var(--orange)}
    input::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer}

    /* Summary cards */
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:16px}
    .summary-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
    .summary-card .label{font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
    .summary-card .value{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}
    .summary-card .sub{font-size:10px;color:var(--text2);margin-top:3px}

    /* Event timeline */
    .timeline{display:flex;flex-direction:column;gap:6px}
    .event{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;transition:border-color .15s}
    .event:hover{border-color:var(--orange)}
    .event-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
    .event-icon.created{background:rgba(16,185,129,.15);color:var(--green)}
    .event-icon.paid{background:rgba(59,130,246,.15);color:var(--blue)}
    .event-icon.cancelled{background:rgba(239,68,68,.15);color:var(--red)}
    .event-icon.item-add{background:rgba(139,92,246,.15);color:var(--purple)}
    .event-icon.item-remove{background:rgba(236,72,153,.15);color:var(--pink)}
    .event-icon.item-qty{background:rgba(6,182,212,.15);color:var(--cyan)}
    .event-icon.payment{background:rgba(249,115,22,.15);color:var(--orange)}
    .event-icon.table{background:rgba(245,158,11,.15);color:var(--yellow)}
    .event-icon.amount{background:rgba(245,158,11,.15);color:var(--yellow)}
    .event-icon.captain{background:rgba(139,92,246,.15);color:var(--purple)}
    .event-icon.state{background:rgba(100,116,139,.15);color:var(--muted)}
    .event-body{flex:1;min-width:0}
    .event-title{font-size:13px;font-weight:600;margin-bottom:2px}
    .event-detail{font-size:11px;color:var(--text2);line-height:1.5}
    .event-meta{display:flex;gap:12px;margin-top:4px;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
    .event-amount{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;flex-shrink:0;text-align:right}
    .event-amount.positive{color:var(--green)}
    .event-amount.negative{color:var(--red)}

    /* Filter chips */
    .chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .chip{padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text2);transition:all .15s}
    .chip:hover{border-color:var(--orange)}
    .chip.active{background:var(--orange);color:#fff;border-color:var(--orange)}
    .chip .count{margin-left:4px;opacity:.7}

    /* Loading */
    .loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
    .empty{text-align:center;padding:40px;color:var(--muted)}

    /* Login */
    .login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
    .login-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px;width:320px;text-align:center}
    .login-box h2{margin-bottom:20px;font-size:20px}
    .login-box input{width:100%;padding:12px;text-align:center;font-size:24px;letter-spacing:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace}
    .login-box .error{color:var(--red);font-size:12px;margin-top:8px}

    /* Order detail modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;align-items:center;justify-content:center}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;width:90%;max-width:600px;max-height:80vh;overflow-y:auto}
    .modal h3{margin-bottom:12px;font-size:16px}
    .modal-close{float:right;cursor:pointer;font-size:18px;color:var(--muted)}
    .modal-close:hover{color:var(--text)}
    .order-items{margin-top:10px}
    .order-items table{width:100%;border-collapse:collapse}
    .order-items th,.order-items td{padding:6px 8px;text-align:left;font-size:12px;border-bottom:1px solid var(--border)}
    .order-items th{color:var(--muted);font-size:10px;text-transform:uppercase}

    @media(max-width:600px){
      .summary-grid{grid-template-columns:repeat(2,1fr)}
      .filter-bar{flex-direction:column;align-items:stretch}
      .event{flex-wrap:wrap}
      .event-amount{width:100%;text-align:left;margin-top:4px}
    }
  </style>
</head>
<body>
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h2>Captain Audit</h2>
      <input type="password" id="pinInput" maxlength="4" placeholder="PIN" inputmode="numeric" autofocus>
      <div class="error" id="loginError"></div>
    </div>
  </div>

  <div class="container" id="app" style="display:none">
    <div class="header">
      <h1>Captain POS Audit</h1>
      <div class="controls">
        <div class="status" id="statusBadge">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Connecting...</span>
        </div>
        <button class="btn btn-primary" onclick="pollNow()">Sync Now</button>
        <button class="btn btn-secondary" id="liveBtn" onclick="toggleLive()">Live: OFF</button>
      </div>
    </div>

    <div class="filter-bar">
      <div class="filter-group">
        <span class="filter-label">From</span>
        <input type="datetime-local" id="fromDate">
      </div>
      <div class="filter-group">
        <span class="filter-label">To</span>
        <input type="datetime-local" id="toDate">
      </div>
      <div class="filter-group">
        <span class="filter-label">Quick</span>
        <div style="display:flex;gap:4px">
          <button class="btn btn-secondary" onclick="setQuick('today')">Today</button>
          <button class="btn btn-secondary" onclick="setQuick('yesterday')">Yesterday</button>
          <button class="btn btn-secondary" onclick="setQuick('4h')">Last 4h</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="fetchLogs()" style="margin-left:auto">Load</button>
    </div>

    <div class="summary-grid" id="summaryGrid"></div>
    <div id="gapAlerts" style="margin-bottom:12px"></div>
    <div class="chip-row" id="chipRow"></div>
    <div class="timeline" id="timeline">
      <div class="loading">Enter PIN to start...</div>
    </div>
  </div>

  <div class="modal-bg" id="modalBg" style="display:none" onclick="closeModal(event)">
    <div class="modal" id="modal"></div>
  </div>

<script>
const POS_TYPE = 'captain';
const API_BASE = '/api/whatsapp';
const ENV = new URLSearchParams(location.search).get('env') || '';
let token = localStorage.getItem('floor_token_' + (ENV || 'prod'));
let liveInterval = null;
let allLogs = [];
let activeFilter = null;

// ── Login ──
const pinInput = document.getElementById('pinInput');
pinInput.addEventListener('input', async () => {
  if (pinInput.value.length === 4) {
    try {
      const envQ = ENV ? `&env=${ENV}` : '';
      const res = await fetch(`${API_BASE}?action=floor-login${envQ}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin: pinInput.value })
      });
      const data = await res.json();
      if (data.token) {
        token = data.token;
        localStorage.setItem('floor_token_' + (ENV || 'prod'), token);
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        setQuick('today');
        pollNow();
      } else {
        document.getElementById('loginError').textContent = data.error || 'Invalid PIN';
        pinInput.value = '';
      }
    } catch (e) {
      document.getElementById('loginError').textContent = 'Connection error';
      pinInput.value = '';
    }
  }
});

// Auto-login if token exists
if (token) {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  setQuick('today');
  pollNow();
}

// ── API ──
function apiUrl(action, extra = '') {
  const envQ = ENV ? `&env=${ENV}` : '';
  return `${API_BASE}?action=${action}&pos=${POS_TYPE}${envQ}${extra}`;
}

function headers() {
  return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
}

async function pollNow() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  try {
    dot.className = 'status-dot';
    text.textContent = 'Syncing...';
    const res = await fetch(apiUrl('pos-audit-poll'), { headers: headers() });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    if (data.error) {
      dot.className = 'status-dot offline';
      text.textContent = 'Odoo offline';
    } else {
      text.textContent = `${data.scanned} scanned, ${data.events_logged} new`;
      if (data.events_logged > 0) fetchLogs();
      // Show gap warnings
      renderGapWarnings(data);
    }
  } catch (e) {
    dot.className = 'status-dot offline';
    text.textContent = 'Error';
  }
}

async function fetchLogs() {
  const from = document.getElementById('fromDate').value;
  const to = document.getElementById('toDate').value;
  let extra = '';
  if (from) extra += `&from=${from}`;
  if (to) extra += `&to=${to}`;

  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '<div class="loading">Loading...</div>';

  try {
    const res = await fetch(apiUrl('pos-audit-log', extra), { headers: headers() });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    allLogs = data.logs || [];
    renderSummary(data.stats || []);
    renderChips(data.stats || []);
    renderTimeline(allLogs);
  } catch (e) {
    timeline.innerHTML = '<div class="empty">Failed to load logs</div>';
  }
}

function logout() {
  localStorage.removeItem('floor_token_' + (ENV || 'prod'));
  location.reload();
}

// ── Quick date filters ──
function setQuick(preset) {
  const now = new Date();
  const ist = new Date(now.getTime() + 5.5 * 60 * 60 * 1000);
  let from, to;

  if (preset === 'today') {
    from = ist.toISOString().slice(0, 10) + 'T00:00';
    to = '';
  } else if (preset === 'yesterday') {
    const y = new Date(ist);
    y.setDate(y.getDate() - 1);
    from = y.toISOString().slice(0, 10) + 'T00:00';
    to = ist.toISOString().slice(0, 10) + 'T00:00';
  } else if (preset === '4h') {
    const h4 = new Date(ist.getTime() - 4 * 60 * 60 * 1000);
    from = h4.toISOString().slice(0, 16);
    to = '';
  }

  document.getElementById('fromDate').value = from || '';
  document.getElementById('toDate').value = to || '';
  fetchLogs();
}

// ── Live toggle ──
function toggleLive() {
  const btn = document.getElementById('liveBtn');
  if (liveInterval) {
    clearInterval(liveInterval);
    liveInterval = null;
    btn.textContent = 'Live: OFF';
    btn.classList.remove('active');
  } else {
    liveInterval = setInterval(() => { pollNow(); fetchLogs(); }, 10000);
    btn.textContent = 'Live: ON (10s)';
    btn.classList.add('active');
  }
}

// ── Render ──
const EVENT_CONFIG = {
  order_created: { icon: '+', cls: 'created', label: 'Order Created' },
  order_paid: { icon: '$', cls: 'paid', label: 'Order Paid' },
  order_cancelled: { icon: 'X', cls: 'cancelled', label: 'Cancelled' },
  order_deleted: { icon: '!', cls: 'cancelled', label: 'Order Lost' },
  item_added: { icon: '+', cls: 'item-add', label: 'Item Added' },
  item_removed: { icon: '-', cls: 'item-remove', label: 'Item Removed' },
  item_qty_changed: { icon: '#', cls: 'item-qty', label: 'Qty Changed' },
  payment_recorded: { icon: '$', cls: 'payment', label: 'Payment' },
  table_changed: { icon: 'T', cls: 'table', label: 'Table Changed' },
  amount_changed: { icon: 'A', cls: 'amount', label: 'Amount Changed' },
  captain_changed: { icon: 'C', cls: 'captain', label: 'Captain Changed' },
  state_changed: { icon: 'S', cls: 'state', label: 'State Changed' },
};

function renderSummary(stats) {
  const grid = document.getElementById('summaryGrid');
  const statMap = {};
  stats.forEach(s => statMap[s.event_type] = s.count);

  const totalEvents = allLogs.length;
  const orders = new Set(allLogs.map(l => l.odoo_order_id)).size;
  const totalAmount = allLogs.filter(l => l.event_type === 'order_paid' || (l.event_type === 'order_created' && parseDetails(l).state !== 'draft')).reduce((s, l) => s + (l.amount || 0), 0);
  const cancellations = statMap['order_cancelled'] || 0;
  const itemsRemoved = statMap['item_removed'] || 0;
  const payments = statMap['payment_recorded'] || 0;

  grid.innerHTML = `
    <div class="summary-card"><div class="label">Total Events</div><div class="value">${totalEvents}</div></div>
    <div class="summary-card"><div class="label">Orders Tracked</div><div class="value">${orders}</div></div>
    <div class="summary-card"><div class="label">Cancellations</div><div class="value" style="color:var(--red)">${cancellations}</div></div>
    <div class="summary-card"><div class="label">Items Removed</div><div class="value" style="color:var(--pink)">${itemsRemoved}</div></div>
    <div class="summary-card"><div class="label">Payments</div><div class="value" style="color:var(--blue)">${payments}</div></div>
    <div class="summary-card"><div class="label">Amount Changes</div><div class="value" style="color:var(--yellow)">${statMap['amount_changed'] || 0}</div></div>
  `;
}

function renderChips(stats) {
  const row = document.getElementById('chipRow');
  row.innerHTML = `<span class="chip ${!activeFilter ? 'active' : ''}" onclick="filterBy(null)">All <span class="count">${allLogs.length}</span></span>`;
  stats.forEach(s => {
    const cfg = EVENT_CONFIG[s.event_type] || { label: s.event_type };
    row.innerHTML += `<span class="chip ${activeFilter === s.event_type ? 'active' : ''}" onclick="filterBy('${s.event_type}')">${cfg.label} <span class="count">${s.count}</span></span>`;
  });
}

function filterBy(type) {
  activeFilter = type;
  const filtered = type ? allLogs.filter(l => l.event_type === type) : allLogs;
  renderTimeline(filtered);
  // Update chip active state
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', (!type && c.textContent.startsWith('All')) || (type && c.textContent.includes((EVENT_CONFIG[type] || {}).label)));
  });
}

function renderTimeline(logs) {
  const tl = document.getElementById('timeline');
  if (!logs.length) { tl.innerHTML = '<div class="empty">No events found for this period</div>'; return; }

  tl.innerHTML = logs.map(log => {
    const cfg = EVENT_CONFIG[log.event_type] || { icon: '?', cls: 'state', label: log.event_type };
    const d = parseDetails(log);
    const time = log.created_at ? log.created_at.slice(11, 16) : '';
    const date = log.created_at ? log.created_at.slice(0, 10) : '';

    let detail = '';
    let amountClass = '';
    let amountText = '';

    switch (log.event_type) {
      case 'order_created':
        detail = formatItems(d.items || []);
        amountText = `+${fmt(log.amount)}`;
        amountClass = 'positive';
        break;
      case 'order_paid':
        detail = `${d.from || 'draft'} &rarr; ${d.to || 'paid'}`;
        amountText = fmt(log.amount);
        amountClass = 'positive';
        break;
      case 'order_cancelled':
        detail = d.from ? `${d.from} &rarr; cancel` : 'Order cancelled';
        if (d.items) detail += '<br>' + formatItems(d.items);
        amountText = log.amount ? `-${fmt(log.amount)}` : '';
        amountClass = 'negative';
        break;
      case 'item_added':
        detail = `<b>${d.name}</b> x${d.qty}`;
        amountText = `+${fmt(d.price)}`;
        amountClass = 'positive';
        break;
      case 'item_removed':
        detail = `<b>${d.name}</b> x${d.qty}`;
        amountText = `-${fmt(d.price)}`;
        amountClass = 'negative';
        break;
      case 'item_qty_changed':
        detail = `<b>${d.name}</b>: ${d.from_qty} &rarr; ${d.to_qty}`;
        amountText = fmt(d.price);
        break;
      case 'payment_recorded':
        detail = `<b>${d.method}</b>`;
        amountText = fmt(log.amount);
        amountClass = 'positive';
        break;
      case 'table_changed':
        detail = `${d.from || 'none'} &rarr; ${d.to || 'none'}`;
        break;
      case 'amount_changed':
        const diff = d.diff || 0;
        detail = `${fmt(d.from)} &rarr; ${fmt(d.to)}`;
        amountText = (diff > 0 ? '+' : '') + fmt(diff);
        amountClass = diff > 0 ? 'positive' : 'negative';
        break;
      case 'captain_changed':
        detail = `${d.from || 'none'} &rarr; ${d.to || 'none'}`;
        break;
      case 'state_changed':
        detail = `${d.from} &rarr; ${d.to}`;
        break;
    }

    return `
      <div class="event" onclick="showOrder(${log.odoo_order_id})">
        <div class="event-icon ${cfg.cls}">${cfg.icon}</div>
        <div class="event-body">
          <div class="event-title">${cfg.label}</div>
          <div class="event-detail">${detail}</div>
          <div class="event-meta">
            <span>${log.odoo_order_name || '/'}</span>
            <span>${log.table_number || ''}</span>
            <span>${log.captain || ''}</span>
            <span>${date} ${time}</span>
          </div>
        </div>
        ${amountText ? `<div class="event-amount ${amountClass}">${amountText}</div>` : ''}
      </div>
    `;
  }).join('');
}

function formatItems(items) {
  if (!items || !items.length) return '';
  return items.map(i => `${cleanName(i.name)} x${i.qty}`).join(', ');
}

function cleanName(n) {
  return (n || '').replace(/\[HE-\w+\]\s*/g, '');
}

function parseDetails(log) {
  try { return JSON.parse(log.details || '{}'); } catch { return {}; }
}

function fmt(n) {
  if (n == null) return '';
  return '\u20B9' + Number(n).toLocaleString('en-IN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

// ── Order detail modal ──
async function showOrder(orderId) {
  const logs = allLogs.filter(l => l.odoo_order_id === orderId);
  if (!logs.length) return;

  const orderName = logs[0].odoo_order_name || '/';
  const table = logs[0].table_number || 'N/A';
  const captain = logs[0].captain || 'N/A';

  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <h3>Order ${orderName} (ID: ${orderId})</h3>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px">
      Table: ${table} | Captain: ${captain}
    </div>
    <div class="section-title">Event History</div>
    <div class="timeline" style="gap:4px">
      ${logs.reverse().map(l => {
        const cfg = EVENT_CONFIG[l.event_type] || { icon: '?', cls: 'state', label: l.event_type };
        const d = parseDetails(l);
        const time = l.created_at ? l.created_at.slice(11, 16) : '';
        let detail = l.details ? summarizeDetail(l.event_type, d) : '';
        return `
          <div class="event" style="padding:8px 10px">
            <div class="event-icon ${cfg.cls}" style="width:26px;height:26px;font-size:11px">${cfg.icon}</div>
            <div class="event-body">
              <div style="font-size:12px;font-weight:600">${cfg.label}</div>
              <div style="font-size:11px;color:var(--text2)">${detail}</div>
            </div>
            <div style="font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace">${time}</div>
            ${l.amount ? `<div style="font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace">${fmt(l.amount)}</div>` : ''}
          </div>
        `;
      }).join('')}
    </div>
  `;
  document.getElementById('modalBg').style.display = 'flex';
}

function summarizeDetail(type, d) {
  switch (type) {
    case 'order_created': return formatItems(d.items);
    case 'item_added': return `${cleanName(d.name)} x${d.qty}`;
    case 'item_removed': return `${cleanName(d.name)} x${d.qty}`;
    case 'item_qty_changed': return `${cleanName(d.name)}: ${d.from_qty} → ${d.to_qty}`;
    case 'payment_recorded': return d.method;
    case 'table_changed': return `${d.from || 'none'} → ${d.to}`;
    case 'captain_changed': return `${d.from || 'none'} → ${d.to}`;
    case 'amount_changed': return `${fmt(d.from)} → ${fmt(d.to)}`;
    case 'order_paid':
    case 'state_changed': return `${d.from} → ${d.to}`;
    default: return JSON.stringify(d).slice(0, 80);
  }
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalBg')) {
    document.getElementById('modalBg').style.display = 'none';
  }
}

function renderGapWarnings(data) {
  const el = document.getElementById('gapAlerts');
  let html = '';

  if (data.sequence_gaps && data.sequence_gaps.length > 0) {
    html += `<div style="background:rgba(239,68,68,.1);border:1px solid var(--red);border-radius:8px;padding:10px 14px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:600;color:var(--red);margin-bottom:4px">Sequence Gap Detected</div>
      <div style="font-size:11px;color:var(--text2)">Missing order numbers: <b style="color:var(--red)">${data.sequence_gaps.join(', ')}</b></div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px">Range: ${data.sequence_range ? data.sequence_range.join(' → ') : 'N/A'}</div>
    </div>`;
  }

  if (data.tracking_gaps && data.tracking_gaps.length > 0) {
    html += `<div style="background:rgba(245,158,11,.1);border:1px solid var(--yellow);border-radius:8px;padding:10px 14px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:600;color:var(--yellow);margin-bottom:4px">KOT Tracking Gap</div>
      <div style="font-size:11px;color:var(--text2)">Missing tracking numbers: <b style="color:var(--yellow)">${data.tracking_gaps.join(', ')}</b></div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px">Range: ${data.tracking_range ? data.tracking_range.join(' → ') : 'N/A'}</div>
    </div>`;
  }

  if (data.ghosted > 0) {
    html += `<div style="background:rgba(239,68,68,.15);border:1px solid var(--red);border-radius:8px;padding:10px 14px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:4px">LOST ORDERS DETECTED</div>
      <div style="font-size:11px;color:var(--text2)">${data.ghosted} order(s) disappeared from Odoo — possible offline loss or manual deletion. Check the event log for details.</div>
    </div>`;
  }

  el.innerHTML = html;
}
</script>
</body>
</html>
