<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Lead Tracker | Hamza Express</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1a;--card:#1a2234;--border:#2a3548;--text:#f1f5f9;--text2:#94a3b8;--muted:#64748b;--orange:#f97316;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--yellow:#eab308;--cyan:#06b6d4;--pink:#ec4899}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:12px;padding-bottom:80px}
.mono{font-family:'JetBrains Mono',monospace}

/* Header + identity */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
.header h1{font-size:16px;font-weight:700}
.header .sub{font-size:10px;color:var(--muted)}
.identity{font-size:10px;color:var(--muted);cursor:pointer;padding:4px 8px;border:1px solid var(--border);border-radius:10px;background:var(--card)}
.identity .who{color:var(--cyan);font-weight:700}

/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
.kpi .label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi .value{font-size:20px;font-weight:800;margin-top:2px}
.kpi .sub{font-size:9px;color:var(--text2)}

/* Search */
.search-box{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-size:12px;font-family:inherit;margin-bottom:8px}
.search-box:focus{outline:none;border-color:var(--orange)}

/* Funnel */
.funnel{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.funnel-step{flex:1;min-width:70px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center;cursor:pointer;transition:border-color .2s}
.funnel-step.active{border-color:var(--orange)}
.funnel-step .count{font-size:18px;font-weight:800}
.funnel-step .label{font-size:8px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.funnel-step .arrow{color:var(--muted);font-size:16px}

/* Lead cards */
.lead-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px}
.lead-card.ctwa_paid{border-left:3px solid var(--orange)}
.lead-card.google_paid{border-left:3px solid var(--blue)}
.lead-card.organic_takeaway,.lead-card.organic_dinein{border-left:3px solid var(--cyan)}
.lead-card.station_qr{border-left:3px solid var(--purple)}
.lead-card.direct,.lead-card.unknown{border-left:3px solid var(--muted)}
.lead-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:6px}
.lead-name{font-size:14px;font-weight:700}
.lead-time{font-size:9px;color:var(--muted);white-space:nowrap}
.lead-meta{display:flex;gap:8px;font-size:11px;color:var(--text2);margin-bottom:6px;flex-wrap:wrap}
.lead-meta span{display:flex;align-items:center;gap:3px}

/* Stage badge */
.stage-badge{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600;text-transform:uppercase}
.stage-badge.ordered{background:rgba(16,185,129,.15);color:var(--green)}
.stage-badge.booked{background:rgba(139,92,246,.15);color:var(--purple)}
.stage-badge.payment_pending{background:rgba(234,179,8,.15);color:var(--yellow)}
.stage-badge.engaged{background:rgba(6,182,212,.15);color:var(--cyan)}
.stage-badge.booking_dropped{background:rgba(239,68,68,.15);color:var(--red)}
.stage-badge.new{background:rgba(100,116,139,.15);color:var(--muted)}
.stage-badge.lost{background:rgba(100,116,139,.1);color:var(--muted);text-decoration:line-through}

/* Tags */
.tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:9px;padding:2px 6px;border-radius:10px;background:rgba(236,72,153,.12);color:var(--pink);font-weight:600;display:inline-flex;align-items:center;gap:3px}
.tag .rm{cursor:pointer;opacity:.6;font-weight:400;margin-left:2px}
.tag .rm:hover{opacity:1;color:var(--red)}
.tag-add{font-size:9px;padding:2px 6px;border-radius:10px;background:none;border:1px dashed var(--border);color:var(--muted);cursor:pointer}

/* Score */
.score-badge{font-size:9px;padding:2px 5px;border-radius:4px;background:var(--bg);color:var(--text2);font-weight:600}
.score-badge.hot{background:rgba(249,115,22,.15);color:var(--orange)}

/* Assignee */
.assign-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:2px 6px;border-radius:8px;background:var(--bg);color:var(--text2);cursor:pointer}
.assign-badge.basheer{background:rgba(6,182,212,.15);color:var(--cyan)}
.assign-badge.faheem{background:rgba(59,130,246,.15);color:var(--blue)}
.assign-badge.mumtaz{background:rgba(139,92,246,.15);color:var(--purple)}
.assign-badge.nihaf{background:rgba(249,115,22,.15);color:var(--orange)}
.assign-badge.unassigned{background:var(--bg);color:var(--muted);border:1px dashed var(--border)}

/* Actions */
.status-select{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:10px;padding:3px 6px;cursor:pointer}
.lead-actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;align-items:center}
.lead-actions a,.lead-actions button{padding:5px 10px;border-radius:5px;font-size:10px;font-weight:600;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.btn-call{background:var(--green);color:#fff}
.btn-wa{background:rgba(16,185,129,.15);color:var(--green)}
.btn-notes{background:var(--card);border:1px solid var(--border);color:var(--text2)}

/* Filters */
.filters{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.filter-btn{padding:5px 10px;border-radius:12px;font-size:10px;font-weight:600;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer}
.filter-btn.active{border-color:var(--orange);color:var(--orange);background:rgba(249,115,22,.08)}

/* Modals */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200}
.modal{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:12px 12px 0 0;padding:16px;z-index:201}
.modal h3{font-size:14px;margin-bottom:8px}
.modal textarea,.modal input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:12px;font-family:inherit}
.modal textarea{resize:vertical;min-height:60px}
.modal .m-actions{display:flex;gap:8px;margin-top:8px}
.modal .m-actions button{flex:1;padding:10px;border-radius:6px;font-weight:600;font-size:12px;border:none;cursor:pointer}
.m-save{background:var(--green);color:#fff}
.m-cancel{background:var(--border);color:var(--text)}

/* Identity modal */
.id-choice{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}
.id-choice button{padding:14px;font-weight:700;font-size:13px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;display:flex;flex-direction:column;gap:2px}
.id-choice button:hover{border-color:var(--orange)}
.id-choice button .role{font-size:10px;color:var(--muted);font-weight:500}

/* Journey tabs */
.j-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:10px;position:sticky;top:52px;background:var(--bg);z-index:2}
.j-tab{padding:8px 12px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.j-tab.active{color:var(--orange);border-bottom-color:var(--orange)}

.refresh-bar{position:fixed;top:0;left:0;right:0;height:2px;background:var(--orange);transition:width .3s;z-index:100}
.empty{text-align:center;padding:20px;color:var(--muted);font-size:12px}

/* Urgency bar (shared across cockpits) */
.urg-bar{display:none;gap:6px;margin:8px 0 10px;flex-wrap:wrap;align-items:center}
.urg-bar.has-items{display:flex}
.urg-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s;white-space:nowrap}
.urg-chip:hover{transform:translateY(-1px);filter:brightness(1.1)}
.urg-chip.critical{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.35)}
.urg-chip.warning{background:rgba(249,115,22,.15);color:var(--orange);border:1px solid rgba(249,115,22,.35)}
.urg-chip.info{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.35)}
.urg-dot{width:6px;height:6px;border-radius:50%;animation:pulse 1.8s infinite}
.urg-chip.critical .urg-dot{background:#f87171}
.urg-chip.warning .urg-dot{background:var(--orange)}
.urg-chip.info .urg-dot{background:#60a5fa}
.urg-src{font-size:9px;opacity:.7;text-transform:uppercase;letter-spacing:.4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<div class="refresh-bar" id="refreshBar" style="width:0"></div>

<div class="header">
  <div>
    <h1>Lead Tracker</h1>
    <div class="sub">Hamza Express | Every WhatsApp contact</div>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <div class="identity" onclick="promptIdentity()" title="Change who you are">
      You: <span class="who" id="whoLabel">—</span>
    </div>
    <div style="font-size:10px;color:var(--muted)" id="lastRefresh">—</div>
  </div>
</div>

<!-- Urgency bar (cross-dashboard) -->
<div class="urg-bar" id="urgBar"></div>

<!-- KPIs -->
<div class="kpi-grid">
  <div class="kpi">
    <div class="label">Total Leads</div>
    <div class="value" id="kTotal" style="color:var(--orange)">-</div>
    <div class="sub" id="kCTWA">- from ads</div>
  </div>
  <div class="kpi">
    <div class="label">Orders</div>
    <div class="value" id="kOrders" style="color:var(--green)">-</div>
    <div class="sub" id="kRevenue">₹-</div>
  </div>
  <div class="kpi">
    <div class="label">Bookings</div>
    <div class="value" id="kBookings" style="color:var(--purple)">-</div>
    <div class="sub" id="kArrived">- arrived</div>
  </div>
  <div class="kpi">
    <div class="label" id="kMineLabel">My Queue</div>
    <div class="value" id="kMine" style="color:var(--cyan)">-</div>
    <div class="sub">assigned to you</div>
  </div>
</div>

<!-- Search -->
<input class="search-box" id="searchInput" placeholder="Search name or phone…" oninput="onSearch(this.value)">

<!-- Date Range -->
<div class="filters" style="margin-bottom:6px">
  <button class="filter-btn" data-range="1" onclick="setRange('1')">Today</button>
  <button class="filter-btn" data-range="7" onclick="setRange('7')">7 Days</button>
  <button class="filter-btn active" data-range="30" onclick="setRange('30')">30 Days</button>
  <button class="filter-btn" data-range="all" onclick="setRange('all')">All Time</button>
</div>

<!-- Funnel -->
<div class="funnel" id="funnel"></div>

<!-- Stage Filters -->
<div class="filters">
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
  <button class="filter-btn" data-filter="new" onclick="setFilter('new')">New</button>
  <button class="filter-btn" data-filter="engaged" onclick="setFilter('engaged')">Engaged</button>
  <button class="filter-btn" data-filter="payment_pending" onclick="setFilter('payment_pending')">Payment</button>
  <button class="filter-btn" data-filter="booking_dropped" onclick="setFilter('booking_dropped')">Book Drop</button>
  <button class="filter-btn" data-filter="ordered" onclick="setFilter('ordered')">Ordered</button>
  <button class="filter-btn" data-filter="booked" onclick="setFilter('booked')">Booked</button>
  <button class="filter-btn" data-filter="ctwa" onclick="setFilter('ctwa')">CTWA</button>
  <button class="filter-btn" data-filter="mine" onclick="setFilter('mine')">👤 Mine</button>
</div>

<!-- Lead List -->
<div id="leadList"></div>

<!-- Journey Panel -->
<div class="modal-overlay" id="journeyOverlay" onclick="closeJourney()"></div>
<div id="journeyPanel" style="display:none;position:fixed;bottom:0;left:0;right:0;top:10%;background:var(--bg);border-radius:12px 12px 0 0;border:1px solid var(--border);z-index:201;overflow-y:auto;padding:0">
  <div style="position:sticky;top:0;background:var(--card);padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;z-index:3">
    <div>
      <h3 id="journeyName" style="font-size:14px;margin:0">Customer Journey</h3>
      <div id="journeyMeta" style="font-size:10px;color:var(--muted);margin-top:2px"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <a id="journeyCall" href="#" class="btn-call" style="font-size:11px;padding:5px 10px;text-decoration:none">Call</a>
      <a id="journeyWA" href="#" target="_blank" class="btn-wa" style="font-size:11px;padding:5px 10px;text-decoration:none">WhatsApp</a>
      <button onclick="closeJourney()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer">&times;</button>
    </div>
  </div>
  <div class="j-tabs">
    <div class="j-tab active" data-tab="conv" onclick="switchJourneyTab('conv')">Conversation</div>
    <div class="j-tab" data-tab="orders" onclick="switchJourneyTab('orders')">Orders / Bookings</div>
    <div class="j-tab" data-tab="audit" onclick="switchJourneyTab('audit')">Audit</div>
  </div>
  <div id="journeyContent" style="padding:0 16px 20px"></div>
</div>

<!-- Notes Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="modal" id="notesModal" style="display:none">
  <h3 id="modalTitle">Notes</h3>
  <textarea id="modalNotes" placeholder="Called, interested in Combo 3, will visit tomorrow…"></textarea>
  <div class="m-actions">
    <button class="m-cancel" onclick="closeModal()">Cancel</button>
    <button class="m-save" onclick="saveNotes()">Save</button>
  </div>
</div>

<!-- Tag Modal -->
<div class="modal" id="tagModal" style="display:none">
  <h3 id="tagTitle">Add Tag</h3>
  <input id="tagInput" placeholder="e.g. hot-lead, family-booking, dnd" list="tagSuggestions">
  <datalist id="tagSuggestions">
    <option value="hot-lead"><option value="warm"><option value="cold">
    <option value="family-booking"><option value="corporate"><option value="repeat-customer">
    <option value="vip"><option value="complaint"><option value="follow-up-next-week">
  </datalist>
  <div class="m-actions">
    <button class="m-cancel" onclick="closeTagModal()">Cancel</button>
    <button class="m-save" onclick="saveTag()">Add</button>
  </div>
</div>

<!-- Identity (first-run) Modal -->
<div class="modal-overlay" id="idOverlay" style="display:none;z-index:300"></div>
<div class="modal" id="idModal" style="display:none;z-index:301">
  <h3>Who are you?</h3>
  <div style="font-size:10px;color:var(--muted);margin-bottom:4px">Every change is logged against your name.</div>
  <div class="id-choice">
    <button onclick="setIdentity('basheer')"><span>Basheer</span><span class="role">Sales & Marketing Lead</span></button>
    <button onclick="setIdentity('faheem')"><span>Faheem</span><span class="role">Execution</span></button>
    <button onclick="setIdentity('mumtaz')"><span>Mumtaz</span><span class="role">Bookings / Dine-in</span></button>
    <button onclick="setIdentity('nihaf')"><span>Nihaf</span><span class="role">Campaigns / MD</span></button>
  </div>
</div>

<script>
const API = '/api/leads';
let data = { leads: [], metrics: {}, sources: [] };
let currentFilter = 'all';
let currentRange = '30';
let currentLeadId = null;
let currentQuery = '';
let actor = localStorage.getItem('hn_leads_actor') || null;
let currentJourneyTab = 'conv';
let journeyCache = null;

// ── Identity ──────────────────────────────────────────────────────────────
function promptIdentity() {
  document.getElementById('idOverlay').style.display = '';
  document.getElementById('idModal').style.display = '';
}
function setIdentity(who) {
  actor = who;
  localStorage.setItem('hn_leads_actor', who);
  document.getElementById('whoLabel').textContent = who.charAt(0).toUpperCase() + who.slice(1);
  document.getElementById('idOverlay').style.display = 'none';
  document.getElementById('idModal').style.display = 'none';
  renderKPIs(); renderLeads();
}
function ensureIdentity() {
  if (actor) {
    document.getElementById('whoLabel').textContent = actor.charAt(0).toUpperCase() + actor.slice(1);
  } else {
    promptIdentity();
  }
}

// ── Data load ─────────────────────────────────────────────────────────────
async function loadData() {
  const bar = document.getElementById('refreshBar');
  bar.style.width = '30%';
  try {
    const rangeParam = currentRange === 'all'
      ? '&show=all'
      : '&from=' + new Date(Date.now() - parseInt(currentRange) * 86400000).toISOString().slice(0, 10);
    const res = await fetch(API + '?action=list' + rangeParam);
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    data = json;
    renderKPIs();
    renderFunnel();
    renderLeads();
    bar.style.width = '100%';
    setTimeout(() => bar.style.width = '0', 300);
    document.getElementById('lastRefresh').textContent = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  } catch (e) { console.error(e); bar.style.width = '0'; }
}

// ── Render: KPIs ──────────────────────────────────────────────────────────
function renderKPIs() {
  const m = data.metrics || {};
  document.getElementById('kTotal').textContent = m.totalLeads ?? 0;
  document.getElementById('kCTWA').textContent = (m.ctwaLeads ?? 0) + ' from ads';
  document.getElementById('kOrders').textContent = m.orders ?? 0;
  document.getElementById('kRevenue').textContent = '\u20B9' + (m.revenue ?? 0).toLocaleString();
  document.getElementById('kBookings').textContent = m.bookings ?? 0;
  document.getElementById('kArrived').textContent = (m.arrived ?? 0) + ' arrived';
  const mineCount = actor ? (data.leads || []).filter(l => l.assignee === actor).length : 0;
  document.getElementById('kMine').textContent = mineCount;
  document.getElementById('kMineLabel').textContent = actor ? `${cap(actor)}'s Queue` : 'My Queue';
}

// ── Render: Funnel ────────────────────────────────────────────────────────
function renderFunnel() {
  const stages = [
    { key: 'new',             label: 'New',      color: 'var(--muted)' },
    { key: 'engaged',         label: 'Engaged',  color: 'var(--cyan)' },
    { key: 'payment_pending', label: 'Payment',  color: 'var(--yellow)' },
    { key: 'booking_dropped', label: 'Book Drop',color: 'var(--red)' },
    { key: 'booked',          label: 'Booked',   color: 'var(--purple)' },
    { key: 'ordered',         label: 'Ordered',  color: 'var(--green)' },
  ];
  const counts = {};
  (data.leads || []).forEach(l => { counts[l.stage] = (counts[l.stage] || 0) + 1; });
  document.getElementById('funnel').innerHTML = stages.map((s, i) =>
    `<div class="funnel-step ${currentFilter === s.key ? 'active' : ''}" onclick="setFilter('${s.key}')">
      <div class="count" style="color:${s.color}">${counts[s.key] || 0}</div>
      <div class="label">${s.label}</div>
    </div>${i < stages.length - 1 ? '<div class="funnel-step" style="flex:0;min-width:16px;background:none;border:none;padding:12px 0"><span class="arrow">\u2192</span></div>' : ''}`
  ).join('');
}

// ── Render: Lead List ─────────────────────────────────────────────────────
function renderLeads() {
  let leads = data.leads || [];
  if (currentFilter === 'ctwa') leads = leads.filter(l => l.isCTWA);
  else if (currentFilter === 'mine') leads = leads.filter(l => actor && l.assignee === actor);
  else if (currentFilter !== 'all') leads = leads.filter(l => l.stage === currentFilter);

  if (currentQuery) {
    const q = currentQuery.toLowerCase();
    leads = leads.filter(l =>
      (l.name || '').toLowerCase().includes(q) ||
      (l.phone || '').includes(q) ||
      (l.waId || '').includes(q)
    );
  }

  if (leads.length === 0) {
    document.getElementById('leadList').innerHTML = '<div class="empty">No leads in this category</div>';
    return;
  }

  document.getElementById('leadList').innerHTML = leads.map(renderLeadCard).join('');
}

function renderLeadCard(l) {
  const phone = l.phone;
  const callLink = 'tel:+91' + phone;
  const waLink = 'https://wa.me/91' + phone;
  const needsCall = ['new', 'engaged', 'payment_pending', 'booking_dropped'].includes(l.stage)
    && l.status !== 'converted' && l.status !== 'not_interested' && l.status !== 'dnd';
  const assignee = l.assignee || 'unassigned';
  const tags = Array.isArray(l.tags) ? l.tags : [];
  const scoreClass = (l.score || 0) >= 60 ? 'hot' : '';

  return `
  <div class="lead-card ${l.source || 'unknown'}">
    <div class="lead-top">
      <div style="min-width:0;flex:1">
        <span class="lead-name">${escHtml(l.name)}</span>
        <span class="stage-badge ${l.stage}">${formatStage(l.stage)}</span>
        ${l.isCTWA ? '<span style="font-size:8px;color:var(--orange);margin-left:4px">CTWA</span>' : ''}
        ${(l.score || 0) > 0 ? `<span class="score-badge ${scoreClass}" title="Lead score">${l.score}</span>` : ''}
      </div>
      <span class="lead-time">${timeAgo(l.lastSeen || l.firstSeen)}</span>
    </div>
    <div class="lead-meta">
      <span>\u260E <a href="${callLink}" style="color:var(--blue);text-decoration:none">${phone}</a></span>
      ${l.totalOrders > 0 ? `<span style="color:var(--green)">${l.totalOrders} orders (\u20B9${l.totalSpent})</span>` : ''}
      ${l.source && l.source !== 'direct' && l.source !== 'unknown' ? `<span>via ${l.source}</span>` : ''}
      ${l.bookingInfo ? `<span style="color:var(--purple)">Booking: ${l.bookingInfo}</span>` : ''}
    </div>
    <div class="tags">
      ${tags.map(t => `<span class="tag">${escHtml(t)}<span class="rm" onclick="removeTag('${l.waId}','${esc(t)}')">\u00D7</span></span>`).join('')}
      <span class="tag-add" onclick="openTagModal('${l.waId}','${esc(l.name)}')">+ tag</span>
    </div>
    ${l.lastMessage ? `<div style="font-size:10px;color:${l.lastMessageDir === 'in' ? 'var(--green)' : 'var(--blue)'};margin-top:6px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${l.lastMessageDir === 'in' ? '\u2192 ' : '\u2190 '}${escHtml((l.lastMessage || '').substring(0, 80))}</div>` : ''}
    ${l.notes ? `<div style="font-size:10px;color:var(--text2);font-style:italic;margin-top:4px">\u{1F4CC} ${escHtml(l.notes)}</div>` : ''}
    <div class="lead-actions">
      ${needsCall ? `<a href="${callLink}" class="btn-call">\u260E Call</a>` : ''}
      <a href="${waLink}" target="_blank" class="btn-wa">\u{1F4AC} WA</a>
      <select class="status-select" onchange="updateStatus('${l.waId}', this.value)" title="Status">
        <option value="new" ${l.status === 'new' ? 'selected' : ''}>New</option>
        <option value="called" ${l.status === 'called' ? 'selected' : ''}>Called</option>
        <option value="interested" ${l.status === 'interested' ? 'selected' : ''}>Interested</option>
        <option value="converted" ${l.status === 'converted' ? 'selected' : ''}>Converted</option>
        <option value="not_interested" ${l.status === 'not_interested' ? 'selected' : ''}>Not Interested</option>
        <option value="follow_up" ${l.status === 'follow_up' ? 'selected' : ''}>Follow Up</option>
        <option value="dnd" ${l.status === 'dnd' ? 'selected' : ''}>DND</option>
      </select>
      <select class="status-select assign-badge ${assignee}" onchange="updateAssignee('${l.waId}', this.value)" title="Assignee" style="padding:3px 8px">
        <option value="unassigned" ${assignee === 'unassigned' ? 'selected' : ''}>\u{1F464} unassigned</option>
        <option value="basheer" ${assignee === 'basheer' ? 'selected' : ''}>\u{1F464} Basheer</option>
        <option value="faheem" ${assignee === 'faheem' ? 'selected' : ''}>\u{1F464} Faheem</option>
        <option value="mumtaz" ${assignee === 'mumtaz' ? 'selected' : ''}>\u{1F464} Mumtaz</option>
        <option value="nihaf" ${assignee === 'nihaf' ? 'selected' : ''}>\u{1F464} Nihaf</option>
      </select>
      <button class="btn-notes" onclick="openNotes('${l.waId}','${esc(l.name)}')" title="Notes">\u{1F4DD}</button>
      <button class="btn-notes" onclick="openJourney('${l.waId}','${esc(l.name)}')" style="color:var(--cyan)" title="Journey">\u{1F50D}</button>
    </div>
  </div>`;
}

// ── Filters ───────────────────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderLeads();
  renderFunnel();
}
function setRange(r) {
  currentRange = r;
  document.querySelectorAll('[data-range]').forEach(b => b.classList.toggle('active', b.dataset.range === r));
  loadData();
}
function onSearch(v) {
  currentQuery = v.trim();
  renderLeads();
}

// ── Mutations ─────────────────────────────────────────────────────────────
async function patchLead(wa_id, patch) {
  if (!actor) { promptIdentity(); return false; }
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ wa_id, patch, actor }),
  });
  const j = await res.json();
  if (!j.success) { alert('Update failed: ' + j.error); return false; }
  // optimistic local update
  const idx = data.leads.findIndex(l => l.waId === wa_id);
  if (idx >= 0 && j.lead) data.leads[idx] = { ...data.leads[idx], ...j.lead };
  return true;
}

async function updateStatus(waId, status) {
  const ok = await patchLead(waId, { status });
  if (ok) { renderKPIs(); renderLeads(); }
}
async function updateAssignee(waId, assignee) {
  const ok = await patchLead(waId, { assignee });
  if (ok) { renderKPIs(); renderLeads(); }
}
async function removeTag(waId, tag) {
  const l = data.leads.find(x => x.waId === waId);
  if (!l) return;
  const next = (l.tags || []).filter(t => t !== tag);
  const ok = await patchLead(waId, { tags: next });
  if (ok) renderLeads();
}

// ── Notes modal ───────────────────────────────────────────────────────────
function openNotes(waId, name) {
  if (!actor) { promptIdentity(); return; }
  currentLeadId = waId;
  document.getElementById('modalTitle').textContent = 'Notes — ' + name;
  const l = data.leads.find(x => x.waId === waId);
  document.getElementById('modalNotes').value = l ? (l.notes || '') : '';
  document.getElementById('notesModal').style.display = '';
  document.getElementById('modalOverlay').style.display = '';
}
function closeModal() {
  document.getElementById('notesModal').style.display = 'none';
  document.getElementById('modalOverlay').style.display = 'none';
}
async function saveNotes() {
  const notes = document.getElementById('modalNotes').value;
  const ok = await patchLead(currentLeadId, { notes });
  closeModal();
  if (ok) renderLeads();
}

// ── Tag modal ─────────────────────────────────────────────────────────────
function openTagModal(waId, name) {
  if (!actor) { promptIdentity(); return; }
  currentLeadId = waId;
  document.getElementById('tagTitle').textContent = 'Add tag — ' + name;
  document.getElementById('tagInput').value = '';
  document.getElementById('tagModal').style.display = '';
  document.getElementById('modalOverlay').style.display = '';
  setTimeout(() => document.getElementById('tagInput').focus(), 50);
}
function closeTagModal() {
  document.getElementById('tagModal').style.display = 'none';
  document.getElementById('modalOverlay').style.display = 'none';
}
async function saveTag() {
  const v = document.getElementById('tagInput').value.trim().toLowerCase().replace(/\s+/g, '-');
  if (!v) { closeTagModal(); return; }
  const l = data.leads.find(x => x.waId === currentLeadId);
  if (!l) { closeTagModal(); return; }
  const next = Array.from(new Set([...(l.tags || []), v]));
  const ok = await patchLead(currentLeadId, { tags: next });
  closeTagModal();
  if (ok) renderLeads();
}

// ── Journey Viewer ────────────────────────────────────────────────────────
async function openJourney(waId, name) {
  document.getElementById('journeyOverlay').style.display = '';
  document.getElementById('journeyPanel').style.display = '';
  document.getElementById('journeyName').textContent = name + ' — Journey';
  document.getElementById('journeyContent').innerHTML = '<div class="empty">Loading…</div>';
  currentJourneyTab = 'conv';
  document.querySelectorAll('.j-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'conv'));

  const phone = waId.replace(/^91/, '');
  document.getElementById('journeyCall').href = 'tel:+91' + phone;
  document.getElementById('journeyWA').href = 'https://wa.me/91' + phone;

  try {
    const res = await fetch(API + '?action=history&wa_id=' + waId);
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    journeyCache = json;

    const u = json.user || {};
    const s = json.session || {};
    const lead = json.lead || {};

    document.getElementById('journeyMeta').innerHTML =
      (lead.source || u.first_source || 'direct') +
      ' &middot; ' + (u.total_orders || 0) + ' orders' +
      (u.total_spent ? ' (&#8377;' + Math.round(u.total_spent) + ')' : '') +
      ' &middot; Joined ' + timeAgo(u.created_at) +
      (lead.isCTWA ? ' &middot; <span style="color:var(--orange)">CTWA</span>' : '') +
      (lead.assignee ? ' &middot; \u{1F464} ' + cap(lead.assignee) : '');

    renderJourneyTab();
  } catch (e) {
    document.getElementById('journeyContent').innerHTML = '<div class="empty">Error: ' + e.message + '</div>';
  }
}

function switchJourneyTab(tab) {
  currentJourneyTab = tab;
  document.querySelectorAll('.j-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  renderJourneyTab();
}

function renderJourneyTab() {
  if (!journeyCache) return;
  const { user: u = {}, session: s = {}, messages = [], orders = [], bookings = [], audit = [] } = journeyCache;
  const el = document.getElementById('journeyContent');
  let html = '';

  if (currentJourneyTab === 'conv') {
    html += '<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--cyan);margin-bottom:6px;text-transform:uppercase">Conversation (' + messages.length + ' messages)</div>';
    if (messages.length === 0) html += '<div class="empty">No messages logged yet</div>';
    else {
      messages.forEach(m => {
        if (m.msg_type === 'lead_status' || m.msg_type === 'lead_notes') return;
        const isIn = m.direction === 'in';
        const bgColor = isIn ? 'rgba(16,185,129,.08)' : 'rgba(59,130,246,.08)';
        const borderColor = isIn ? 'var(--green)' : 'var(--blue)';
        const label = isIn ? 'Customer' : 'Bot';
        html += '<div style="background:' + bgColor + ';border-left:2px solid ' + borderColor + ';border-radius:4px;padding:6px 8px;margin-bottom:3px;font-size:10px">';
        html += '<div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-weight:600;color:' + borderColor + '">' + label + '</span><span style="color:var(--muted)">' + formatTime(m.created_at) + '</span></div>';
        html += '<div style="color:var(--text2);word-break:break-word">' + escHtml(m.content || m.msg_type || '') + '</div>';
        html += '</div>';
      });
    }
    html += '</div>';
    if (s.state) {
      html += '<div style="font-size:10px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px;margin-top:8px">';
      html += 'State: <strong>' + s.state + '</strong>';
      if (s.cart_total > 0) html += ' &middot; Cart: &#8377;' + Math.round(s.cart_total);
      if (s.ad_headline) html += ' &middot; Ad: ' + escHtml(s.ad_headline);
      if (s.ad_source_id) html += ' &middot; ad_id: <span class="mono">' + s.ad_source_id + '</span>';
      if (s.counter_source) html += ' &middot; Station: ' + s.counter_source;
      html += '</div>';
    }
  }

  else if (currentJourneyTab === 'orders') {
    if (orders.length > 0) {
      html += '<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--green);margin-bottom:6px;text-transform:uppercase">Orders</div>';
      orders.forEach(o => {
        html += '<div style="background:var(--card);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:6px;padding:8px;margin-bottom:4px;font-size:11px">';
        html += '<div style="display:flex;justify-content:space-between"><span style="font-weight:600">' + escHtml(o.order_code || '') + '</span><span style="color:var(--muted)">' + timeAgo(o.created_at) + '</span></div>';
        html += '<div style="color:var(--text2);margin-top:2px">&#8377;' + Math.round(o.total || 0) + ' &middot; ' + (o.payment_status || '') + ' &middot; ' + (o.status || '') + '</div>';
        try { const items = JSON.parse(o.items || '[]'); items.forEach(it => { html += '<div style="color:var(--muted);font-size:10px">\u2022 ' + escHtml(it.name || it.code || '') + ' x' + (it.qty || 1) + '</div>'; }); } catch (e) { }
        html += '</div>';
      });
      html += '</div>';
    }
    if (bookings.length > 0) {
      html += '<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--purple);margin-bottom:6px;text-transform:uppercase">Bookings</div>';
      bookings.forEach(b => {
        html += '<div style="background:var(--card);border:1px solid var(--border);border-left:3px solid var(--purple);border-radius:6px;padding:8px;margin-bottom:4px;font-size:11px">';
        html += '<div style="font-weight:600">' + (b.booking_date || '') + ' ' + (b.booking_time || '') + ' &middot; ' + (b.party_size || '') + ' guests</div>';
        html += '<div style="color:var(--text2)">' + escHtml(b.guest_name || '') + ' &middot; ' + (b.status || '') + (b.mumtaz_status ? ' &middot; Mumtaz: ' + b.mumtaz_status : '') + '</div>';
        if (b.special_request) html += '<div style="color:var(--yellow);font-size:10px">' + escHtml(b.special_request) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }
    if (orders.length === 0 && bookings.length === 0) html += '<div class="empty">No orders or bookings yet</div>';
  }

  else if (currentJourneyTab === 'audit') {
    if (audit.length === 0) html += '<div class="empty">No audit entries</div>';
    else {
      html += '<div style="font-size:10px;color:var(--muted);margin-bottom:8px">Most recent first. Every CRM change is logged.</div>';
      audit.forEach(a => {
        const fieldLabel = a.field.startsWith('_') ? a.field.slice(1) : a.field;
        html += '<div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:4px;font-size:11px">';
        html += '<div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-weight:600;color:var(--orange)">' + cap(a.actor) + '</span><span style="color:var(--muted);font-size:10px">' + formatTime(a.at) + '</span></div>';
        html += '<div style="color:var(--text2)">changed <strong>' + fieldLabel + '</strong>';
        if (a.old_value !== null || a.new_value !== null) {
          html += ' from <span style="color:var(--red)">' + escHtml(a.old_value || '\u2014') + '</span>';
          html += ' \u2192 <span style="color:var(--green)">' + escHtml(a.new_value || '\u2014') + '</span>';
        }
        html += '</div></div>';
      });
    }
  }

  el.innerHTML = html;
}

function closeJourney() {
  document.getElementById('journeyPanel').style.display = 'none';
  document.getElementById('journeyOverlay').style.display = 'none';
  journeyCache = null;
}

// ── Helpers ───────────────────────────────────────────────────────────────
function formatStage(s) {
  return { new: 'New', engaged: 'Engaged', payment_pending: 'Payment', booking_dropped: 'Book Drop', booked: 'Booked', ordered: 'Ordered', lost: 'Lost' }[s] || s;
}
function timeAgo(iso) {
  if (!iso) return '';
  const m = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
  if (m < 1) return 'now';
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h';
  return Math.floor(h / 24) + 'd';
}
function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}
function esc(s) { return (s || '').replace(/'/g, "\\'"); }
function escHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function cap(s) { return (s || '').charAt(0).toUpperCase() + (s || '').slice(1); }

// ── Shared urgency bar ────────────────────────────────────────────────────
async function loadUrgency() {
  const bar = document.getElementById('urgBar');
  if (!bar) return;
  try {
    const res = await fetch('/api/urgency');
    const d = await res.json();
    if (!d.success || !d.items || d.items.length === 0) {
      bar.classList.remove('has-items');
      bar.innerHTML = '';
      return;
    }
    bar.innerHTML = d.items.map(it => `
      <a class="urg-chip ${it.severity}" href="${it.action}" title="${it.source}">
        <span class="urg-dot"></span>
        <span class="urg-src">${it.source}</span>
        <span>${escHtml(it.text)}</span>
      </a>
    `).join('');
    bar.classList.add('has-items');
  } catch (e) {
    bar.classList.remove('has-items');
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────
ensureIdentity();
// Honour ?filter=stage on cold-load so urgency chips can deep-link into a specific queue
const qp = new URLSearchParams(window.location.search).get('filter');
if (qp) {
  const valid = ['all','new','engaged','payment_pending','booking_dropped','ordered','booked','ctwa','mine'];
  if (valid.includes(qp)) currentFilter = qp;
}
loadData();
loadUrgency();
setInterval(loadData, 15000);
setInterval(loadUrgency, 60000);
</script>
