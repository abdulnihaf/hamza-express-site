<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Lead Tracker | Hamza Express</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1a;--card:#1a2234;--border:#2a3548;--text:#f1f5f9;--text2:#94a3b8;--muted:#64748b;--orange:#f97316;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--yellow:#eab308;--cyan:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:12px;padding-bottom:80px}
.mono{font-family:'JetBrains Mono',monospace}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.header h1{font-size:16px;font-weight:700}
.header .sub{font-size:10px;color:var(--muted)}

/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
.kpi .label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi .value{font-size:20px;font-weight:800;margin-top:2px}
.kpi .sub{font-size:9px;color:var(--text2)}

/* Funnel */
.funnel{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.funnel-step{flex:1;min-width:80px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center;cursor:pointer;transition:border-color .2s}
.funnel-step.active{border-color:var(--orange)}
.funnel-step .count{font-size:18px;font-weight:800}
.funnel-step .label{font-size:8px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.funnel-step .arrow{color:var(--muted);font-size:16px}

/* Lead cards */
.lead-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px}
.lead-card.ctwa{border-left:3px solid var(--orange)}
.lead-card.organic{border-left:3px solid var(--blue)}
.lead-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.lead-name{font-size:14px;font-weight:700}
.lead-time{font-size:9px;color:var(--muted)}
.lead-meta{display:flex;gap:8px;font-size:11px;color:var(--text2);margin-bottom:6px;flex-wrap:wrap}
.lead-meta span{display:flex;align-items:center;gap:3px}

.stage-badge{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600;text-transform:uppercase}
.stage-badge.ordered{background:rgba(16,185,129,.15);color:var(--green)}
.stage-badge.booked{background:rgba(139,92,246,.15);color:var(--purple)}
.stage-badge.payment_pending{background:rgba(234,179,8,.15);color:var(--yellow)}
.stage-badge.browsing_menu{background:rgba(6,182,212,.15);color:var(--cyan)}
.stage-badge.booking_dropped{background:rgba(239,68,68,.15);color:var(--red)}
.stage-badge.messaged_only{background:rgba(100,116,139,.15);color:var(--muted)}

.status-select{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:10px;padding:3px 6px;cursor:pointer}
.lead-actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.lead-actions a,.lead-actions button{padding:5px 10px;border-radius:5px;font-size:10px;font-weight:600;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.btn-call{background:var(--green);color:#fff}
.btn-wa{background:rgba(16,185,129,.15);color:var(--green)}
.btn-notes{background:var(--card);border:1px solid var(--border);color:var(--text2)}

/* Filter tabs */
.filters{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.filter-btn{padding:5px 10px;border-radius:12px;font-size:10px;font-weight:600;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer}
.filter-btn.active{border-color:var(--orange);color:var(--orange);background:rgba(249,115,22,.08)}

/* Notes modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200}
.modal{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:12px 12px 0 0;padding:16px;z-index:201}
.modal h3{font-size:14px;margin-bottom:8px}
.modal textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:12px;resize:vertical;min-height:60px;font-family:inherit}
.modal .m-actions{display:flex;gap:8px;margin-top:8px}
.modal .m-actions button{flex:1;padding:10px;border-radius:6px;font-weight:600;font-size:12px;border:none;cursor:pointer}
.m-save{background:var(--green);color:#fff}
.m-cancel{background:var(--border);color:var(--text)}

.refresh-bar{position:fixed;top:0;left:0;right:0;height:2px;background:var(--orange);transition:width .3s;z-index:100}
.empty{text-align:center;padding:20px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<div class="refresh-bar" id="refreshBar" style="width:0"></div>

<div class="header">
  <div>
    <h1>Lead Tracker</h1>
    <div class="sub">Hamza Express | Every WhatsApp contact</div>
  </div>
  <div style="font-size:10px;color:var(--muted)" id="lastRefresh">—</div>
</div>

<!-- KPIs -->
<div class="kpi-grid">
  <div class="kpi">
    <div class="label">Total Leads</div>
    <div class="value" id="kTotal" style="color:var(--orange)">-</div>
    <div class="sub" id="kCTWA">- from ads</div>
  </div>
  <div class="kpi">
    <div class="label">Orders</div>
    <div class="value" id="kOrders" style="color:var(--green)">-</div>
    <div class="sub" id="kRevenue">₹-</div>
  </div>
  <div class="kpi">
    <div class="label">Bookings</div>
    <div class="value" id="kBookings" style="color:var(--purple)">-</div>
    <div class="sub" id="kArrived">- arrived</div>
  </div>
  <div class="kpi">
    <div class="label">To Call</div>
    <div class="value" id="kToCall" style="color:var(--red)">-</div>
    <div class="sub">need follow-up</div>
  </div>
</div>

<!-- Funnel -->
<div class="funnel" id="funnel"></div>

<!-- Filters -->
<div class="filters">
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
  <button class="filter-btn" data-filter="messaged_only" onclick="setFilter('messaged_only')">Messaged Only</button>
  <button class="filter-btn" data-filter="browsing_menu" onclick="setFilter('browsing_menu')">Browsing</button>
  <button class="filter-btn" data-filter="payment_pending" onclick="setFilter('payment_pending')">Payment Pending</button>
  <button class="filter-btn" data-filter="booking_dropped" onclick="setFilter('booking_dropped')">Booking Dropped</button>
  <button class="filter-btn" data-filter="ordered" onclick="setFilter('ordered')">Ordered</button>
  <button class="filter-btn" data-filter="booked" onclick="setFilter('booked')">Booked</button>
  <button class="filter-btn" data-filter="ctwa" onclick="setFilter('ctwa')">CTWA Only</button>
</div>

<!-- Lead List -->
<div id="leadList"></div>

<!-- Journey Panel (slides up from bottom) -->
<div class="modal-overlay" id="journeyOverlay" onclick="closeJourney()" style="display:none"></div>
<div id="journeyPanel" style="display:none;position:fixed;bottom:0;left:0;right:0;top:15%;background:var(--bg);border-radius:12px 12px 0 0;border:1px solid var(--border);z-index:201;overflow-y:auto;padding:0">
  <div style="position:sticky;top:0;background:var(--card);padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;z-index:1">
    <div>
      <h3 id="journeyName" style="font-size:14px;margin:0">Customer Journey</h3>
      <div id="journeyMeta" style="font-size:10px;color:var(--muted);margin-top:2px"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <a id="journeyCall" href="#" class="btn-call" style="font-size:11px;padding:5px 10px;text-decoration:none">Call</a>
      <a id="journeyWA" href="#" target="_blank" class="btn-wa" style="font-size:11px;padding:5px 10px;text-decoration:none">WhatsApp</a>
      <button onclick="closeJourney()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer">&times;</button>
    </div>
  </div>
  <div id="journeyContent" style="padding:12px 16px"></div>
</div>

<!-- Notes Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="modal" id="notesModal" style="display:none">
  <h3 id="modalTitle">Notes</h3>
  <textarea id="modalNotes" placeholder="Called, interested in Combo 3, will visit tomorrow..."></textarea>
  <div class="m-actions">
    <button class="m-cancel" onclick="closeModal()">Cancel</button>
    <button class="m-save" onclick="saveNotes()">Save</button>
  </div>
</div>

<script>
const API = '/api/leads';
let data = { leads: [], metrics: {}, sources: [] };
let currentFilter = 'all';
let currentLeadId = null;

async function loadData() {
  const bar = document.getElementById('refreshBar');
  bar.style.width = '30%';
  try {
    const res = await fetch(API);
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    data = json;
    renderKPIs();
    renderFunnel();
    renderLeads();
    bar.style.width = '100%';
    setTimeout(() => bar.style.width = '0', 300);
    document.getElementById('lastRefresh').textContent = new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});
  } catch(e) { console.error(e); bar.style.width = '0'; }
}

function renderKPIs() {
  const m = data.metrics;
  document.getElementById('kTotal').textContent = m.totalLeads;
  document.getElementById('kCTWA').textContent = m.ctwaLeads + ' from ads';
  document.getElementById('kOrders').textContent = m.orders;
  document.getElementById('kRevenue').textContent = '\u20B9' + m.revenue;
  document.getElementById('kBookings').textContent = m.bookings;
  document.getElementById('kArrived').textContent = m.arrived + ' arrived';
  const toCall = data.leads.filter(l => ['messaged_only','browsing_menu','payment_pending','booking_dropped'].includes(l.funnelStage) && l.leadStatus !== 'converted' && l.leadStatus !== 'not_interested').length;
  document.getElementById('kToCall').textContent = toCall;
}

function renderFunnel() {
  const stages = [
    { key: 'messaged_only', label: 'Messaged', color: 'var(--muted)' },
    { key: 'browsing_menu', label: 'Browsing', color: 'var(--cyan)' },
    { key: 'payment_pending', label: 'Payment', color: 'var(--yellow)' },
    { key: 'booking_dropped', label: 'Book Drop', color: 'var(--red)' },
    { key: 'booked', label: 'Booked', color: 'var(--purple)' },
    { key: 'ordered', label: 'Ordered', color: 'var(--green)' },
  ];
  const counts = {};
  data.leads.forEach(l => { counts[l.funnelStage] = (counts[l.funnelStage] || 0) + 1; });
  document.getElementById('funnel').innerHTML = stages.map((s, i) =>
    `<div class="funnel-step ${currentFilter === s.key ? 'active' : ''}" onclick="setFilter('${s.key}')">
      <div class="count" style="color:${s.color}">${counts[s.key] || 0}</div>
      <div class="label">${s.label}</div>
    </div>${i < stages.length - 1 ? '<div class="funnel-step" style="flex:0;min-width:20px;background:none;border:none;padding:12px 0"><span class="arrow">\u2192</span></div>' : ''}`
  ).join('');
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderLeads();
  renderFunnel();
}

function renderLeads() {
  let leads = data.leads;
  if (currentFilter === 'ctwa') {
    leads = leads.filter(l => l.isCTWA);
  } else if (currentFilter !== 'all') {
    leads = leads.filter(l => l.funnelStage === currentFilter);
  }

  if (leads.length === 0) {
    document.getElementById('leadList').innerHTML = '<div class="empty">No leads in this category</div>';
    return;
  }

  document.getElementById('leadList').innerHTML = leads.map(l => {
    const phone = l.phone;
    const callLink = 'tel:+91' + phone;
    const waLink = 'https://wa.me/91' + phone;
    const isCTWA = l.isCTWA;
    const needsCall = ['messaged_only','browsing_menu','payment_pending','booking_dropped'].includes(l.funnelStage) && l.leadStatus !== 'converted' && l.leadStatus !== 'not_interested';

    return `
    <div class="lead-card ${isCTWA ? 'ctwa' : 'organic'}">
      <div class="lead-top">
        <div>
          <span class="lead-name">${l.name}</span>
          <span class="stage-badge ${l.funnelStage}">${formatStage(l.funnelStage)}</span>
          ${isCTWA ? '<span style="font-size:8px;color:var(--orange);margin-left:4px">CTWA</span>' : ''}
        </div>
        <span class="lead-time">${timeAgo(l.lastActivity || l.firstContact)}</span>
      </div>
      <div class="lead-meta">
        <span>\u260E <a href="${callLink}" style="color:var(--blue);text-decoration:none">${phone}</a></span>
        ${l.totalOrders > 0 ? '<span style="color:var(--green)">' + l.totalOrders + ' orders (\u20B9' + l.totalSpent + ')</span>' : ''}
        ${l.source !== 'direct' ? '<span>via ' + l.source + '</span>' : ''}
        ${l.bookingInfo ? '<span style="color:var(--purple)">Booking: ' + l.bookingInfo + '</span>' : ''}
        ${l.cartTotal > 0 ? '<span style="color:var(--yellow)">Cart: \u20B9' + Math.round(l.cartTotal) + '</span>' : ''}
      </div>
      ${l.leadNotes ? '<div style="font-size:10px;color:var(--text2);font-style:italic;margin-bottom:4px">\u{1F4CC} ' + l.leadNotes + '</div>' : ''}
      <div class="lead-actions">
        ${needsCall ? '<a href="' + callLink + '" class="btn-call">\u260E Call</a>' : ''}
        <a href="${waLink}" target="_blank" class="btn-wa">\u{1F4AC} WhatsApp</a>
        <select class="status-select" onchange="updateStatus('${l.waId}', this.value)">
          <option value="new" ${l.leadStatus === 'new' ? 'selected' : ''}>New</option>
          <option value="called" ${l.leadStatus === 'called' ? 'selected' : ''}>Called</option>
          <option value="interested" ${l.leadStatus === 'interested' ? 'selected' : ''}>Interested</option>
          <option value="converted" ${l.leadStatus === 'converted' ? 'selected' : ''}>Converted</option>
          <option value="not_interested" ${l.leadStatus === 'not_interested' ? 'selected' : ''}>Not Interested</option>
          <option value="follow_up" ${l.leadStatus === 'follow_up' ? 'selected' : ''}>Follow Up Later</option>
        </select>
        <button class="btn-notes" onclick="openNotes('${l.waId}','${esc(l.name)}')">\u{1F4DD}</button>
        <button class="btn-notes" onclick="openJourney('${l.waId}','${esc(l.name)}')" style="color:var(--cyan)">\u{1F50D} Journey</button>
      </div>
    </div>`;
  }).join('');
}

function formatStage(s) {
  return { messaged_only:'Messaged', browsing_menu:'Browsing', payment_pending:'Payment Pending', booking_dropped:'Booking Dropped', booked:'Booked', ordered:'Ordered' }[s] || s;
}
function timeAgo(iso) { if(!iso) return ''; const m = Math.floor((Date.now()-new Date(iso).getTime())/60000); if(m<1) return 'now'; if(m<60) return m+'m'; const h=Math.floor(m/60); if(h<24) return h+'h'; return Math.floor(h/24)+'d'; }
function esc(s) { return (s||'').replace(/'/g,"\\'"); }

async function updateStatus(waId, status) {
  await fetch(API + '?action=update', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ waId, status }) });
  loadData();
}

function openNotes(waId, name) {
  currentLeadId = waId;
  document.getElementById('modalTitle').textContent = 'Notes — ' + name;
  const l = data.leads.find(x => x.waId === waId);
  document.getElementById('modalNotes').value = l ? l.leadNotes : '';
  document.getElementById('notesModal').style.display = '';
  document.getElementById('modalOverlay').style.display = '';
}
function closeModal() {
  document.getElementById('notesModal').style.display = 'none';
  document.getElementById('modalOverlay').style.display = 'none';
}
async function saveNotes() {
  await fetch(API + '?action=update', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ waId: currentLeadId, notes: document.getElementById('modalNotes').value }) });
  closeModal();
  loadData();
}

// ── Journey Viewer ──
async function openJourney(waId, name) {
  document.getElementById('journeyOverlay').style.display = '';
  document.getElementById('journeyPanel').style.display = '';
  document.getElementById('journeyName').textContent = name + ' — Journey';
  document.getElementById('journeyContent').innerHTML = '<div class="empty">Loading...</div>';

  const phone = waId.replace(/^91/, '');
  document.getElementById('journeyCall').href = 'tel:+91' + phone;
  document.getElementById('journeyWA').href = 'https://wa.me/91' + phone;

  try {
    const res = await fetch(API + '?action=history&wa_id=' + waId);
    const json = await res.json();
    if (!json.success) throw new Error(json.error);

    const u = json.user || {};
    const s = json.session || {};
    const msgs = json.messages || [];
    const orders = json.orders || [];
    const bookings = json.bookings || [];

    document.getElementById('journeyMeta').innerHTML =
      (u.first_source ? 'Source: ' + u.first_source : 'Direct') +
      ' &middot; ' + (u.total_orders || 0) + ' orders' +
      (u.total_spent ? ' (&rupee;' + Math.round(u.total_spent) + ')' : '') +
      ' &middot; Joined ' + timeAgo(u.created_at) +
      (s.ctwa_clid ? ' &middot; <span style="color:var(--orange)">CTWA</span>' : '') +
      (s.state ? ' &middot; State: ' + s.state : '');

    let html = '';

    // Orders section
    if (orders.length > 0) {
      html += '<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--green);margin-bottom:6px;text-transform:uppercase">Orders</div>';
      orders.forEach(o => {
        html += '<div style="background:var(--card);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:6px;padding:8px;margin-bottom:4px;font-size:11px">';
        html += '<div style="display:flex;justify-content:space-between"><span style="font-weight:600">' + (o.order_code || '') + '</span><span style="color:var(--muted)">' + timeAgo(o.created_at) + '</span></div>';
        html += '<div style="color:var(--text2);margin-top:2px">&rupee;' + Math.round(o.total || 0) + ' &middot; ' + (o.payment_status || '') + ' &middot; ' + (o.status || '') + '</div>';
        try { const items = JSON.parse(o.items || '[]'); items.forEach(it => { html += '<div style="color:var(--muted);font-size:10px">&bull; ' + (it.name || it.code || '') + ' x' + (it.qty || 1) + '</div>'; }); } catch(e) {}
        html += '</div>';
      });
      html += '</div>';
    }

    // Bookings section
    if (bookings.length > 0) {
      html += '<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--purple);margin-bottom:6px;text-transform:uppercase">Bookings</div>';
      bookings.forEach(b => {
        html += '<div style="background:var(--card);border:1px solid var(--border);border-left:3px solid var(--purple);border-radius:6px;padding:8px;margin-bottom:4px;font-size:11px">';
        html += '<div style="font-weight:600">' + (b.booking_date || '') + ' ' + (b.booking_time || '') + ' &middot; ' + (b.party_size || '') + ' guests</div>';
        html += '<div style="color:var(--text2)">' + (b.guest_name || '') + ' &middot; ' + (b.status || '') + (b.mumtaz_status ? ' &middot; Mumtaz: ' + b.mumtaz_status : '') + '</div>';
        if (b.special_request) html += '<div style="color:var(--yellow);font-size:10px">' + b.special_request + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    // Conversation timeline
    html += '<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--cyan);margin-bottom:6px;text-transform:uppercase">Conversation (' + msgs.length + ' messages)</div>';
    if (msgs.length === 0) {
      html += '<div class="empty">No messages logged yet</div>';
    } else {
      msgs.forEach(m => {
        if (m.msg_type === 'lead_status' || m.msg_type === 'lead_notes') return; // skip system entries
        const isIn = m.direction === 'in';
        const bgColor = isIn ? 'rgba(16,185,129,.08)' : 'rgba(59,130,246,.08)';
        const borderColor = isIn ? 'var(--green)' : 'var(--blue)';
        const label = isIn ? 'Customer' : 'Bot';
        html += '<div style="background:' + bgColor + ';border-left:2px solid ' + borderColor + ';border-radius:4px;padding:6px 8px;margin-bottom:3px;font-size:10px">';
        html += '<div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-weight:600;color:' + borderColor + '">' + label + '</span><span style="color:var(--muted)">' + formatTime(m.created_at) + '</span></div>';
        html += '<div style="color:var(--text2);word-break:break-word">' + escHtml(m.content || m.msg_type || '') + '</div>';
        html += '</div>';
      });
    }
    html += '</div>';

    // Session state
    if (s.state) {
      html += '<div style="font-size:10px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px">';
      html += 'Current state: <strong>' + s.state + '</strong>';
      if (s.cart_total > 0) html += ' &middot; Cart: &rupee;' + Math.round(s.cart_total);
      if (s.ad_headline) html += ' &middot; Ad: ' + s.ad_headline;
      if (s.counter_source) html += ' &middot; Station: ' + s.counter_source;
      html += ' &middot; Last: ' + timeAgo(s.updated_at);
      html += '</div>';
    }

    document.getElementById('journeyContent').innerHTML = html;
  } catch(e) {
    document.getElementById('journeyContent').innerHTML = '<div class="empty">Error: ' + e.message + '</div>';
  }
}

function closeJourney() {
  document.getElementById('journeyPanel').style.display = 'none';
  document.getElementById('journeyOverlay').style.display = 'none';
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', { month:'short', day:'numeric' }) + ' ' + d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadData();
setInterval(loadData, 15000);
</script>
