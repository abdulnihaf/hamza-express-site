<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Dine-In Bookings | Hamza Express</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1a;--bg2:#111827;--card:#1a2234;--border:#2a3548;--text:#f1f5f9;--text2:#94a3b8;--muted:#64748b;--orange:#f97316;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--yellow:#eab308;--amber:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:12px;padding-bottom:80px}
.mono{font-family:'JetBrains Mono',monospace}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;padding:8px 0;margin-bottom:12px}
.header h1{font-size:16px;font-weight:700}
.header .subtitle{font-size:10px;color:var(--muted);margin-top:2px}
.date-nav{display:flex;align-items:center;gap:6px}
.date-nav button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:12px;cursor:pointer}
.date-nav button:active{background:var(--border)}
.date-nav .date-label{font-size:12px;font-weight:600;color:var(--orange);min-width:90px;text-align:center}

/* KPI Grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
.kpi .label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi .value{font-size:20px;font-weight:800;margin-top:2px}
.kpi .sub{font-size:9px;color:var(--text2);margin-top:1px}

/* Section */
.section{margin-bottom:16px}
.section-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.section-title .count{background:var(--orange);color:#000;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px}
.section-title .count.green{background:var(--green)}
.section-title .count.red{background:var(--red)}

/* Booking Card */
.booking-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px;position:relative}
.booking-card.pending{border-left:3px solid var(--orange)}
.booking-card.called{border-left:3px solid var(--blue)}
.booking-card.confirmed{border-left:3px solid var(--green)}
.booking-card.arrived{border-left:3px solid var(--purple);opacity:.7}
.booking-card.no_show{border-left:3px solid var(--red);opacity:.5}
.booking-card.cancelled{border-left:3px solid var(--muted);opacity:.4}

.booking-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.guest-name{font-size:14px;font-weight:700}
.guest-tier{font-size:8px;padding:2px 5px;border-radius:8px;font-weight:600;text-transform:uppercase}
.guest-tier.new{background:rgba(249,115,22,.15);color:var(--orange)}
.guest-tier.learning{background:rgba(59,130,246,.15);color:var(--blue)}
.guest-tier.familiar{background:rgba(16,185,129,.15);color:var(--green)}
.guest-tier.regular{background:rgba(139,92,246,.15);color:var(--purple)}

.booking-info{display:flex;gap:12px;font-size:11px;color:var(--text2);margin-bottom:6px;flex-wrap:wrap}
.booking-info span{display:flex;align-items:center;gap:3px}
.booking-info .icon{font-size:12px}

.booking-request{font-size:10px;color:var(--amber);background:rgba(245,158,11,.08);padding:4px 8px;border-radius:4px;margin-bottom:6px}

.booking-actions{display:flex;gap:4px;flex-wrap:wrap}
.booking-actions button,.booking-actions a{padding:5px 10px;border-radius:5px;font-size:10px;font-weight:600;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.btn-call{background:var(--green);color:#fff}
.btn-called{background:var(--blue);color:#fff}
.btn-confirm{background:var(--green);color:#fff}
.btn-arrived{background:var(--purple);color:#fff}
.btn-noshow{background:var(--red);color:#fff}
.btn-notes{background:var(--card);border:1px solid var(--border);color:var(--text2)}

.status-badge{position:absolute;top:8px;right:8px;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600;text-transform:uppercase}
.status-badge.pending{background:rgba(249,115,22,.15);color:var(--orange)}
.status-badge.called{background:rgba(59,130,246,.15);color:var(--blue)}
.status-badge.confirmed{background:rgba(16,185,129,.15);color:var(--green)}
.status-badge.arrived{background:rgba(139,92,246,.15);color:var(--purple)}
.status-badge.no_show{background:rgba(239,68,68,.15);color:var(--red)}
.status-badge.cancelled{background:rgba(100,116,139,.15);color:var(--muted)}

.notes-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px;color:var(--text);font-size:10px;resize:none;margin-top:4px;display:none;font-family:inherit}
.notes-display{font-size:10px;color:var(--text2);margin-top:4px;font-style:italic}

/* Drop-off card */
.dropoff-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--yellow);border-radius:8px;padding:10px;margin-bottom:6px}
.dropoff-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.dropoff-time{font-size:10px;color:var(--muted)}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:6px}
.tab{padding:6px 12px;border-radius:6px 6px 0 0;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;color:var(--muted);background:none}
.tab.active{color:var(--orange);border-color:var(--border);border-bottom-color:var(--bg);background:var(--card)}

/* Refresh indicator */
.refresh-bar{position:fixed;top:0;left:0;right:0;height:2px;background:var(--orange);transition:width .3s;z-index:100}

/* Empty state */
.empty{text-align:center;padding:30px;color:var(--muted);font-size:12px}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200}
.modal{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:12px 12px 0 0;padding:16px;z-index:201;max-height:60vh;overflow-y:auto}
.modal h3{font-size:14px;margin-bottom:10px}
.modal textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:12px;resize:vertical;min-height:60px;font-family:inherit}
.modal .modal-actions{display:flex;gap:8px;margin-top:10px}
.modal .modal-actions button{flex:1;padding:10px;border-radius:6px;font-weight:600;font-size:12px;border:none;cursor:pointer}
.modal .modal-save{background:var(--green);color:#fff}
.modal .modal-cancel{background:var(--border);color:var(--text)}
</style>
</head>
<body>
<div class="refresh-bar" id="refreshBar" style="width:0"></div>

<div class="header">
  <div>
    <h1>Dine-In Bookings</h1>
    <div class="subtitle">Hamza Express | Floor Manager</div>
  </div>
  <div class="date-nav">
    <button onclick="changeDate(-1)">&lt;</button>
    <span class="date-label" id="dateLabel">Today</span>
    <button onclick="changeDate(1)">&gt;</button>
  </div>
</div>

<!-- KPI Grid -->
<div class="kpi-grid">
  <div class="kpi">
    <div class="label">Bookings</div>
    <div class="value" id="kpiBookings" style="color:var(--orange)">-</div>
    <div class="sub" id="kpiGuests">- guests</div>
  </div>
  <div class="kpi">
    <div class="label">Confirmed</div>
    <div class="value" id="kpiConfirmed" style="color:var(--green)">-</div>
    <div class="sub" id="kpiConfRate">-</div>
  </div>
  <div class="kpi">
    <div class="label">Arrived</div>
    <div class="value" id="kpiArrived" style="color:var(--purple)">-</div>
    <div class="sub" id="kpiShowRate">-</div>
  </div>
  <div class="kpi">
    <div class="label">Drop-offs</div>
    <div class="value" id="kpiDropoffs" style="color:var(--yellow)">-</div>
    <div class="sub" id="kpiDropRate">- to recover</div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" data-tab="bookings" onclick="switchTab('bookings')">Bookings</div>
  <div class="tab" data-tab="dropoffs" onclick="switchTab('dropoffs')">Drop-offs</div>
  <div class="tab" data-tab="metrics" onclick="switchTab('metrics')">Metrics</div>
</div>

<!-- Bookings Tab -->
<div id="tab-bookings" class="tab-content">
  <div id="bookingsList"></div>
</div>

<!-- Drop-offs Tab -->
<div id="tab-dropoffs" class="tab-content" style="display:none">
  <div class="section">
    <div class="section-title">
      Started Booking Flow but Didn't Complete
      <span class="count red" id="dropoffCount">0</span>
    </div>
    <div id="dropoffsList"></div>
  </div>
</div>

<!-- Metrics Tab -->
<div id="tab-metrics" class="tab-content" style="display:none">
  <div id="metricsContent" class="section"></div>
</div>

<!-- Notes Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="modal" id="notesModal" style="display:none">
  <h3 id="modalTitle">Add Notes</h3>
  <textarea id="modalNotes" placeholder="E.g., Confirmed for 8 PM, wants corner table..."></textarea>
  <div class="modal-actions">
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
    <button class="modal-save" onclick="saveNotes()">Save</button>
  </div>
</div>

<script>
const API = '/api/bookings';
let currentDate = new Date().toISOString().slice(0, 10);
let currentBookingId = null;
let data = { bookings: [], dropoffs: [], metrics: {} };

// ── Date Navigation ──
function changeDate(delta) {
  const d = new Date(currentDate + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  currentDate = d.toISOString().slice(0, 10);
  updateDateLabel();
  loadData();
}

function updateDateLabel() {
  const today = new Date().toISOString().slice(0, 10);
  const tomorrow = new Date(Date.now() + 86400000).toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  const el = document.getElementById('dateLabel');
  if (currentDate === today) el.textContent = 'Today';
  else if (currentDate === tomorrow) el.textContent = 'Tomorrow';
  else if (currentDate === yesterday) el.textContent = 'Yesterday';
  else {
    const d = new Date(currentDate + 'T12:00:00');
    el.textContent = d.toLocaleDateString('en-IN', { weekday: 'short', month: 'short', day: 'numeric' });
  }
}

// ── Tab Switching ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = '';
  if (tab === 'metrics') loadMetrics();
}

// ── Load Data ──
async function loadData() {
  const bar = document.getElementById('refreshBar');
  bar.style.width = '30%';
  try {
    const res = await fetch(`${API}?date=${currentDate}`);
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    data = json;
    renderBookings();
    renderDropoffs();
    renderKPIs();
    bar.style.width = '100%';
    setTimeout(() => { bar.style.width = '0'; }, 300);
  } catch (e) {
    console.error('Load error:', e);
    bar.style.width = '0';
  }
}

// ── Render KPIs ──
function renderKPIs() {
  const m = data.metrics || {};
  document.getElementById('kpiBookings').textContent = m.activeBookings || 0;
  document.getElementById('kpiGuests').textContent = (m.totalGuests || 0) + ' guests';
  document.getElementById('kpiConfirmed').textContent = m.confirmedByMumtaz || 0;
  const confRate = m.activeBookings > 0 ? Math.round((m.confirmedByMumtaz / m.activeBookings) * 100) : 0;
  document.getElementById('kpiConfRate').textContent = confRate + '% called';
  document.getElementById('kpiArrived').textContent = m.arrived || 0;
  document.getElementById('kpiShowRate').textContent = m.showUpRate + '% show';
  document.getElementById('kpiDropoffs').textContent = m.dropoffs || 0;
  document.getElementById('kpiDropRate').textContent = (m.dropoffs || 0) > 0 ? 'to recover' : 'none';
  document.getElementById('dropoffCount').textContent = m.dropoffs || 0;
}

// ── Render Bookings ──
function renderBookings() {
  const list = document.getElementById('bookingsList');
  if (!data.bookings || data.bookings.length === 0) {
    list.innerHTML = '<div class="empty">No bookings for this date</div>';
    return;
  }
  list.innerHTML = data.bookings.map(b => {
    const ms = b.mumtazStatus || 'pending';
    const phone = b.phone;
    const callLink = `tel:+91${phone}`;
    const whatsappLink = `https://wa.me/91${phone}`;

    let actionBtns = '';
    if (ms === 'pending') {
      actionBtns = `
        <a href="${callLink}" class="btn-call" onclick="markCalled(${b.id})">&#128222; Call</a>
        <button class="btn-confirm" onclick="markStatus(${b.id},'confirmed')">&#10003; Confirm</button>
        <button class="btn-notes" onclick="openNotes(${b.id},'${esc(b.guestName)}')">&#128221;</button>
      `;
    } else if (ms === 'called') {
      actionBtns = `
        <a href="${callLink}" class="btn-call">&#128222; Re-call</a>
        <button class="btn-confirm" onclick="markStatus(${b.id},'confirmed')">&#10003; Confirm</button>
        <button class="btn-noshow" onclick="markStatus(${b.id},'no_show')">No Show</button>
        <button class="btn-notes" onclick="openNotes(${b.id},'${esc(b.guestName)}')">&#128221;</button>
      `;
    } else if (ms === 'confirmed') {
      actionBtns = `
        <button class="btn-arrived" onclick="markArrived(${b.id})">&#127881; Arrived</button>
        <a href="${callLink}" class="btn-call">&#128222; Call</a>
        <button class="btn-noshow" onclick="markStatus(${b.id},'no_show')">No Show</button>
        <button class="btn-notes" onclick="openNotes(${b.id},'${esc(b.guestName)}')">&#128221;</button>
      `;
    } else if (ms === 'arrived') {
      actionBtns = `<span style="font-size:11px;color:var(--green)">&#10003; Guest arrived</span>`;
    } else if (ms === 'no_show') {
      actionBtns = `
        <a href="${callLink}" class="btn-call">&#128222; Call Again</a>
        <button class="btn-confirm" onclick="markStatus(${b.id},'confirmed')">&#8634; Reconfirm</button>
      `;
    }

    return `
    <div class="booking-card ${ms}">
      <span class="status-badge ${ms}">${formatStatus(ms)}</span>
      <div class="booking-top">
        <div>
          <span class="guest-name">${b.guestName}</span>
          <span class="guest-tier ${b.tier}">${b.tier}</span>
          ${b.totalOrders > 0 ? `<span style="font-size:9px;color:var(--muted);margin-left:4px">${b.totalOrders} orders</span>` : ''}
        </div>
      </div>
      <div class="booking-info">
        <span><span class="icon">&#128337;</span> ${b.bookingTime}</span>
        <span><span class="icon">&#128101;</span> ${b.partySize} guests</span>
        <span><span class="icon">&#128222;</span> <a href="${callLink}" style="color:var(--blue);text-decoration:none">${phone}</a></span>
        <span><span class="icon">&#128172;</span> <a href="${whatsappLink}" target="_blank" style="color:var(--green);text-decoration:none">WhatsApp</a></span>
      </div>
      ${b.specialRequest ? `<div class="booking-request">&#128221; ${b.specialRequest}</div>` : ''}
      ${b.mumtazNotes ? `<div class="notes-display">&#128205; ${b.mumtazNotes}</div>` : ''}
      ${b.mumtazCalledAt ? `<div style="font-size:9px;color:var(--muted);margin-bottom:4px">Called: ${timeAgo(b.mumtazCalledAt)}</div>` : ''}
      <div class="booking-actions">${actionBtns}</div>
    </div>`;
  }).join('');
}

// ── Render Drop-offs ──
function renderDropoffs() {
  const list = document.getElementById('dropoffsList');
  if (!data.dropoffs || data.dropoffs.length === 0) {
    list.innerHTML = '<div class="empty">No drop-offs today. Every visitor completed their booking.</div>';
    return;
  }
  list.innerHTML = data.dropoffs.map(d => {
    const phone = d.phone;
    const callLink = `tel:+91${phone}`;
    const whatsappLink = `https://wa.me/91${phone}`;
    const ago = timeAgo(d.startedAt);
    return `
    <div class="dropoff-card">
      <div class="dropoff-top">
        <div>
          <span class="guest-name" style="font-size:13px">${d.guestName}</span>
          <span class="guest-tier ${d.tier}">${d.tier}</span>
        </div>
        <span class="dropoff-time">${ago}</span>
      </div>
      <div class="booking-info" style="margin-top:4px">
        <span>Started booking flow but didn't submit</span>
      </div>
      <div class="booking-actions" style="margin-top:6px">
        <a href="${callLink}" class="btn-call">&#128222; Call & Guide</a>
        <a href="${whatsappLink}" target="_blank" style="padding:5px 10px;border-radius:5px;font-size:10px;font-weight:600;background:rgba(16,185,129,.15);color:var(--green);text-decoration:none">&#128172; WhatsApp</a>
      </div>
    </div>`;
  }).join('');
}

// ── Actions ──
async function markCalled(id) {
  await fetch(`${API}?action=update`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id, mumtaz_status: 'called' })
  });
  loadData();
}

async function markStatus(id, status) {
  await fetch(`${API}?action=update`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id, mumtaz_status: status })
  });
  loadData();
}

async function markArrived(id) {
  await fetch(`${API}?action=update`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id, arrived: true })
  });
  loadData();
}

// ── Notes Modal ──
function openNotes(id, name) {
  currentBookingId = id;
  document.getElementById('modalTitle').textContent = 'Notes — ' + name;
  const b = data.bookings.find(x => x.id === id);
  document.getElementById('modalNotes').value = b ? (b.mumtazNotes || '') : '';
  document.getElementById('notesModal').style.display = '';
  document.getElementById('modalOverlay').style.display = '';
}

function closeModal() {
  document.getElementById('notesModal').style.display = 'none';
  document.getElementById('modalOverlay').style.display = 'none';
}

async function saveNotes() {
  const notes = document.getElementById('modalNotes').value;
  await fetch(`${API}?action=update`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id: currentBookingId, mumtaz_notes: notes })
  });
  closeModal();
  loadData();
}

// ── Metrics Tab ──
async function loadMetrics() {
  const el = document.getElementById('metricsContent');
  el.innerHTML = '<div class="empty">Loading metrics...</div>';
  try {
    const from = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);
    const to = new Date().toISOString().slice(0, 10);
    const res = await fetch(`${API}?action=metrics&from=${from}&to=${to}`);
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    const t = json.totals || {};
    el.innerHTML = `
      <div class="section-title">Last 7 Days</div>
      <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="kpi">
          <div class="label">Total Bookings</div>
          <div class="value" style="color:var(--orange)">${t.total_bookings||0}</div>
        </div>
        <div class="kpi">
          <div class="label">Showed Up</div>
          <div class="value" style="color:var(--green)">${t.arrived||0}</div>
          <div class="sub">${t.showUpRate||0}% rate</div>
        </div>
        <div class="kpi">
          <div class="label">No Shows</div>
          <div class="value" style="color:var(--red)">${t.no_shows||0}</div>
        </div>
      </div>
      <div class="kpi-grid" style="grid-template-columns:repeat(2,1fr);margin-top:6px">
        <div class="kpi">
          <div class="label">Total Guests</div>
          <div class="value" style="color:var(--blue)">${t.total_guests||0}</div>
        </div>
        <div class="kpi">
          <div class="label">Drop-offs Recovered</div>
          <div class="value" style="color:var(--yellow)">${t.dropoffs||0}</div>
          <div class="sub">flow abandonments</div>
        </div>
      </div>
      ${(json.daily||[]).length > 0 ? `
      <div class="section-title" style="margin-top:12px">Daily Breakdown</div>
      <div style="overflow-x:auto">
        <table style="width:100%;font-size:10px;border-collapse:collapse">
          <tr style="color:var(--muted)">
            <th style="text-align:left;padding:4px">Date</th>
            <th style="text-align:center;padding:4px">Booked</th>
            <th style="text-align:center;padding:4px">Confirmed</th>
            <th style="text-align:center;padding:4px">Arrived</th>
            <th style="text-align:center;padding:4px">No Show</th>
            <th style="text-align:center;padding:4px">Guests</th>
          </tr>
          ${json.daily.map(d => `
          <tr style="border-top:1px solid var(--border)">
            <td style="padding:4px">${formatShortDate(d.date)}</td>
            <td style="text-align:center;padding:4px;color:var(--orange)">${d.bookings}</td>
            <td style="text-align:center;padding:4px;color:var(--green)">${d.confirmed}</td>
            <td style="text-align:center;padding:4px;color:var(--purple)">${d.arrived}</td>
            <td style="text-align:center;padding:4px;color:var(--red)">${d.no_shows}</td>
            <td style="text-align:center;padding:4px">${d.guests||0}</td>
          </tr>`).join('')}
        </table>
      </div>` : ''}
    `;
  } catch (e) {
    el.innerHTML = '<div class="empty">Error loading metrics</div>';
  }
}

// ── Helpers ──
function formatStatus(s) {
  return { pending:'Pending', called:'Called', confirmed:'Confirmed', arrived:'Arrived', no_show:'No Show', cancelled:'Cancelled' }[s] || s;
}

function timeAgo(iso) {
  if (!iso) return '';
  const d = Date.now() - new Date(iso).getTime();
  const m = Math.floor(d / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function formatShortDate(d) {
  return new Date(d + 'T12:00:00').toLocaleDateString('en-IN', { weekday: 'short', month: 'short', day: 'numeric' });
}

function esc(s) { return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

// ── Init ──
updateDateLabel();
loadData();
setInterval(loadData, 30000); // Auto-refresh every 30s
</script>
