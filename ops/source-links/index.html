<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HE Source Links</title>
<style>
  :root{--bg:#0a0f1a;--bg2:#111827;--card:#1a2234;--border:#2d3a4f;--text:#f1f5f9;--text2:#94a3b8;--muted:#64748b;--green:#10b981;--red:#ef4444;--orange:#f97316;--blue:#3b82f6}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .container{max-width:800px;margin:0 auto;padding:20px}
  h1{font-size:20px;font-weight:700;margin-bottom:4px}
  .sub{color:var(--muted);font-size:12px;margin-bottom:20px}
  .section-title{font-size:14px;font-weight:700;color:var(--orange);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .card-label{font-size:13px;font-weight:600}
  .card-slug{font-size:11px;color:var(--muted);font-family:monospace}
  .card-clicks{font-size:11px;color:var(--green);font-family:monospace}
  .card-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
  .card-row label{font-size:11px;color:var(--muted);min-width:70px}
  .card-row input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px}
  .card-row input:focus{outline:none;border-color:var(--orange)}
  .card-actions{display:flex;gap:6px;margin-top:8px}
  .btn{padding:6px 14px;border:none;border-radius:6px;font-weight:600;font-size:11px;cursor:pointer}
  .btn-save{background:var(--orange);color:#fff}
  .btn-save:hover{opacity:.9}
  .btn-copy{background:var(--bg2);border:1px solid var(--border);color:var(--text2)}
  .btn-copy:hover{border-color:var(--orange);color:var(--text)}
  .btn-test{background:var(--blue);color:#fff}
  .saved{font-size:11px;color:var(--green);margin-left:8px;opacity:0;transition:opacity .3s}
  .saved.show{opacity:1}
  .url-preview{font-size:10px;color:var(--text2);font-family:monospace;word-break:break-all;padding:6px 8px;background:var(--bg);border-radius:4px;margin-top:6px}
  .toast{position:fixed;top:16px;right:16px;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;z-index:100;transform:translateY(-80px);transition:transform .3s}
  .toast.show{transform:translateY(0)}
  .toast.ok{background:var(--green);color:#fff}
  .toast.err{background:var(--red);color:#fff}
  .stats{display:flex;gap:16px;margin-bottom:16px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;flex:1;text-align:center}
  .stat-val{font-size:20px;font-weight:700;color:var(--orange)}
  .stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="container">
  <h1>Source Links Manager</h1>
  <p class="sub">Edit prefill text → save → all QR codes and linked platforms update automatically via /go/{slug} redirect</p>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="totalLinks">-</div><div class="stat-lbl">Total Links</div></div>
    <div class="stat"><div class="stat-val" id="totalClicks">-</div><div class="stat-lbl">Total Clicks</div></div>
    <div class="stat"><div class="stat-val" id="organicCount">-</div><div class="stat-lbl">Organic</div></div>
    <div class="stat"><div class="stat-val" id="inorganicCount">-</div><div class="stat-lbl">Inorganic</div></div>
  </div>

  <div id="organic"></div>
  <div id="inorganic"></div>
</div>

<script>
const BASE = location.origin;
const API = '/api/source-links';

function toast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (ok ? 'ok' : 'err');
  setTimeout(() => t.className = 'toast', 2500);
}

function renderCard(link) {
  const goUrl = `${BASE}/go/${link.slug}`;
  const waUrl = `https://wa.me/918008002049?text=${encodeURIComponent(link.prefill_text)}`;
  return `
    <div class="card" id="card-${link.slug}">
      <div class="card-header">
        <span class="card-label">${link.label}</span>
        <span class="card-clicks">${link.clicks || 0} clicks</span>
      </div>
      <div class="card-row">
        <label>Slug</label>
        <input value="${link.slug}" disabled style="color:var(--muted);flex:0.4">
        <label>Prefill</label>
        <input id="prefill-${link.slug}" value="${link.prefill_text}">
      </div>
      <div class="url-preview">${goUrl}</div>
      <div class="card-actions">
        <button class="btn btn-save" onclick="save('${link.slug}')">Save</button>
        <button class="btn btn-copy" onclick="copy('${goUrl}')">Copy Link</button>
        <a href="${waUrl}" target="_blank" class="btn btn-test" style="text-decoration:none">Test</a>
        <span class="saved" id="saved-${link.slug}">Saved</span>
      </div>
    </div>`;
}

async function load() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    const links = data.links || [];

    const organic = links.filter(l => l.category === 'organic');
    const inorganic = links.filter(l => l.category === 'inorganic');

    document.getElementById('totalLinks').textContent = links.length;
    document.getElementById('totalClicks').textContent = links.reduce((s, l) => s + (l.clicks || 0), 0);
    document.getElementById('organicCount').textContent = organic.length;
    document.getElementById('inorganicCount').textContent = inorganic.length;

    document.getElementById('organic').innerHTML =
      '<div class="section-title">ORGANIC SOURCES</div>' + organic.map(renderCard).join('');
    document.getElementById('inorganic').innerHTML =
      '<div class="section-title">INORGANIC SOURCES</div>' + inorganic.map(renderCard).join('');
  } catch (e) {
    toast('Failed to load: ' + e.message, false);
  }
}

async function save(slug) {
  const input = document.getElementById('prefill-' + slug);
  const text = input.value.trim();
  if (!text) return toast('Prefill text cannot be empty', false);

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, prefill_text: text })
    });
    if (!res.ok) throw new Error(await res.text());
    const indicator = document.getElementById('saved-' + slug);
    indicator.classList.add('show');
    setTimeout(() => indicator.classList.remove('show'), 2000);
    toast('Updated: ' + slug);
  } catch (e) {
    toast('Save failed: ' + e.message, false);
  }
}

function copy(text) {
  navigator.clipboard.writeText(text).then(() => toast('Copied!')).catch(() => toast('Copy failed', false));
}

load();
</script>
</body>
</html>
