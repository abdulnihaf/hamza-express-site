<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
<meta name="theme-color" content="#0a0f1a" />
<title>Ops Inbox — Hamza Express</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0f1a;
    --card: #141b2d;
    --card-hi: #1a2234;
    --border: #253049;
    --text: #e7edf7;
    --muted: #8696b3;
    --faint: #5a6a87;
    --orange: #f97316;
    --orange-dim: #c65b18;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --blue: #3b82f6;
    --pill: #1f2a44;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', system-ui, sans-serif; font-size: 15px; overflow-x: hidden; }
  body { min-height: 100vh; min-height: 100dvh; }
  button { font-family: inherit; cursor: pointer; border: 0; }
  input, textarea { font-family: inherit; }

  /* ─── Gate screen ─── */
  .gate { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; }
  .gate h1 { font-size: 28px; margin: 0 0 6px; letter-spacing: -0.5px; }
  .gate .sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; text-align: center; }
  .gate .pin-input { width: 240px; padding: 18px 22px; border-radius: 14px; background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 28px; font-family: 'JetBrains Mono', monospace; text-align: center; letter-spacing: 10px; outline: none; }
  .gate .pin-input:focus { border-color: var(--orange); }
  .gate .pin-cta { margin-top: 16px; background: var(--orange); color: #0a0f1a; font-weight: 700; padding: 14px 28px; border-radius: 12px; font-size: 16px; width: 240px; }
  .gate .pin-cta:disabled { opacity: 0.4; cursor: not-allowed; }
  .gate .pin-err { color: var(--red); margin-top: 12px; min-height: 20px; font-size: 13px; }
  .gate .footnote { margin-top: 36px; color: var(--faint); font-size: 12px; text-align: center; max-width: 300px; line-height: 1.5; }
  .hidden { display: none !important; }

  /* ─── Top bar ─── */
  .topbar { position: sticky; top: 0; z-index: 10; background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
  .topbar .brand { font-weight: 700; font-size: 16px; letter-spacing: -0.3px; }
  .topbar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }
  .topbar .me { margin-left: auto; font-size: 13px; color: var(--muted); }
  .topbar .logout { background: transparent; color: var(--muted); font-size: 12px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; margin-left: 8px; }
  .topbar .logout:active { background: var(--card); }

  /* ─── Stats bar ─── */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px 16px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; }
  .stat .n { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: -0.5px; }
  .stat .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; }
  .stat.hot .n { color: var(--red); }
  .stat.warm .n { color: var(--amber); }
  .stat.cool .n { color: var(--blue); }

  /* ─── List ─── */
  .list { padding: 12px 16px 120px; display: flex; flex-direction: column; gap: 10px; }
  .empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 14px; }
  .empty .big { font-size: 48px; margin-bottom: 8px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
  .card:active { background: var(--card-hi); }
  .card.active-esc { border-color: var(--red); box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.2); }
  .card.claimed-by-me { border-color: var(--green); }
  .card .hdr { display: flex; align-items: center; gap: 10px; }
  .card .name { font-weight: 600; font-size: 15px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .pill { font-size: 10px; padding: 3px 8px; border-radius: 999px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .pill.tier-1 { background: rgba(239, 68, 68, 0.15); color: var(--red); }
  .pill.tier-2 { background: rgba(245, 158, 11, 0.15); color: var(--amber); }
  .pill.tier-3 { background: rgba(59, 130, 246, 0.15); color: var(--blue); }
  .pill.claimed { background: rgba(34, 197, 94, 0.15); color: var(--green); }
  .pill.resolved { background: var(--pill); color: var(--muted); }
  .card .meta { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .card .last { color: var(--text); font-size: 14px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card .last.out { color: var(--muted); font-style: italic; }

  /* ─── Thread view ─── */
  .thread-view { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; z-index: 100; }
  .thread-view.hidden { display: none; }
  .thread-hdr { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .thread-hdr .back { background: transparent; color: var(--orange); font-size: 16px; padding: 4px 8px; font-weight: 600; }
  .thread-hdr .t-name { font-weight: 600; font-size: 15px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .thread-hdr .release-btn { background: transparent; color: var(--green); border: 1px solid var(--green); padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
  .thread-hdr .release-btn:active { background: rgba(34, 197, 94, 0.1); }
  .thread-banner { background: rgba(239, 68, 68, 0.08); border-bottom: 1px solid rgba(239, 68, 68, 0.2); color: var(--red); padding: 10px 16px; font-size: 13px; text-align: center; font-weight: 600; }
  .thread-banner.claimed { background: rgba(34, 197, 94, 0.08); border-bottom-color: rgba(34, 197, 94, 0.2); color: var(--green); }
  .thread-banner.resolved { background: var(--pill); color: var(--muted); border-bottom-color: var(--border); }
  .thread-meta { padding: 10px 16px; font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; -webkit-overflow-scrolling: touch; }
  .msg { max-width: 82%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
  .msg.in  { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; }
  .msg.out { align-self: flex-end;   background: var(--orange-dim); color: #fff; border-bottom-right-radius: 4px; }
  .msg.out.agent { background: #0d5c3a; }
  .msg .stamp { display: block; font-size: 10px; color: var(--muted); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  .msg.out .stamp { color: rgba(255,255,255,0.7); }
  .msg-sep { text-align: center; color: var(--faint); font-size: 11px; margin: 8px 0; text-transform: uppercase; letter-spacing: 0.5px; }
  .reply-bar { padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); background: var(--card); display: flex; gap: 8px; align-items: flex-end; }
  .reply-bar textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; color: var(--text); padding: 10px 14px; font-size: 15px; resize: none; max-height: 120px; line-height: 1.3; outline: none; }
  .reply-bar textarea:focus { border-color: var(--orange); }
  .reply-bar .send { background: var(--orange); color: #0a0f1a; font-weight: 700; padding: 10px 18px; border-radius: 20px; font-size: 14px; height: 40px; }
  .reply-bar .send:disabled { opacity: 0.4; }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #0d5c3a; color: #fff; padding: 10px 16px; border-radius: 12px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.err { background: var(--red); color: #fff; }

  /* ─── Release modal ─── */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.hidden { display: none; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; max-width: 360px; width: 100%; }
  .modal h3 { margin: 0 0 8px; font-size: 18px; }
  .modal p { color: var(--muted); font-size: 13px; margin: 0 0 16px; line-height: 1.5; }
  .modal textarea { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; resize: none; height: 80px; outline: none; }
  .modal .btns { display: flex; gap: 8px; margin-top: 16px; }
  .modal .btn { flex: 1; padding: 12px; border-radius: 10px; font-weight: 600; font-size: 14px; }
  .modal .cancel { background: var(--pill); color: var(--text); }
  .modal .confirm { background: var(--green); color: #0a0f1a; }
</style>
</head>
<body>

<!-- ─── Gate ─── -->
<div id="gate" class="gate">
  <h1>Ops Inbox</h1>
  <div class="sub">Enter your 4-digit Ops PIN</div>
  <input id="pin" class="pin-input" type="tel" inputmode="numeric" maxlength="6" autocomplete="off" placeholder="••••" />
  <button id="pin-submit" class="pin-cta" disabled>Unlock</button>
  <div id="pin-err" class="pin-err"></div>
  <div class="footnote">
    For HN Hotels Ops staff only.<br/>
    Your PIN is the same one you use on hnhotels.in/ops/hr.
  </div>
</div>

<!-- ─── Main app ─── -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="dot"></div>
    <div class="brand">Hamza Express · Ops Inbox</div>
    <div class="me" id="me"></div>
    <button class="logout" onclick="logout()">Exit</button>
  </div>
  <div class="stats">
    <div class="stat hot"><div class="n" id="s-open">–</div><div class="l">Open</div></div>
    <div class="stat warm"><div class="n" id="s-mine">–</div><div class="l">Mine</div></div>
    <div class="stat cool"><div class="n" id="s-paused">–</div><div class="l">Paused</div></div>
    <div class="stat"><div class="n" id="s-done">–</div><div class="l">Today</div></div>
  </div>
  <div class="list" id="list"></div>
</div>

<!-- ─── Thread view ─── -->
<div id="thread-view" class="thread-view hidden">
  <div class="thread-hdr">
    <button class="back" onclick="closeThread()">← Back</button>
    <div class="t-name" id="t-name">—</div>
    <button class="release-btn" id="release-btn" onclick="openReleaseModal()">Release</button>
  </div>
  <div class="thread-banner" id="t-banner"></div>
  <div class="thread-meta" id="t-meta"></div>
  <div class="msgs" id="msgs"></div>
  <div class="reply-bar">
    <textarea id="reply-text" placeholder="Type reply to customer…" rows="1"></textarea>
    <button class="send" id="send-btn" onclick="sendReply()">Send</button>
  </div>
</div>

<!-- ─── Release modal ─── -->
<div id="release-modal" class="modal-bg hidden">
  <div class="modal">
    <h3>Release to bot?</h3>
    <p>The bot will resume routing this customer's messages. Use this when the conversation is resolved.</p>
    <textarea id="release-note" placeholder="Optional note (e.g. 'refund issued', 'booked for 8 PM')"></textarea>
    <div class="btns">
      <button class="btn cancel" onclick="closeReleaseModal()">Cancel</button>
      <button class="btn confirm" onclick="confirmRelease()">Release</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // ═══════════════════════════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════════════════════════
  let ME = null;         // { hr_id, name, role, phone }
  let PIN = null;        // session-persisted in sessionStorage
  let LIST = [];         // current conversation list
  let CURRENT_WA = null; // open thread wa_id
  let REFRESH_TIMER = null;
  let THREAD_TIMER = null;

  // Try to restore PIN from sessionStorage (survives reloads but not app close)
  try { PIN = sessionStorage.getItem('ops_inbox_pin') || null; } catch (_) {}

  // ═══════════════════════════════════════════════════════════════════
  // API
  // ═══════════════════════════════════════════════════════════════════
  async function api(action, params = {}, post = false) {
    const url = new URL('/api/inbox', location.origin);
    url.searchParams.set('action', action);
    url.searchParams.set('pin', PIN);
    if (!post) {
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      const r = await fetch(url.toString(), { method: 'GET' });
      return r.json();
    }
    const r = await fetch(url.toString(), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, pin: PIN, ...params }),
    });
    return r.json();
  }

  // ═══════════════════════════════════════════════════════════════════
  // GATE
  // ═══════════════════════════════════════════════════════════════════
  const pinInput = document.getElementById('pin');
  const pinSubmit = document.getElementById('pin-submit');
  const pinErr = document.getElementById('pin-err');

  pinInput.addEventListener('input', () => {
    pinErr.textContent = '';
    pinSubmit.disabled = pinInput.value.length < 1;
  });
  pinInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !pinSubmit.disabled) attemptLogin(); });
  pinSubmit.addEventListener('click', attemptLogin);

  async function attemptLogin() {
    const val = pinInput.value.trim();
    if (!val) return;
    PIN = val;
    try {
      const r = await api('whoami');
      if (!r.ok) {
        PIN = null;
        pinErr.textContent = 'Invalid PIN. Check with HR if unsure.';
        return;
      }
      ME = r.agent;
      try { sessionStorage.setItem('ops_inbox_pin', PIN); } catch (_) {}
      document.getElementById('gate').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('me').textContent = ME.name.split(' ')[0] + ' · ' + ME.role;
      await refreshAll();
      startRefresh();
      // Deep-link: if URL has ?wa=XXX, auto-open that thread
      const urlWa = new URLSearchParams(location.search).get('wa');
      if (urlWa) openThread(urlWa);
    } catch (e) {
      pinErr.textContent = 'Connection error. Try again.';
    }
  }

  function logout() {
    try { sessionStorage.removeItem('ops_inbox_pin'); } catch (_) {}
    PIN = null; ME = null;
    if (REFRESH_TIMER) clearInterval(REFRESH_TIMER);
    if (THREAD_TIMER) clearInterval(THREAD_TIMER);
    location.reload();
  }

  // Auto-login if PIN was restored
  if (PIN) {
    pinInput.value = PIN;
    attemptLogin();
  }

  // ═══════════════════════════════════════════════════════════════════
  // REFRESH
  // ═══════════════════════════════════════════════════════════════════
  async function refreshAll() {
    try {
      // Run cascade tick opportunistically (doesn't block UI)
      api('tick', {}, true).catch(() => {});
      const [listResp, statsResp] = await Promise.all([
        api('list'),
        api('stats'),
      ]);
      if (listResp.ok) renderList(listResp.conversations || []);
      if (statsResp.ok) renderStats(statsResp.stats || {});
    } catch (e) {
      // silent — transient network
    }
  }

  function startRefresh() {
    if (REFRESH_TIMER) clearInterval(REFRESH_TIMER);
    REFRESH_TIMER = setInterval(refreshAll, 15000);
  }

  function renderStats(s) {
    document.getElementById('s-open').textContent   = s.open_escalations ?? 0;
    document.getElementById('s-mine').textContent   = s.claimed_by_me ?? 0;
    document.getElementById('s-paused').textContent = s.paused_total ?? 0;
    document.getElementById('s-done').textContent   = s.resolved_today ?? 0;
  }

  function renderList(convos) {
    LIST = convos;
    const el = document.getElementById('list');
    if (!convos.length) {
      el.innerHTML = '<div class="empty"><div class="big">✓</div>No open conversations.<br/>The bot is handling everything.</div>';
      return;
    }
    el.innerHTML = convos.map(c => {
      const tierPill = c.escalation_status === 'claimed'
        ? '<span class="pill claimed">Claimed</span>'
        : c.escalation_tier
          ? `<span class="pill tier-${c.escalation_tier}">Tier ${c.escalation_tier}</span>`
          : '<span class="pill resolved">Paused</span>';
      const isMine = c.claimed_by === ME.hr_id;
      const klass = 'card' + (c.escalation_status === 'active' ? ' active-esc' : '') + (isMine ? ' claimed-by-me' : '');
      const name = escapeHtml(c.customer_name || ('+' + (c.wa_id || '')));
      const reason = escapeHtml(c.escalation_reason || c.paused_reason || '—');
      const last = escapeHtml((c.last_msg || '').slice(0, 140));
      const dir = c.last_dir === 'out' ? 'out' : '';
      const ago = timeAgo(c.last_at || c.escalation_at || c.updated_at);
      return `
        <div class="${klass}" onclick="openThread('${c.wa_id}')">
          <div class="hdr">
            <div class="name">${name}</div>
            ${tierPill}
          </div>
          <div class="meta">${reason} · ${ago}</div>
          <div class="last ${dir}">${last || '<em>No messages</em>'}</div>
        </div>`;
    }).join('');
  }

  // ═══════════════════════════════════════════════════════════════════
  // THREAD VIEW
  // ═══════════════════════════════════════════════════════════════════
  async function openThread(waId) {
    CURRENT_WA = waId;
    document.getElementById('thread-view').classList.remove('hidden');
    document.getElementById('msgs').innerHTML = '<div class="msg-sep">Loading…</div>';
    await loadThread();
    if (THREAD_TIMER) clearInterval(THREAD_TIMER);
    THREAD_TIMER = setInterval(loadThread, 8000);
  }

  function closeThread() {
    CURRENT_WA = null;
    document.getElementById('thread-view').classList.add('hidden');
    if (THREAD_TIMER) { clearInterval(THREAD_TIMER); THREAD_TIMER = null; }
    refreshAll();
  }

  async function loadThread() {
    if (!CURRENT_WA) return;
    try {
      const r = await api('thread', { wa: CURRENT_WA });
      if (!r.ok) return;
      renderThread(r);
    } catch (e) { /* silent */ }
  }

  function renderThread(data) {
    const user = data.user || {};
    const sess = data.session || {};
    const esc = data.escalation;
    const displayName = user.name || ('+' + CURRENT_WA);
    document.getElementById('t-name').textContent = displayName;

    // Banner
    const banner = document.getElementById('t-banner');
    if (esc && esc.status === 'active') {
      banner.className = 'thread-banner';
      banner.textContent = `🔔 TIER ${esc.tier} — ${esc.reason.toUpperCase()} — UNCLAIMED`;
    } else if (esc && esc.status === 'claimed') {
      banner.className = 'thread-banner claimed';
      banner.textContent = `✓ Claimed (${esc.reason})`;
    } else if (sess.bot_paused) {
      banner.className = 'thread-banner resolved';
      banner.textContent = `Bot paused — ${sess.paused_reason || 'manual'}`;
    } else {
      banner.className = 'thread-banner resolved';
      banner.textContent = 'Bot active';
    }

    // Meta
    const orders = user.total_orders || 0;
    const spend = user.total_spent ? `· ₹${Math.round(user.total_spent)}` : '';
    document.getElementById('t-meta').innerHTML =
      `<span>${orders} order${orders === 1 ? '' : 's'} ${spend}</span>` +
      `<span>+${CURRENT_WA}</span>`;

    // Messages
    const msgsEl = document.getElementById('msgs');
    const wasAtBottom = msgsEl.scrollHeight - msgsEl.scrollTop - msgsEl.clientHeight < 80;
    const html = (data.messages || []).map(m => {
      const isOut = m.direction === 'out';
      const isAgent = isOut && m.intent === 'agent_reply';
      const cls = 'msg ' + (isOut ? 'out' : 'in') + (isAgent ? ' agent' : '');
      const stamp = fmtTime(m.created_at) + (isAgent ? ' · agent' : '');
      const txt = (m.content || `[${m.msg_type}]`);
      return `<div class="${cls}">${escapeHtml(txt)}<span class="stamp">${stamp}</span></div>`;
    }).join('');
    msgsEl.innerHTML = html || '<div class="msg-sep">No messages yet</div>';
    if (wasAtBottom) msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  async function sendReply() {
    const textarea = document.getElementById('reply-text');
    const text = textarea.value.trim();
    if (!text || !CURRENT_WA) return;
    const btn = document.getElementById('send-btn');
    btn.disabled = true; btn.textContent = '…';
    try {
      const r = await api('reply', { wa: CURRENT_WA, text }, true);
      if (r.ok) {
        textarea.value = '';
        textarea.style.height = 'auto';
        toast('Sent');
        await loadThread();
      } else {
        toast('Send failed: ' + (r.error || 'unknown'), true);
      }
    } catch (e) {
      toast('Send failed: network', true);
    } finally {
      btn.disabled = false; btn.textContent = 'Send';
    }
  }

  // Auto-grow textarea
  document.getElementById('reply-text').addEventListener('input', (e) => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  });

  // ═══════════════════════════════════════════════════════════════════
  // RELEASE
  // ═══════════════════════════════════════════════════════════════════
  function openReleaseModal() {
    document.getElementById('release-note').value = '';
    document.getElementById('release-modal').classList.remove('hidden');
  }
  function closeReleaseModal() {
    document.getElementById('release-modal').classList.add('hidden');
  }
  async function confirmRelease() {
    const note = document.getElementById('release-note').value.trim();
    if (!CURRENT_WA) return;
    try {
      const r = await api('release', { wa: CURRENT_WA, note }, true);
      if (r.ok) {
        toast('Released to bot');
        closeReleaseModal();
        closeThread();
      } else {
        toast('Release failed: ' + (r.error || 'unknown'), true);
      }
    } catch (e) { toast('Release failed', true); }
  }

  // ═══════════════════════════════════════════════════════════════════
  // HELPERS
  // ═══════════════════════════════════════════════════════════════════
  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    })[c]);
  }
  function fmtTime(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso.includes('Z') ? iso : iso + 'Z');
      return d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true, timeZone: 'Asia/Kolkata' });
    } catch (_) { return ''; }
  }
  function timeAgo(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso.includes('Z') ? iso : iso + 'Z');
      const s = Math.floor((Date.now() - d.getTime()) / 1000);
      if (s < 60) return 'just now';
      if (s < 3600) return Math.floor(s / 60) + 'm ago';
      if (s < 86400) return Math.floor(s / 3600) + 'h ago';
      return Math.floor(s / 86400) + 'd ago';
    } catch (_) { return ''; }
  }
  function toast(msg, isErr = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isErr ? ' err' : '');
    setTimeout(() => { t.className = 'toast' + (isErr ? ' err' : ''); }, 2200);
  }

  // Visibility: pause polling when tab hidden
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      if (REFRESH_TIMER) clearInterval(REFRESH_TIMER);
      if (THREAD_TIMER) clearInterval(THREAD_TIMER);
    } else {
      if (ME) startRefresh();
      if (CURRENT_WA && !THREAD_TIMER) { loadThread(); THREAD_TIMER = setInterval(loadThread, 8000); }
    }
  });
</script>
</body>
