<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HE WABA Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1a;--bg2:#111827;--card:#1a2234;--border:#2d3a4f;--text:#f1f5f9;--text2:#94a3b8;--muted:#64748b;--green:#10b981;--red:#ef4444;--orange:#f97316;--yellow:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;--cyan:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
.container{max-width:1200px;margin:0 auto;padding:16px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.header h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.header h1::before{content:'';width:5px;height:22px;background:linear-gradient(180deg,var(--orange),var(--yellow));border-radius:3px}
.status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fbtn{padding:6px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer}
.fbtn:hover{border-color:var(--orange);color:var(--text)}
.fbtn.active{background:var(--orange);color:#fff;border-color:var(--orange)}

/* KPI Cards */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:2px}
.kpi-green .kpi-value{color:var(--green)}
.kpi-orange .kpi-value{color:var(--orange)}
.kpi-blue .kpi-value{color:var(--blue)}
.kpi-purple .kpi-value{color:var(--purple)}
.kpi-cyan .kpi-value{color:var(--cyan)}

/* Sections */
.section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.section-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:4px;height:16px;background:var(--orange);border-radius:2px}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-organic{background:rgba(16,185,129,.15);color:var(--green)}
.badge-inorganic{background:rgba(59,130,246,.15);color:var(--blue)}
.badge-unknown{background:rgba(100,116,139,.15);color:var(--muted)}

/* Source Table */
.source-table{width:100%;border-collapse:collapse;font-size:12px}
.source-table th{text-align:left;padding:8px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.source-table td{padding:8px;border-bottom:1px solid rgba(45,58,79,.5)}
.source-table tr:hover{background:rgba(249,115,22,.05)}
.source-table .mono{font-family:'JetBrains Mono',monospace;font-size:12px}
.source-table .highlight{background:rgba(249,115,22,.08);border-left:3px solid var(--orange)}

/* Segments */
.segments{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.seg{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.seg-count{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
.seg-label{font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.seg-rev{font-size:11px;color:var(--text2);margin-top:2px}
.seg-new .seg-count{color:var(--cyan)}
.seg-learning .seg-count{color:var(--blue)}
.seg-familiar .seg-count{color:var(--purple)}
.seg-regular .seg-count{color:var(--orange)}
.seg-dormant .seg-count{color:var(--red)}

/* Funnel */
.funnel{display:flex;flex-direction:column;gap:6px}
.funnel-step{display:flex;align-items:center;gap:10px}
.funnel-bar{height:28px;background:var(--orange);border-radius:4px;min-width:30px;display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:600;color:#fff;font-family:'JetBrains Mono',monospace;transition:width .5s}
.funnel-label{font-size:11px;color:var(--text2);min-width:80px}
.funnel-pct{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* Aggregator Conversion */
.agg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.agg-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.agg-value{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--orange)}
.agg-label{font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:2px}

/* Recent Activity */
.recent-list{max-height:320px;overflow-y:auto}
.recent-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(45,58,79,.3);font-size:12px}
.recent-name{font-weight:600}
.recent-phone{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px}
.recent-meta{display:flex;gap:8px;align-items:center}
.recent-tier{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:600}
.tier-new{background:rgba(6,182,212,.15);color:var(--cyan)}
.tier-learning{background:rgba(59,130,246,.15);color:var(--blue)}
.tier-familiar{background:rgba(139,92,246,.15);color:var(--purple)}
.tier-regular{background:rgba(249,115,22,.15);color:var(--orange)}

/* Daily Chart */
.chart{display:flex;align-items:flex-end;gap:3px;height:120px;padding-top:8px}
.chart-bar{flex:1;background:var(--orange);border-radius:3px 3px 0 0;min-height:4px;cursor:pointer;transition:all .2s;position:relative}
.chart-bar:hover{background:var(--yellow)}
.chart-bar:hover::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-size:10px;white-space:nowrap;color:var(--text)}
.chart-labels{display:flex;gap:3px;margin-top:4px}
.chart-labels span{flex:1;text-align:center;font-size:9px;color:var(--muted)}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.kpis{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>WABA Dashboard</h1>
    <div class="status"><div class="status-dot"></div><span id="statusText">Loading...</span></div>
  </div>

  <div class="filters">
    <button class="fbtn" data-period="1d">Today</button>
    <button class="fbtn active" data-period="7d">7 Days</button>
    <button class="fbtn" data-period="30d">30 Days</button>
    <button class="fbtn" data-period="all">All Time</button>
  </div>

  <!-- KPIs -->
  <div class="kpis" id="kpis"></div>

  <div class="grid-2">
    <!-- Funnel -->
    <div class="section">
      <div class="section-title">Conversion Funnel</div>
      <div class="funnel" id="funnel"></div>
    </div>

    <!-- Segments -->
    <div class="section">
      <div class="section-title">Customer Segments</div>
      <div class="segments" id="segments"></div>
    </div>
  </div>

  <!-- Aggregator Conversion -->
  <div class="section">
    <div class="section-title">Aggregator → Direct Conversion</div>
    <div class="agg-grid" id="aggConversion"></div>
  </div>

  <!-- Source Attribution -->
  <div class="section">
    <div class="section-title">Source Attribution</div>
    <div style="overflow-x:auto">
      <table class="source-table">
        <thead><tr>
          <th>Source</th><th>Type</th><th>Clicks</th><th>Customers</th><th>Orders</th><th>Revenue</th><th>Avg LTV</th><th>Repeat %</th>
        </tr></thead>
        <tbody id="sourceTable"></tbody>
      </table>
    </div>
  </div>

  <div class="grid-2">
    <!-- Daily Trends -->
    <div class="section">
      <div class="section-title">Daily Orders</div>
      <div class="chart" id="dailyChart"></div>
      <div class="chart-labels" id="dailyLabels"></div>
    </div>

    <!-- Recent Activity -->
    <div class="section">
      <div class="section-title">Recent Customers</div>
      <div class="recent-list" id="recentList"></div>
    </div>
  </div>
</div>

<!-- Conversation Panel -->
<div id="convPanel" style="display:none;position:fixed;top:0;right:0;width:420px;height:100vh;background:var(--bg);border-left:1px solid var(--border);z-index:200;overflow-y:auto">
  <div style="padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
    <div>
      <div id="convName" style="font-size:16px;font-weight:700"></div>
      <div id="convMeta" style="font-size:11px;color:var(--muted)"></div>
    </div>
    <button onclick="closeConv()" style="background:none;border:none;color:var(--text);font-size:20px;cursor:pointer">&times;</button>
  </div>
  <div id="convOrders" style="padding:10px 14px;border-bottom:1px solid var(--border)"></div>
  <div id="convMessages" style="padding:14px;display:flex;flex-direction:column;gap:6px"></div>
</div>
<div id="convOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:199" onclick="closeConv()"></div>

<script>
let currentPeriod = '7d';

document.querySelectorAll('.fbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod = btn.dataset.period;
    load();
  });
});

async function load() {
  try {
    const res = await fetch(`/api/waba-analytics?period=${currentPeriod}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    render(data);
    document.getElementById('statusText').textContent = `Live \u00B7 ${new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'})}`;
  } catch (e) {
    document.getElementById('statusText').textContent = 'Error: ' + e.message;
  }
}

function render(d) {
  // KPIs
  document.getElementById('kpis').innerHTML = `
    <div class="kpi kpi-green"><div class="kpi-label">Total Customers</div><div class="kpi-value">${d.overview.totalCustomers}</div></div>
    <div class="kpi kpi-cyan"><div class="kpi-label">New (${currentPeriod})</div><div class="kpi-value">${d.overview.newCustomers}</div></div>
    <div class="kpi kpi-orange"><div class="kpi-label">Orders (paid)</div><div class="kpi-value">${d.overview.totalOrders}</div></div>
    <div class="kpi kpi-green"><div class="kpi-label">Revenue</div><div class="kpi-value">\u20B9${d.overview.revenue.toLocaleString()}</div></div>
    <div class="kpi kpi-blue"><div class="kpi-label">Avg Order</div><div class="kpi-value">\u20B9${d.overview.aov}</div></div>
    <div class="kpi kpi-purple"><div class="kpi-label">Conversion</div><div class="kpi-value">${d.overview.conversionRate}%</div></div>
  `;

  // Funnel
  const maxFunnel = Math.max(d.funnel.clicks, d.funnel.messaged, d.funnel.ordered, 1);
  document.getElementById('funnel').innerHTML = [
    {label: 'Clicked Link', value: d.funnel.clicks},
    {label: 'Messaged Bot', value: d.funnel.messaged},
    {label: 'Paid Order', value: d.funnel.ordered},
  ].map((s, i, arr) => {
    const pct = Math.max((s.value / maxFunnel) * 100, 8);
    const dropoff = i > 0 && arr[i-1].value > 0 ? Math.round((1 - s.value / arr[i-1].value) * 100) : 0;
    return `<div class="funnel-step">
      <span class="funnel-label">${s.label}</span>
      <div class="funnel-bar" style="width:${pct}%">${s.value}</div>
      ${i > 0 ? `<span class="funnel-pct" style="color:var(--red)">-${dropoff}%</span>` : ''}
    </div>`;
  }).join('');

  // Segments
  const segColors = {new:'seg-new',learning:'seg-learning',familiar:'seg-familiar',regular:'seg-regular',dormant:'seg-dormant'};
  document.getElementById('segments').innerHTML = (d.segments || []).map(s =>
    `<div class="seg ${segColors[s.segment] || ''}">
      <div class="seg-count">${s.count}</div>
      <div class="seg-label">${s.segment || 'other'}</div>
      <div class="seg-rev">\u20B9${s.revenue.toLocaleString()}</div>
    </div>`
  ).join('');

  // Aggregator Conversion
  const a = d.aggregatorConversion;
  const convRate = a.total > 0 ? Math.round((a.ordered / a.total) * 100) : 0;
  const retRate = a.ordered > 0 ? Math.round((a.reordered / a.ordered) * 100) : 0;
  document.getElementById('aggConversion').innerHTML = `
    <div class="agg-card"><div class="agg-value">${a.total}</div><div class="agg-label">From Aggregators</div></div>
    <div class="agg-card"><div class="agg-value">${a.ordered}</div><div class="agg-label">Ordered Direct</div></div>
    <div class="agg-card"><div class="agg-value">${convRate}%</div><div class="agg-label">Conversion Rate</div></div>
    <div class="agg-card"><div class="agg-value">${a.reordered}</div><div class="agg-label">Re-ordered</div></div>
    <div class="agg-card"><div class="agg-value">${retRate}%</div><div class="agg-label">Retention Rate</div></div>
    <div class="agg-card"><div class="agg-value">\u20B9${a.revenue.toLocaleString()}</div><div class="agg-label">Revenue</div></div>
  `;

  // Source Table
  const highlight = new Set(['packaging-aggregator', 'packaging-direct']);
  document.getElementById('sourceTable').innerHTML = (d.sources || []).map(s => {
    const isHighlight = highlight.has(s.slug);
    const badge = s.category === 'organic' ? 'badge-organic' : s.category === 'inorganic' ? 'badge-inorganic' : 'badge-unknown';
    const repeatPct = s.customers > 0 ? Math.round(((s.repeatCustomers || 0) / s.customers) * 100) : 0;
    return `<tr class="${isHighlight ? 'highlight' : ''}">
      <td><strong>${s.label || s.slug}</strong></td>
      <td><span class="badge ${badge}">${s.category}</span></td>
      <td class="mono">${s.clicks || 0}</td>
      <td class="mono">${s.customers || 0}</td>
      <td class="mono">${s.orders || 0}</td>
      <td class="mono">\u20B9${Math.round(s.revenue || 0).toLocaleString()}</td>
      <td class="mono">\u20B9${Math.round(s.avgLtv || 0)}</td>
      <td class="mono">${repeatPct}%</td>
    </tr>`;
  }).join('');

  // Daily Chart
  const dailyMax = Math.max(...(d.daily || []).map(d => d.orders), 1);
  document.getElementById('dailyChart').innerHTML = (d.daily || []).map(day => {
    const h = Math.max((day.orders / dailyMax) * 100, 4);
    return `<div class="chart-bar" style="height:${h}%" data-tip="${day.date}: ${day.orders} orders, \u20B9${day.revenue}"></div>`;
  }).join('') || '<div style="color:var(--muted);font-size:12px;padding:20px">No data for this period</div>';

  document.getElementById('dailyLabels').innerHTML = (d.daily || []).map(day =>
    `<span>${day.date.slice(5)}</span>`
  ).join('');

  // Recent Customers (clickable → opens conversation)
  document.getElementById('recentList').innerHTML = (d.recent || []).map(r => {
    const tierClass = {new:'tier-new',learning:'tier-learning',familiar:'tier-familiar',regular:'tier-regular'}[r.tier] || '';
    const ago = timeAgo(r.lastActive);
    return `<div class="recent-item" style="cursor:pointer" onclick="openConv('${r.waId}')">
      <div>
        <span class="recent-name">${r.name}</span>
        <span class="recent-phone">${r.phone}</span>
        <span class="recent-tier ${tierClass}">${r.tier}</span>
        ${r.source && r.source !== 'unknown' ? `<span class="badge badge-organic" style="font-size:9px">${r.source}</span>` : ''}
      </div>
      <div class="recent-meta">
        <span class="mono" style="color:var(--green)">${r.orders} orders</span>
        <span style="color:var(--muted);font-size:10px">${ago}</span>
      </div>
    </div>`;
  }).join('') || '<div style="color:var(--muted);font-size:12px;padding:12px">No customers yet</div>';
}

async function openConv(waId) {
  if (!waId) return;
  document.getElementById('convPanel').style.display = 'block';
  document.getElementById('convOverlay').style.display = 'block';
  document.getElementById('convMessages').innerHTML = '<div style="color:var(--muted);font-size:12px">Loading...</div>';

  try {
    const res = await fetch(`/api/waba-analytics?action=conversation&wa_id=${waId}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    const u = data.user;
    const tier = u.total_orders === 0 ? 'new' : u.total_orders <= 2 ? 'learning' : u.total_orders <= 9 ? 'familiar' : 'regular';
    document.getElementById('convName').textContent = u.name || 'Unknown';
    document.getElementById('convMeta').innerHTML = `${u.wa_id} \u00B7 ${tier} \u00B7 ${u.total_orders || 0} orders \u00B7 \u20B9${Math.round(u.total_spent || 0)} spent${u.first_source ? ' \u00B7 via ' + u.first_source : ''}`;

    // Orders
    document.getElementById('convOrders').innerHTML = (data.orders || []).length > 0
      ? '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Orders</div>' +
        (data.orders || []).map(o => {
          const statusColor = {paid:'var(--green)',pending:'var(--yellow)',cancelled:'var(--red)'}[o.payment_status] || 'var(--muted)';
          let items = '';
          try { items = JSON.parse(o.items).map(i => i.name).join(', '); } catch(e) { items = 'items'; }
          return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:4px;font-size:11px">
            <div style="display:flex;justify-content:space-between"><strong>${o.order_code}</strong><span style="color:${statusColor}">${o.payment_status}</span></div>
            <div style="color:var(--text2);margin-top:2px">${items}</div>
            <div style="color:var(--muted);margin-top:2px">\u20B9${Math.round(o.total)} \u00B7 ${o.status} \u00B7 ${timeAgo(o.created_at)}</div>
          </div>`;
        }).join('')
      : '<div style="font-size:11px;color:var(--muted)">No orders</div>';

    // Messages
    document.getElementById('convMessages').innerHTML = (data.messages || []).length > 0
      ? (data.messages || []).map(m => {
          const isIn = m.direction === 'in';
          const bg = isIn ? 'var(--bg2)' : 'rgba(16,185,129,.1)';
          const align = isIn ? 'flex-start' : 'flex-end';
          const border = isIn ? '1px solid var(--border)' : '1px solid rgba(16,185,129,.3)';
          const label = isIn ? '\u2B05 Customer' : '\u27A1 Bot';
          const labelColor = isIn ? 'var(--cyan)' : 'var(--green)';
          const time = new Date(m.created_at).toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});
          const date = new Date(m.created_at).toLocaleDateString('en-IN', {day:'numeric',month:'short'});
          return `<div style="align-self:${align};max-width:85%;background:${bg};border:${border};border-radius:8px;padding:8px 10px">
            <div style="font-size:9px;color:${labelColor};margin-bottom:2px">${label} \u00B7 ${m.msg_type}</div>
            <div style="font-size:12px;word-break:break-word">${(m.content || '').replace(/</g,'&lt;')}</div>
            <div style="font-size:9px;color:var(--muted);margin-top:3px;text-align:right">${date} ${time}</div>
          </div>`;
        }).join('')
      : '<div style="color:var(--muted);font-size:12px;padding:20px;text-align:center">No messages logged yet.<br>Messages will appear after the next conversation.</div>';
  } catch (e) {
    document.getElementById('convMessages').innerHTML = `<div style="color:var(--red);font-size:12px">Error: ${e.message}</div>`;
  }
}

function closeConv() {
  document.getElementById('convPanel').style.display = 'none';
  document.getElementById('convOverlay').style.display = 'none';
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const min = Math.floor(diff / 60000);
  if (min < 60) return min + 'm ago';
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + 'h ago';
  return Math.floor(hr / 24) + 'd ago';
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
