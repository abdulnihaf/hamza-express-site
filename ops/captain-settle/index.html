<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HE Captain Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0f1a;--bg2:#111827;--card:#1a2234;--border:#2d3a4f;--text:#f1f5f9;--text2:#94a3b8;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;--yellow:#eab308;--orange:#f97316}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}

    /* === PIN SCREEN === */
    .pin-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .pin-screen.hidden{display:none}
    .pin-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center;max-width:360px;width:100%}
    .pin-box .icon{font-size:48px;margin-bottom:20px}
    .pin-box h2{font-size:22px;margin-bottom:8px}
    .pin-box p{color:var(--text2);font-size:14px;margin-bottom:24px}
    .pin-input{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
    .pin-input input{width:48px;height:56px;background:var(--bg2);border:2px solid var(--border);border-radius:12px;color:var(--text);font-size:24px;text-align:center;font-family:'JetBrains Mono',monospace;transition:all 0.2s}
    .pin-input input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,0.2)}
    .pin-input input.filled{border-color:var(--orange);background:rgba(249,115,22,0.08)}
    .pin-success{display:none;align-items:center;gap:8px;justify-content:center;color:var(--orange);font-weight:600;margin-top:16px}
    .pin-success.show{display:flex}
    .pin-error{display:none;color:var(--red);font-size:13px;margin-top:12px}
    .pin-error.show{display:block}

    /* === DASHBOARD === */
    .dashboard{display:none;min-height:100vh;padding-bottom:60px}
    .dashboard.show{display:block}
    .header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
    .header h1{font-size:16px;display:flex;align-items:center;gap:8px}
    .header h1::before{content:'';width:4px;height:20px;background:var(--orange);border-radius:2px}
    .user-badge{display:flex;align-items:center;gap:10px}
    .user-badge .dot{width:8px;height:8px;background:var(--orange);border-radius:50%;animation:pulse 2s infinite}
    .user-badge .name{font-weight:600;font-size:14px}
    .logout-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

    .content{padding:16px;max-width:600px;margin:0 auto}

    /* === HERO: CASH IN HAND === */
    .hero-card{background:var(--card);border:2px solid var(--orange);border-radius:16px;padding:24px;text-align:center;margin-bottom:16px}
    .hero-card.negative{border-color:var(--red)}
    .hero-label{font-size:13px;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:6px}
    .hero-amount{font-size:48px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--orange);line-height:1.2}
    .hero-amount.negative{color:var(--red)}
    .hero-sub{font-size:12px;color:var(--text2);margin-top:8px;font-family:'JetBrains Mono',monospace}
    .hero-period{display:inline-flex;align-items:center;gap:4px;background:var(--bg2);padding:4px 10px;border-radius:6px;margin-top:10px;font-size:11px;color:var(--text2)}

    /* === PRODUCT BREAKDOWN === */
    .section{margin-bottom:16px}
    .section-header{font-size:13px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;padding:0 4px}
    .breakdown-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
    .breakdown-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .breakdown-header .bh-left{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
    .breakdown-header .bh-left .bh-icon{font-size:18px}
    .breakdown-header .bh-total{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
    .breakdown-lines{display:flex;flex-direction:column;gap:6px}
    .breakdown-line{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg2);border-radius:8px}
    .bl-left{display:flex;align-items:center;gap:8px}
    .bl-name{font-size:13px;font-weight:500}
    .bl-right{display:flex;align-items:center;gap:10px}
    .bl-qty{font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace}
    .bl-amount{font-size:14px;font-weight:600;font-family:'JetBrains Mono',monospace}
    .breakdown-empty{padding:12px;text-align:center;color:var(--text2);font-size:13px}
    .sale-order{background:var(--bg2);border-radius:8px;padding:10px 12px}
    .sale-order .so-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .sale-order .so-amount{font-size:16px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--orange)}
    .sale-order .so-time{font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace}
    .sale-order .so-items{display:flex;flex-wrap:wrap;gap:4px}
    .sale-order .so-item{font-size:11px;color:var(--text2);background:var(--card);padding:2px 8px;border-radius:4px}
    .summary-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .summary-row .sr-label{font-size:14px;font-weight:600}
    .summary-row .sr-value{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}

    /* === UPI PAYMENTS === */
    .upi-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 4px}
    .upi-header .uh-left{font-size:13px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:6px}
    .upi-count{background:var(--green);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px}
    .upi-header .uh-total{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--green)}
    .upi-list{display:flex;flex-direction:column;gap:8px}
    .upi-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;transition:all 0.3s}
    .upi-item.new-payment{border-left:3px solid var(--green);animation:newPayment 2s ease-out}
    @keyframes newPayment{0%{background:rgba(34,197,94,0.2);transform:translateX(-4px)}100%{background:transparent;transform:translateX(0)}}
    .upi-item .ui-left{display:flex;flex-direction:column;gap:2px}
    .upi-item .ui-amount{font-size:18px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--green)}
    .upi-item .ui-vpa{font-size:11px;color:var(--text2)}
    .upi-item .ui-time{font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace;text-align:right}
    .upi-empty{text-align:center;padding:24px;color:var(--text2);font-size:13px;background:var(--card);border:1px dashed var(--border);border-radius:10px}

    /* === PAYMENT METHOD ROWS === */
    .pm-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .pm-row .pm-left{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600}
    .pm-row .pm-left .pm-dot{width:10px;height:10px;border-radius:50%}
    .pm-row .pm-value{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
    .pm-row.card-row .pm-dot{background:var(--blue)}
    .pm-row.card-row .pm-value{color:var(--blue)}
    .pm-row.comp-row .pm-dot{background:var(--purple)}
    .pm-row.comp-row .pm-value{color:var(--purple)}

    /* === SETTLEMENT HISTORY === */
    .history-toggle{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;color:var(--text);font-size:14px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;margin-bottom:10px}
    .history-toggle .ht-arrow{transition:transform 0.2s;color:var(--text2)}
    .history-toggle.open .ht-arrow{transform:rotate(180deg)}
    .history-list{display:none;flex-direction:column;gap:8px}
    .history-list.show{display:flex}
    .history-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
    .history-card .hc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .history-card .hc-amount{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--yellow)}
    .history-card .hc-date{font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace}
    .history-card .hc-by{font-size:12px;color:var(--text2);margin-bottom:6px}
    .history-card .hc-breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
    .history-card .hc-stat{background:var(--bg2);border-radius:6px;padding:6px 8px;text-align:center}
    .history-card .hc-stat-val{font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace}
    .history-card .hc-stat-label{font-size:9px;color:var(--text2);text-transform:uppercase}
    .history-empty{text-align:center;padding:20px;color:var(--text2);font-size:13px}

    /* === REFRESH BAR === */
    .refresh-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:10px 16px;display:none;justify-content:space-between;align-items:center;z-index:10;font-size:12px}
    .refresh-bar.show{display:flex}
    .refresh-bar .rb-left{display:flex;align-items:center;gap:8px;color:var(--text2)}
    .refresh-bar .rb-dot{width:6px;height:6px;background:var(--orange);border-radius:50%;animation:pulse 2s infinite}
    .refresh-bar .rb-right{color:var(--text2);cursor:pointer;padding:4px 10px;border-radius:6px;background:var(--bg2);border:1px solid var(--border)}
    .refresh-bar .rb-right:active{background:var(--border)}
    .refresh-bar.loading .rb-dot{background:var(--yellow)}
    .refresh-bar.error .rb-dot{background:var(--red)}

    .loading-text{text-align:center;color:var(--text2);padding:40px;font-size:14px}
  </style>
</head>
<body>
  <!-- PIN SCREEN -->
  <div class="pin-screen" id="pinScreen">
    <div class="pin-box">
      <div class="icon">&#127860;</div>
      <h2>Captain Dashboard</h2>
      <p>Enter your 4-digit PIN</p>
      <div class="pin-input" id="pinInput">
        <input type="password" maxlength="1" inputmode="numeric">
        <input type="password" maxlength="1" inputmode="numeric">
        <input type="password" maxlength="1" inputmode="numeric">
        <input type="password" maxlength="1" inputmode="numeric">
      </div>
      <div class="pin-success" id="pinSuccess"></div>
      <div class="pin-error" id="pinError">Invalid PIN. Try again.</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="header">
      <h1>My Dashboard</h1>
      <div class="user-badge">
        <span class="dot"></span>
        <span class="name" id="userName"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="content">
      <!-- LOADING -->
      <div class="loading-text" id="loadingText">Loading your data...</div>

      <!-- MAIN CONTENT (hidden until data loads) -->
      <div id="mainContent" style="display:none">

        <!-- HERO: CASH IN HAND -->
        <div class="hero-card" id="heroCard">
          <div class="hero-label">Cash you should have</div>
          <div class="hero-amount" id="cashInHand">-</div>
          <div class="hero-sub" id="heroFormula"></div>
          <div class="hero-period" id="heroPeriod"></div>
        </div>

        <!-- PRODUCT BREAKDOWN -->
        <div class="section">
          <div class="section-header">Product Breakdown</div>
          <div class="breakdown-card">
            <div class="breakdown-header">
              <div class="bh-left"><span class="bh-icon">&#128203;</span> Items Sold <span style="font-size:12px;color:var(--text2);font-weight:400" id="productCount">(0)</span></div>
              <div class="bh-total" id="productTotal">-</div>
            </div>
            <div class="breakdown-lines" id="productBreakdown">
              <div class="breakdown-empty">No orders yet</div>
            </div>
          </div>
        </div>

        <!-- ORDER DETAILS -->
        <div class="section">
          <div class="section-header">Orders <span style="font-size:12px;font-weight:400" id="orderCount">(0)</span></div>
          <div style="display:flex;flex-direction:column;gap:8px" id="orderDetails">
            <div class="breakdown-empty" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px">No orders yet</div>
          </div>
        </div>

        <!-- UPI PAYMENTS -->
        <div class="section">
          <div class="upi-header">
            <div class="uh-left">UPI Received <span class="upi-count" id="upiCount">0</span></div>
            <div class="uh-total" id="upiTotal">-</div>
          </div>
          <div class="upi-list" id="upiList"></div>
        </div>

        <!-- CARD + COMP -->
        <div class="section">
          <div class="pm-row card-row">
            <div class="pm-left"><span class="pm-dot"></span> Card Payments</div>
            <div class="pm-value" id="cardTotal">-</div>
          </div>
          <div class="pm-row comp-row">
            <div class="pm-left"><span class="pm-dot"></span> Complimentary</div>
            <div class="pm-value" id="compTotal">-</div>
          </div>
        </div>

        <!-- TOTAL REVENUE -->
        <div class="section">
          <div class="summary-row">
            <span class="sr-label">Total Revenue</span>
            <span class="sr-value" id="totalRevenue">-</span>
          </div>
        </div>

        <!-- SETTLEMENT HISTORY -->
        <div class="section">
          <button class="history-toggle" id="historyToggle" onclick="toggleHistory()">
            <span>Settlement History</span>
            <span class="ht-arrow">&#9660;</span>
          </button>
          <div class="history-list" id="historyList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- REFRESH BAR -->
  <div class="refresh-bar" id="refreshBar">
    <div class="rb-left"><span class="rb-dot"></span><span id="refreshStatus">Auto-refresh 30s</span></div>
    <div class="rb-right" onclick="manualRefresh()">Refresh now</div>
  </div>

  <script>
    const $=id=>document.getElementById(id);
    const fmt=n=>{const r=Math.round(n);return (r<0?'-':'')+'₹'+Math.abs(r).toLocaleString('en-IN')};
    const cleanName=s=>(s||'').replace(/^\[.*?\]\s*/,'');

    let currentCaptain=null;
    let refreshTimer=null;
    let lastUpdateTime=null;
    let lastData=null;
    let previousUpiIds=new Set();
    let timeAgoTimer=null;
    let historyLoaded=false;

    // === PIN INPUT ===
    const pins=Array.from($('pinInput').querySelectorAll('input'));
    pins.forEach((input,i)=>{
      input.addEventListener('input',e=>{
        const v=e.target.value;
        if(v){input.classList.add('filled');if(i<3)pins[i+1].focus();else checkPin();}
        else input.classList.remove('filled');
      });
      input.addEventListener('keydown',e=>{
        if(e.key==='Backspace'&&!e.target.value&&i>0){pins[i-1].focus();pins[i-1].value='';pins[i-1].classList.remove('filled');}
      });
    });

    async function checkPin(){
      const pin=pins.map(p=>p.value).join('');
      if(pin.length!==4)return;
      $('pinError').classList.remove('show');
      try{
        const res=await fetch('/api/settlement?action=captain-verify-pin&pin='+pin);
        const data=await res.json();
        if(data.success){
          currentCaptain={captain_id:data.captain_id,name:data.name,employeeId:data.employeeId};
          $('pinSuccess').textContent='Welcome, '+data.name;
          $('pinSuccess').classList.add('show');
          $('userName').textContent=data.name;
          setTimeout(()=>{
            $('pinScreen').classList.add('hidden');
            $('dashboard').classList.add('show');
            $('refreshBar').classList.add('show');
            loadData();
            startAutoRefresh();
          },600);
        }else{
          $('pinError').classList.add('show');
          pins.forEach(p=>{p.value='';p.classList.remove('filled');p.style.borderColor='var(--red)';});
          setTimeout(()=>pins.forEach(p=>p.style.borderColor=''),600);
          pins[0].focus();
        }
      }catch(e){console.error(e);$('pinError').classList.add('show');}
    }

    function logout(){
      currentCaptain=null;lastData=null;previousUpiIds=new Set();historyLoaded=false;
      stopAutoRefresh();
      $('dashboard').classList.remove('show');
      $('refreshBar').classList.remove('show');
      $('pinScreen').classList.remove('hidden');
      $('pinSuccess').classList.remove('show');
      $('pinError').classList.remove('show');
      $('mainContent').style.display='none';
      $('loadingText').style.display='block';
      pins.forEach(p=>{p.value='';p.classList.remove('filled');});
      pins[0].focus();
    }

    // === DATA LOADING ===
    async function loadData(){
      setRefreshStatus('loading');
      try{
        const res=await fetch('/api/settlement?action=captain-live&captain_id='+currentCaptain.captain_id);
        const data=await res.json();
        if(!data.success)throw new Error(data.error);

        // Detect new UPI payments
        const newIds=[];
        if(lastData){
          for(const p of data.upi.payments){
            if(!previousUpiIds.has(p.id))newIds.push(p.id);
          }
        }
        previousUpiIds=new Set(data.upi.payments.map(p=>p.id));

        render(data,newIds);
        lastData=data;
        lastUpdateTime=Date.now();
        setRefreshStatus('live');

        // Load history once
        if(!historyLoaded)loadHistory();
      }catch(e){
        console.error('Load error:',e);
        setRefreshStatus('error');
      }
    }

    // === RENDER ===
    function render(data,newPaymentIds=[]){
      $('loadingText').style.display='none';
      $('mainContent').style.display='block';

      // Hero: Cash in hand
      const cash=data.cashInHand;
      $('cashInHand').textContent=fmt(cash);
      $('cashInHand').className='hero-amount'+(cash<0?' negative':'');
      $('heroCard').className='hero-card'+(cash<0?' negative':'');

      const parts=[fmt(data.orders.total)+' sales'];
      if(data.upi.total>0) parts.push(fmt(data.upi.total)+' UPI');
      if(data.card>0) parts.push(fmt(data.card)+' card');
      if(data.comp>0) parts.push(fmt(data.comp)+' comp');
      $('heroFormula').textContent=parts.join(' - ');
      $('heroPeriod').textContent='Since: '+data.period.startFormatted;

      // Product breakdown
      $('productTotal').textContent=fmt(data.orders.total);
      $('productCount').textContent='('+data.orders.count+')';
      if(data.productBreakdown && data.productBreakdown.length>0){
        $('productBreakdown').innerHTML=data.productBreakdown.map(p=>{
          const name=cleanName(p.name);
          const unitPrice=p.qty>0?Math.round(p.amount/p.qty):0;
          return '<div class="breakdown-line">'+
            '<div class="bl-left"><span class="bl-name">'+name+'</span></div>'+
            '<div class="bl-right"><span class="bl-qty">'+p.qty+' x ₹'+unitPrice+'</span><span class="bl-amount">'+fmt(p.amount)+'</span></div>'+
          '</div>';
        }).join('');
      }else{
        $('productBreakdown').innerHTML='<div class="breakdown-empty">No orders yet</div>';
      }

      // Order details
      $('orderCount').textContent='('+data.orders.count+')';
      if(data.orderDetails && data.orderDetails.length>0){
        $('orderDetails').innerHTML=data.orderDetails.map(o=>{
          const t=new Date(o.time.replace(' ','T')+'Z');
          const timeStr=t.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});
          const dateStr=isToday(t)?timeStr:t.toLocaleDateString('en-IN',{day:'numeric',month:'short',timeZone:'Asia/Kolkata'})+' '+timeStr;
          const itemChips=o.items.map(i=>{
            const name=cleanName(i.name);
            return '<span class="so-item">'+(i.qty>1?i.qty+'x ':'')+name+'</span>';
          }).join('');
          return '<div class="sale-order">'+
            '<div class="so-top"><span class="so-amount">'+fmt(o.amount)+'</span><span class="so-time">'+dateStr+'</span></div>'+
            '<div class="so-items">'+itemChips+'</div>'+
          '</div>';
        }).join('');
      }else{
        $('orderDetails').innerHTML='<div class="breakdown-empty" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px">No orders yet</div>';
      }

      // UPI payments
      $('upiCount').textContent=data.upi.count;
      $('upiTotal').textContent=fmt(data.upi.total);

      if(data.upi.payments.length===0){
        $('upiList').innerHTML='<div class="upi-empty">No UPI payments yet this period</div>';
      }else{
        $('upiList').innerHTML=data.upi.payments.map(p=>{
          const isNew=newPaymentIds.includes(p.id);
          const t=new Date(p.time);
          const timeStr=t.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});
          const dateStr=isToday(t)?timeStr:t.toLocaleDateString('en-IN',{day:'numeric',month:'short',timeZone:'Asia/Kolkata'})+' '+timeStr;
          return '<div class="upi-item'+(isNew?' new-payment':'')+'">'+
            '<div class="ui-left">'+
              '<span class="ui-amount">'+fmt(p.amount)+'</span>'+
              '<span class="ui-vpa">'+maskVpa(p.vpa)+'</span>'+
            '</div>'+
            '<div class="ui-time">'+dateStr+'</div>'+
          '</div>';
        }).join('');
      }

      // Card + Comp
      $('cardTotal').textContent=fmt(data.card);
      $('compTotal').textContent=fmt(data.comp);

      // Total revenue
      $('totalRevenue').textContent=fmt(data.orders.total);
    }

    // === SETTLEMENT HISTORY ===
    async function loadHistory(){
      try{
        const res=await fetch('/api/settlement?action=history&point='+currentCaptain.captain_id+'&limit=10');
        const data=await res.json();
        if(!data.success)return;
        historyLoaded=true;

        if(data.settlements.length===0){
          $('historyList').innerHTML='<div class="history-empty">No settlements recorded yet</div>';
          return;
        }

        $('historyList').innerHTML=data.settlements.map(s=>{
          const d=new Date(s.settled_at);
          const dateStr=d.toLocaleDateString('en-IN',{day:'numeric',month:'short',timeZone:'Asia/Kolkata'});
          const timeStr=d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});
          return '<div class="history-card">'+
            '<div class="hc-top">'+
              '<span class="hc-amount">'+fmt(s.cash_collected)+'</span>'+
              '<span class="hc-date">'+dateStr+' '+timeStr+'</span>'+
            '</div>'+
            '<div class="hc-by">Settled by '+s.settled_by+'</div>'+
            '<div class="hc-breakdown">'+
              '<div class="hc-stat"><div class="hc-stat-val">'+fmt(s.total_sales||0)+'</div><div class="hc-stat-label">Sales</div></div>'+
              '<div class="hc-stat"><div class="hc-stat-val">'+fmt(s.upi_razorpay||0)+'</div><div class="hc-stat-label">UPI</div></div>'+
              '<div class="hc-stat"><div class="hc-stat-val" style="color:'+(s.cash_variance>0?'var(--green)':s.cash_variance<0?'var(--red)':'var(--text)')+'">'+fmt(s.cash_variance||0)+'</div><div class="hc-stat-label">Variance</div></div>'+
            '</div>'+
          '</div>';
        }).join('');
      }catch(e){console.error('History error:',e);}
    }

    function toggleHistory(){
      const list=$('historyList');
      const toggle=$('historyToggle');
      if(list.classList.contains('show')){
        list.classList.remove('show');
        toggle.classList.remove('open');
      }else{
        list.classList.add('show');
        toggle.classList.add('open');
      }
    }

    // === AUTO-REFRESH ===
    function startAutoRefresh(){
      stopAutoRefresh();
      refreshTimer=setInterval(()=>loadData(),30000);
      timeAgoTimer=setInterval(updateTimeAgo,5000);
    }

    function stopAutoRefresh(){
      if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null;}
      if(timeAgoTimer){clearInterval(timeAgoTimer);timeAgoTimer=null;}
    }

    function manualRefresh(){
      loadData();
    }

    function setRefreshStatus(status){
      const bar=$('refreshBar');
      bar.classList.remove('loading','error');
      if(status==='loading'){
        bar.classList.add('loading');
        $('refreshStatus').textContent='Updating...';
      }else if(status==='error'){
        bar.classList.add('error');
        $('refreshStatus').textContent='Update failed';
      }else{
        updateTimeAgo();
      }
    }

    function updateTimeAgo(){
      if(!lastUpdateTime)return;
      const seconds=Math.floor((Date.now()-lastUpdateTime)/1000);
      if(seconds<5)$('refreshStatus').textContent='Just updated';
      else if(seconds<60)$('refreshStatus').textContent=seconds+'s ago';
      else $('refreshStatus').textContent=Math.floor(seconds/60)+'m ago';
    }

    // === HELPERS ===
    function maskVpa(vpa){
      if(!vpa)return '';
      const parts=vpa.split('@');
      const name=parts[0]||'';
      if(name.length<=3)return vpa;
      return name.slice(0,3)+'****@'+(parts[1]||'');
    }

    function isToday(date){
      const today=new Date();
      return date.getDate()===today.getDate()&&date.getMonth()===today.getMonth()&&date.getFullYear()===today.getFullYear();
    }

    // Auto-focus first PIN input
    pins[0].focus();
  </script>
</body>
</html>
