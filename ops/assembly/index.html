<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HE Assembly KDS</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f1a; --bg2: #111827; --card: #1a2234; --border: #2d3a4f;
      --text: #f1f5f9; --text2: #94a3b8; --muted: #64748b;
      --orange: #f97316; --yellow: #f59e0b; --green: #22c55e; --red: #ef4444;
      --blue: #3b82f6; --purple: #8b5cf6; --cyan: #06b6d4; --pink: #ec4899;
      --amber: #f59e0b; --amber-dim: rgba(245,158,11,.12);
      --green-dim: rgba(34,197,94,.12); --blue-dim: rgba(59,130,246,.12);
      --red-dim: rgba(239,68,68,.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; justify-content: space-between;
      align-items: center; position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .header-left h1 .accent { width: 4px; height: 22px; background: linear-gradient(180deg, var(--orange), var(--amber)); border-radius: 2px; }
    .header-counts { display: flex; gap: 10px; margin-left: 16px; }
    .hc-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
    }
    .hc-chip .hc-num { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; }
    .hc-preparing { background: var(--amber-dim); color: var(--amber); }
    .hc-ready { background: var(--green-dim); color: var(--green); }
    .hc-packed { background: var(--blue-dim); color: var(--blue); }

    .header-right { display: flex; align-items: center; gap: 10px; }
    .health {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 6px; font-size: 11px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .health-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .health-dot.ok { background: var(--green); animation: pulse 2s infinite; }
    .health-dot.err { background: var(--red); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    .icon-btn {
      background: var(--bg2); border: 1px solid var(--border); color: var(--text2);
      width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:active { background: var(--border); }

    /* ── Columns Layout ─────────────────────────────────────── */
    .columns {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 0; min-height: calc(100vh - 57px);
    }
    .column {
      border-right: 1px solid var(--border);
      padding: 12px; overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .column:last-child { border-right: none; }
    .col-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; padding: 8px 10px;
      border-radius: 8px; flex-shrink: 0;
    }
    .col-header.preparing { background: var(--amber-dim); }
    .col-header.ready { background: var(--green-dim); }
    .col-header.packed { background: var(--blue-dim); }
    .col-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; }
    .col-header.preparing .col-title { color: var(--amber); }
    .col-header.ready .col-title { color: var(--green); }
    .col-header.packed .col-title { color: var(--blue); }
    .col-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px; font-weight: 700;
    }
    .col-header.preparing .col-count { color: var(--amber); }
    .col-header.ready .col-count { color: var(--green); }
    .col-header.packed .col-count { color: var(--blue); }
    .col-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .col-empty {
      text-align: center; padding: 40px 20px;
      color: var(--muted); font-size: 13px;
    }

    /* ── Order Card ──────────────────────────────────────────── */
    .order-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; transition: all .15s;
    }
    .order-card.highlight {
      animation: card-glow .6s ease;
    }
    @keyframes card-glow {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
      50% { box-shadow: 0 0 12px 4px rgba(34,197,94,.25); }
      100% { box-shadow: none; }
    }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .card-source {
      display: inline-flex; padding: 3px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; line-height: 1;
    }
    .source-waba { background: rgba(34,197,94,.15); color: var(--green); }
    .source-swiggy { background: var(--amber-dim); color: var(--orange); }
    .source-zomato { background: var(--red-dim); color: var(--red); }

    .card-elapsed {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 600; color: var(--muted);
    }
    .card-elapsed.warn { color: var(--amber); }
    .card-elapsed.critical { color: var(--red); }

    .card-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px; font-weight: 700; margin-bottom: 2px;
    }
    .card-customer { font-size: 12px; color: var(--text2); margin-bottom: 10px; }

    /* Station checklist */
    .station-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .station-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 6px; background: var(--bg2);
      font-size: 12px;
    }
    .station-icon { width: 18px; text-align: center; font-size: 13px; flex-shrink: 0; }
    .station-icon.done { color: var(--green); }
    .station-icon.pending { color: var(--amber); }
    .station-name { font-weight: 600; min-width: 28px; }
    .station-detail { color: var(--text2); flex: 1; }
    .station-progress {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 600; color: var(--muted);
    }

    /* Items preview (collapsed by default) */
    .items-toggle {
      font-size: 11px; color: var(--muted); cursor: pointer;
      padding: 4px 0; margin-bottom: 8px; user-select: none;
    }
    .items-toggle:hover { color: var(--text2); }
    .items-list {
      display: none; margin-bottom: 10px; padding: 6px 8px;
      background: var(--bg); border-radius: 6px;
      font-size: 11px; color: var(--text2); line-height: 1.6;
    }
    .items-list.open { display: block; }
    .items-list .il-item { display: flex; justify-content: space-between; }
    .items-list .il-qty { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--text); }

    /* Action buttons */
    .card-actions { display: flex; gap: 8px; }
    .btn {
      flex: 1; padding: 10px 14px; border: none; border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer;
      text-transform: uppercase; letter-spacing: .4px;
      transition: all .12s; display: flex; align-items: center;
      justify-content: center; gap: 6px;
    }
    .btn:active { transform: scale(.96); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .btn-pack { background: var(--green); color: #fff; }
    .btn-pack:hover:not(:disabled) { background: #16a34a; }
    .btn-handover { background: var(--blue); color: #fff; }
    .btn-handover:hover:not(:disabled) { background: #2563eb; }
    .btn-cancel {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      flex: 0 0 auto; padding: 10px 12px;
    }
    .btn-cancel:hover:not(:disabled) { border-color: var(--red); color: var(--red); }

    /* ── Settings Modal ──────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px; width: 380px; max-width: 90vw;
    }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .modal p { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
    .modal label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
    .modal input[type="text"] {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      margin-bottom: 20px;
    }
    .modal input[type="text"]:focus { outline: none; border-color: var(--orange); }
    .modal .btn-save {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: linear-gradient(135deg, var(--orange), var(--amber));
      color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .modal .btn-save:active { transform: scale(.97); }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 900px) {
      .header-counts { display: none; }
      .columns { grid-template-columns: 1fr; min-height: auto; }
      .column { border-right: none; border-bottom: 1px solid var(--border); min-height: auto; max-height: none; }
      .col-body { max-height: none; }
    }

    /* ── Scrollbar ────────────────────────────────────────────── */
    .col-body::-webkit-scrollbar { width: 4px; }
    .col-body::-webkit-scrollbar-track { background: transparent; }
    .col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Loading skeleton ─────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, var(--bg2) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px; height: 100px; margin-bottom: 10px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1><span class="accent"></span> Assembly KDS</h1>
      <div class="header-counts">
        <div class="hc-chip hc-preparing"><span class="hc-num" id="hcPreparing">0</span> Preparing</div>
        <div class="hc-chip hc-ready"><span class="hc-num" id="hcReady">0</span> Ready</div>
        <div class="hc-chip hc-packed"><span class="hc-num" id="hcPacked">0</span> Packed</div>
      </div>
    </div>
    <div class="header-right">
      <div class="health" id="health">
        <div class="health-dot" id="healthDot"></div>
        <span id="healthText">Connecting</span>
      </div>
      <button class="icon-btn" onclick="openSettings()" title="Settings">&#9881;</button>
    </div>
  </div>

  <!-- 3-Column Layout -->
  <div class="columns">
    <!-- PREPARING -->
    <div class="column">
      <div class="col-header preparing">
        <span class="col-title">Preparing</span>
        <span class="col-count" id="colPreparing">0</span>
      </div>
      <div class="col-body" id="colPreparingBody">
        <div class="col-empty" id="emptyPreparing">No orders preparing</div>
      </div>
    </div>
    <!-- READY TO PACK -->
    <div class="column">
      <div class="col-header ready">
        <span class="col-title">Ready to Pack</span>
        <span class="col-count" id="colReady">0</span>
      </div>
      <div class="col-body" id="colReadyBody">
        <div class="col-empty" id="emptyReady">No orders ready</div>
      </div>
    </div>
    <!-- PACKED -->
    <div class="column">
      <div class="col-header packed">
        <span class="col-title">Packed</span>
        <span class="col-count" id="colPacked">0</span>
      </div>
      <div class="col-body" id="colPackedBody">
        <div class="col-empty" id="emptyPacked">No packed orders</div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2>Assembly KDS Settings</h2>
      <p>Enter your Dashboard API key to connect to the assembly feed.</p>
      <label for="apiKeyInput">API Key</label>
      <input type="text" id="apiKeyInput" placeholder="Enter DASHBOARD_API_KEY" autocomplete="off" spellcheck="false">
      <button class="btn-save" onclick="saveSettings()">Connect</button>
    </div>
  </div>

  <script>
    // ── Constants & State ──────────────────────────────────────────
    const POLL_INTERVAL = 5000;
    const SETTINGS_KEY = 'assembly_kds_settings';
    const STATION_ABBR = {
      'Kitchen Pass': 'KP',
      'Juice Counter': 'JC',
      'Bain Marie': 'BM',
      'Shawarma Counter': 'SW',
      'Grill Counter': 'GR',
    };

    let apiKey = '';
    let pollTimer = null;
    let prevAssembledIds = new Set();
    let openItemsSet = new Set();
    let connected = false;
    let bellAudio = null;

    const $ = id => document.getElementById(id);

    // ── Audio Bell ────────────────────────────────────────────────
    function initBell() {
      // Generate a short bell tone using Web Audio API
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        bellAudio = ctx;
      } catch (e) { /* silent fail */ }
    }

    function playBell() {
      if (!bellAudio) return;
      try {
        const ctx = bellAudio;
        if (ctx.state === 'suspended') ctx.resume();

        // Two-tone bell
        [660, 880].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.4);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(ctx.currentTime + i * 0.15);
          osc.stop(ctx.currentTime + i * 0.15 + 0.5);
        });
      } catch (e) { /* silent fail */ }
    }

    // ── Settings ──────────────────────────────────────────────────
    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (raw) {
          const s = JSON.parse(raw);
          if (s.api_key) apiKey = s.api_key;
        }
      } catch (e) {}
    }

    function saveSettings() {
      const val = $('apiKeyInput').value.trim();
      if (!val) return;
      apiKey = val;
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({ api_key: apiKey }));
      $('settingsModal').classList.remove('open');
      startPolling();
    }

    function openSettings() {
      $('apiKeyInput').value = apiKey;
      $('settingsModal').classList.add('open');
      $('apiKeyInput').focus();
    }

    // ── Health Indicator ──────────────────────────────────────────
    function setHealth(ok) {
      connected = ok;
      const dot = $('healthDot');
      const text = $('healthText');
      if (ok) {
        dot.className = 'health-dot ok';
        text.textContent = 'Auto-push Active';
      } else {
        dot.className = 'health-dot err';
        text.textContent = 'Disconnected';
      }
    }

    // ── Elapsed Time Formatting ───────────────────────────────────
    function formatElapsed(minutes) {
      if (minutes == null || minutes < 0) return '0 min';
      if (minutes < 60) return minutes + ' min';
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return h + 'h ' + m + 'm';
    }

    function elapsedClass(minutes) {
      if (minutes >= 15) return 'critical';
      if (minutes >= 8) return 'warn';
      return '';
    }

    // ── Source Badge ──────────────────────────────────────────────
    function sourceBadge(source) {
      const s = (source || '').toUpperCase();
      if (s === 'WABA' || s === 'WHATSAPP') return '<span class="card-source source-waba">WABA</span>';
      if (s === 'SWIGGY') return '<span class="card-source source-swiggy">SWIGGY</span>';
      if (s === 'ZOMATO') return '<span class="card-source source-zomato">ZOMATO</span>';
      return '<span class="card-source" style="background:var(--bg2);color:var(--text2)">' + escHtml(s || 'OTHER') + '</span>';
    }

    // ── Station Checklist ─────────────────────────────────────────
    function renderStations(stations) {
      if (!stations || typeof stations !== 'object') return '';
      const keys = Object.keys(stations);
      if (keys.length === 0) return '';

      let html = '<div class="station-list">';
      for (const name of keys) {
        const st = stations[name];
        const abbr = STATION_ABBR[name] || name.substring(0, 2).toUpperCase();
        const allDone = st.ready >= st.total;
        const iconClass = allDone ? 'done' : 'pending';
        const icon = allDone ? '&#10003;' : '&#9203;';
        html += '<div class="station-row">'
          + '<span class="station-icon ' + iconClass + '">' + icon + '</span>'
          + '<span class="station-name">' + escHtml(abbr) + '</span>'
          + '<span class="station-detail">' + escHtml(name) + '</span>'
          + '<span class="station-progress">' + st.ready + '/' + st.total + '</span>'
          + '</div>';
      }
      html += '</div>';
      return html;
    }

    // ── Items Preview ─────────────────────────────────────────────
    function renderItems(orderId, stations) {
      if (!stations || typeof stations !== 'object') return '';
      const allItems = [];
      for (const name of Object.keys(stations)) {
        const st = stations[name];
        if (st.items && Array.isArray(st.items)) {
          for (const item of st.items) {
            allItems.push(item);
          }
        }
      }
      if (allItems.length === 0) return '';

      const isOpen = openItemsSet.has(orderId);
      let html = '<div class="items-toggle" onclick="toggleItems(\'' + escAttr(orderId) + '\')">'
        + allItems.length + ' item' + (allItems.length !== 1 ? 's' : '') + ' ' + (isOpen ? '&#9660;' : '&#9654;')
        + '</div>';
      html += '<div class="items-list' + (isOpen ? ' open' : '') + '" id="items-' + escAttr(orderId) + '">';
      for (const item of allItems) {
        const name = item.name || item.product_name || 'Item';
        const qty = item.qty || item.quantity || 1;
        html += '<div class="il-item"><span>' + escHtml(name) + '</span><span class="il-qty">x' + qty + '</span></div>';
      }
      html += '</div>';
      return html;
    }

    function toggleItems(orderId) {
      if (openItemsSet.has(orderId)) {
        openItemsSet.delete(orderId);
      } else {
        openItemsSet.add(orderId);
      }
      const el = $('items-' + orderId);
      if (el) el.classList.toggle('open');
      // Update the toggle arrow text
      const toggle = el ? el.previousElementSibling : null;
      if (toggle && toggle.classList.contains('items-toggle')) {
        const text = toggle.textContent.trim();
        if (openItemsSet.has(orderId)) {
          toggle.innerHTML = text.replace(/.$/, '') + '&#9660;';
        } else {
          toggle.innerHTML = text.replace(/.$/, '') + '&#9654;';
        }
      }
    }

    // ── Order Card Rendering ──────────────────────────────────────
    function renderOrderCard(order) {
      const id = order.source_order_id || order.tracking_number || order.odoo_order_name || '---';
      const orderId = String(order.id);
      const customer = order.customer_name || 'Customer';
      const elapsed = order.elapsed_minutes != null ? order.elapsed_minutes : 0;
      const elCls = elapsedClass(elapsed);

      let actions = '';
      if (order.status === 'assembled') {
        actions = '<div class="card-actions">'
          + '<button class="btn btn-cancel" onclick="cancelOrder(\'' + escAttr(orderId) + '\', this)" title="Cancel">&#10005;</button>'
          + '<button class="btn btn-pack" onclick="packOrder(\'' + escAttr(orderId) + '\', this)">Pack</button>'
          + '</div>';
      } else if (order.status === 'packed') {
        actions = '<div class="card-actions">'
          + '<button class="btn btn-cancel" onclick="cancelOrder(\'' + escAttr(orderId) + '\', this)" title="Cancel">&#10005;</button>'
          + '<button class="btn btn-handover" onclick="handoverOrder(\'' + escAttr(orderId) + '\', this)">Hand Over</button>'
          + '</div>';
      } else if (order.status === 'preparing') {
        actions = '<div class="card-actions">'
          + '<button class="btn btn-cancel" onclick="cancelOrder(\'' + escAttr(orderId) + '\', this)" title="Cancel">&#10005;</button>'
          + '</div>';
      }

      return '<div class="order-card" id="card-' + escAttr(orderId) + '">'
        + '<div class="card-top">'
        +   sourceBadge(order.source)
        +   '<span class="card-elapsed' + (elCls ? ' ' + elCls : '') + '">' + formatElapsed(elapsed) + '</span>'
        + '</div>'
        + '<div class="card-id">' + escHtml(id) + '</div>'
        + '<div class="card-customer">' + escHtml(customer) + '</div>'
        + renderStations(order.stations)
        + renderItems(orderId, order.stations)
        + actions
        + '</div>';
    }

    // ── Render All ────────────────────────────────────────────────
    function render(data) {
      if (!data || !data.orders) return;

      const preparing = [];
      const assembled = [];
      const packed = [];

      for (const o of data.orders) {
        if (o.status === 'preparing') preparing.push(o);
        else if (o.status === 'assembled') assembled.push(o);
        else if (o.status === 'packed') packed.push(o);
      }

      // Sort oldest first (highest elapsed_minutes first)
      const sortOldest = (a, b) => (b.elapsed_minutes || 0) - (a.elapsed_minutes || 0);
      preparing.sort(sortOldest);
      assembled.sort(sortOldest);
      packed.sort(sortOldest);

      // Detect new assembled orders for bell
      const currentAssembledIds = new Set(assembled.map(o => String(o.id)));
      let newAssembled = false;
      for (const id of currentAssembledIds) {
        if (!prevAssembledIds.has(id)) {
          newAssembled = true;
          break;
        }
      }
      if (newAssembled && prevAssembledIds.size > 0) {
        playBell();
        // Highlight new cards after render
        setTimeout(() => {
          for (const id of currentAssembledIds) {
            if (!prevAssembledIds.has(id)) {
              const card = $('card-' + id);
              if (card) card.classList.add('highlight');
            }
          }
        }, 50);
      }
      prevAssembledIds = currentAssembledIds;

      // Update counts
      const counts = data.counts || {};
      $('hcPreparing').textContent = counts.preparing || preparing.length;
      $('hcReady').textContent = counts.assembled || assembled.length;
      $('hcPacked').textContent = counts.packed || packed.length;
      $('colPreparing').textContent = counts.preparing || preparing.length;
      $('colReady').textContent = counts.assembled || assembled.length;
      $('colPacked').textContent = counts.packed || packed.length;

      // Render columns
      renderColumn('colPreparingBody', 'emptyPreparing', preparing, 'No orders preparing');
      renderColumn('colReadyBody', 'emptyReady', assembled, 'No orders ready');
      renderColumn('colPackedBody', 'emptyPacked', packed, 'No packed orders');
    }

    function renderColumn(bodyId, emptyId, orders, emptyText) {
      const body = $(bodyId);
      const empty = $(emptyId);

      if (orders.length === 0) {
        // Keep empty message, clear cards
        const cards = body.querySelectorAll('.order-card');
        cards.forEach(c => c.remove());
        empty.style.display = 'block';
        empty.textContent = emptyText;
        return;
      }

      empty.style.display = 'none';
      let html = '';
      for (const o of orders) {
        html += renderOrderCard(o);
      }
      // Only update if changed to avoid DOM thrash
      const existing = body.querySelectorAll('.order-card');
      const existingIds = Array.from(existing).map(el => el.id).join(',');
      const newIds = orders.map(o => 'card-' + String(o.id)).join(',');
      if (existingIds !== newIds || body.querySelector('.skeleton')) {
        // Remove skeletons and old cards, set new HTML
        const empEl = body.querySelector('.col-empty');
        body.innerHTML = '';
        if (empEl) body.appendChild(empEl);
        body.insertAdjacentHTML('beforeend', html);
      } else {
        // Update in-place: elapsed times and station states
        for (const o of orders) {
          const orderId = String(o.id);
          const card = $('card-' + orderId);
          if (!card) continue;
          // Update elapsed
          const elSpan = card.querySelector('.card-elapsed');
          if (elSpan) {
            const elapsed = o.elapsed_minutes != null ? o.elapsed_minutes : 0;
            elSpan.textContent = formatElapsed(elapsed);
            elSpan.className = 'card-elapsed' + (elapsedClass(elapsed) ? ' ' + elapsedClass(elapsed) : '');
          }
        }
      }
    }

    // ── API Actions ───────────────────────────────────────────────
    async function packOrder(orderId, btn) {
      btn.disabled = true;
      btn.textContent = 'Packing...';
      try {
        const res = await fetch('/api/assembly?action=pack&key=' + encodeURIComponent(apiKey), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ order_id: orderId }),
        });
        if (!res.ok) throw new Error('Pack failed');
        fetchDashboard();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'PACK';
        console.error('Pack error:', e);
      }
    }

    async function handoverOrder(orderId, btn) {
      btn.disabled = true;
      btn.textContent = 'Handing over...';
      try {
        const res = await fetch('/api/assembly?action=handover&key=' + encodeURIComponent(apiKey), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ order_id: orderId }),
        });
        if (!res.ok) throw new Error('Handover failed');
        fetchDashboard();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'HAND OVER';
        console.error('Handover error:', e);
      }
    }

    async function cancelOrder(orderId, btn) {
      if (!confirm('Cancel this order?')) return;
      btn.disabled = true;
      try {
        const res = await fetch('/api/assembly?action=cancel&key=' + encodeURIComponent(apiKey), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ order_id: orderId }),
        });
        if (!res.ok) throw new Error('Cancel failed');
        fetchDashboard();
      } catch (e) {
        btn.disabled = false;
        console.error('Cancel error:', e);
      }
    }

    // ── Fetch Dashboard Data ──────────────────────────────────────
    async function fetchDashboard() {
      if (!apiKey) {
        setHealth(false);
        return;
      }
      try {
        const res = await fetch('/api/assembly?action=dashboard&key=' + encodeURIComponent(apiKey));
        if (!res.ok) {
          if (res.status === 401 || res.status === 403) {
            setHealth(false);
            $('healthText').textContent = 'Invalid Key';
            return;
          }
          throw new Error('HTTP ' + res.status);
        }
        const data = await res.json();
        setHealth(true);
        render(data);
      } catch (e) {
        setHealth(false);
        console.error('Fetch error:', e);
      }
    }

    // ── Polling ───────────────────────────────────────────────────
    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);

      // Show loading skeletons on first load
      ['colPreparingBody', 'colReadyBody', 'colPackedBody'].forEach(id => {
        const body = $(id);
        if (!body.querySelector('.order-card')) {
          const empty = body.querySelector('.col-empty');
          if (empty) empty.style.display = 'none';
          body.insertAdjacentHTML('beforeend', '<div class="skeleton"></div><div class="skeleton"></div>');
        }
      });

      fetchDashboard();
      pollTimer = setInterval(fetchDashboard, POLL_INTERVAL);
    }

    // ── HTML Escaping ─────────────────────────────────────────────
    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function escAttr(str) {
      return String(str).replace(/['"&<>\\]/g, c => ({
        "'": '&#39;', '"': '&quot;', '&': '&amp;', '<': '&lt;', '>': '&gt;', '\\': '&#92;'
      }[c] || c));
    }

    // ── Keyboard shortcut for settings ────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        $('settingsModal').classList.remove('open');
      }
    });

    $('apiKeyInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveSettings();
    });

    // Click outside modal to close
    $('settingsModal').addEventListener('click', e => {
      if (e.target === $('settingsModal')) {
        $('settingsModal').classList.remove('open');
      }
    });

    // ── Init ──────────────────────────────────────────────────────
    loadSettings();
    initBell();
    if (!apiKey) {
      openSettings();
    } else {
      startPolling();
    }
  </script>
</body>
</html>
