<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HE Push UI</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f1a; --bg2: #111827; --card: #1a2234; --border: #2d3a4f;
      --text: #f1f5f9; --text2: #94a3b8; --muted: #64748b;
      --orange: #f97316; --yellow: #f59e0b; --green: #22c55e; --red: #ef4444;
      --blue: #3b82f6; --purple: #8b5cf6; --cyan: #06b6d4;
      --amber: #f59e0b; --amber-dim: rgba(245,158,11,.12);
      --green-dim: rgba(34,197,94,.12); --red-dim: rgba(239,68,68,.12);
      --blue-dim: rgba(59,130,246,.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; justify-content: space-between;
      align-items: center; position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .header-left h1 .accent { width: 4px; height: 22px; background: linear-gradient(180deg, var(--orange), var(--amber)); border-radius: 2px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .health {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 6px; font-size: 11px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .health-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .health-dot.ok { background: var(--green); animation: pulse 2s infinite; }
    .health-dot.err { background: var(--red); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
    .icon-btn {
      background: var(--bg2); border: 1px solid var(--border); color: var(--text2);
      width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:active { background: var(--border); }

    /* ── Main Layout ─────────────────────────────────────────── */
    .main {
      display: grid; grid-template-columns: 1fr 380px;
      gap: 0; min-height: calc(100vh - 57px);
    }
    @media (max-width: 860px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { border-left: none; border-top: 1px solid var(--border); }
    }

    /* ── Product Grid (left pane) ────────────────────────────── */
    .products-pane { padding: 16px; overflow-y: auto; }
    .search-bar {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .search-input {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px;
    }
    .search-input:focus { outline: none; border-color: var(--orange); }
    .search-input::placeholder { color: var(--muted); }
    .filter-btn {
      padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg2); color: var(--text2); cursor: pointer;
      font-size: 12px; font-weight: 600; white-space: nowrap;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .filter-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); }
    .filter-btn:active { opacity: .8; }
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }

    .product-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
    }
    .product-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px; cursor: pointer;
      transition: all .12s; position: relative;
    }
    .product-card:hover { border-color: var(--orange); }
    .product-card:active { transform: scale(.97); }
    .product-card.in-cart { border-color: var(--green); background: rgba(34,197,94,.06); }
    .pc-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
    .pc-bottom { display: flex; justify-content: space-between; align-items: center; }
    .pc-price { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--green); font-weight: 600; }
    .pc-station {
      font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: .3px;
    }
    .st-KP { background: rgba(245,158,11,.12); color: var(--amber); }
    .st-JC { background: rgba(59,130,246,.12); color: var(--blue); }
    .st-BM { background: rgba(139,92,246,.12); color: var(--purple); }
    .st-SW { background: rgba(236,72,153,.12); color: #ec4899; }
    .st-GR { background: rgba(239,68,68,.12); color: var(--red); }
    .pc-qty-badge {
      position: absolute; top: -6px; right: -6px;
      background: var(--green); color: #fff; font-size: 11px;
      font-weight: 700; width: 22px; height: 22px;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-family: 'JetBrains Mono', monospace;
    }
    .product-empty {
      text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px;
    }
    .product-loading {
      text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px;
    }

    /* ── Sidebar (right pane — order builder) ─────────────────── */
    .sidebar {
      border-left: 1px solid var(--border); display: flex; flex-direction: column;
      background: var(--bg2);
    }
    .sidebar-header {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      font-size: 14px; font-weight: 700; display: flex;
      align-items: center; justify-content: space-between;
    }
    .sidebar-header .clear-btn {
      font-size: 11px; color: var(--red); cursor: pointer; background: none;
      border: none; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600;
    }
    .sidebar-header .clear-btn:hover { text-decoration: underline; }

    /* Source + order info */
    .order-meta { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .source-picker { display: flex; gap: 8px; margin-bottom: 10px; }
    .source-btn {
      flex: 1; padding: 10px; border-radius: 8px; border: 2px solid var(--border);
      background: var(--card); cursor: pointer; text-align: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px; font-weight: 700; transition: all .12s;
    }
    .source-btn:active { transform: scale(.96); }
    .source-btn.selected-swiggy { border-color: var(--orange); background: var(--amber-dim); color: var(--orange); }
    .source-btn.selected-zomato { border-color: var(--red); background: var(--red-dim); color: var(--red); }
    .meta-inputs { display: flex; flex-direction: column; gap: 8px; }
    .meta-input {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 12px; color: var(--text); font-size: 13px;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .meta-input:focus { outline: none; border-color: var(--orange); }
    .meta-input::placeholder { color: var(--muted); }

    /* Cart items */
    .cart-items { flex: 1; overflow-y: auto; padding: 8px 0; }
    .cart-empty { text-align: center; padding: 40px 16px; color: var(--muted); font-size: 13px; }
    .cart-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid rgba(45,58,79,.4);
    }
    .ci-info { flex: 1; min-width: 0; }
    .ci-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ci-station { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .ci-qty {
      display: flex; align-items: center; gap: 0;
      border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
    }
    .ci-qty button {
      width: 30px; height: 30px; border: none; background: var(--card);
      color: var(--text); cursor: pointer; font-size: 15px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }
    .ci-qty button:active { background: var(--border); }
    .ci-qty span {
      width: 30px; text-align: center; font-family: 'JetBrains Mono', monospace;
      font-size: 13px; font-weight: 700; background: var(--bg);
      line-height: 30px;
    }
    .ci-remove {
      width: 26px; height: 26px; border: none; background: none;
      color: var(--muted); cursor: pointer; font-size: 16px; border-radius: 4px;
    }
    .ci-remove:hover { color: var(--red); background: var(--red-dim); }

    /* Cart footer */
    .cart-footer {
      padding: 14px 16px; border-top: 1px solid var(--border);
    }
    .cart-summary {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; font-size: 13px;
    }
    .cart-summary .cs-label { color: var(--text2); }
    .cart-summary .cs-value { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
    .push-btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--orange), var(--amber));
      color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      text-transform: uppercase; letter-spacing: .5px;
      transition: all .12s;
    }
    .push-btn:hover:not(:disabled) { filter: brightness(1.1); }
    .push-btn:active:not(:disabled) { transform: scale(.97); }
    .push-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .push-status {
      text-align: center; font-size: 12px; margin-top: 8px;
      font-family: 'JetBrains Mono', monospace;
    }
    .push-status.ok { color: var(--green); }
    .push-status.err { color: var(--red); }

    /* Recent pushes */
    .recent-section {
      padding: 10px 16px; border-top: 1px solid var(--border);
      max-height: 160px; overflow-y: auto;
    }
    .recent-title { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
    .recent-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; font-size: 12px; border-bottom: 1px solid rgba(45,58,79,.3);
    }
    .recent-item:last-child { border-bottom: none; }
    .ri-source {
      font-size: 9px; font-weight: 700; padding: 2px 5px;
      border-radius: 3px; text-transform: uppercase;
    }
    .ri-swiggy { background: var(--amber-dim); color: var(--orange); }
    .ri-zomato { background: var(--red-dim); color: var(--red); }
    .ri-id { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
    .ri-time { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 11px; }

    /* ── Settings Modal ──────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px; width: 380px; max-width: 90vw;
    }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .modal p { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
    .modal label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
    .modal input[type="text"] {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      margin-bottom: 20px;
    }
    .modal input[type="text"]:focus { outline: none; border-color: var(--orange); }
    .modal .btn-save {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: linear-gradient(135deg, var(--orange), var(--amber));
      color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .modal .btn-save:active { transform: scale(.97); }

    /* Scrollbar */
    .cart-items::-webkit-scrollbar, .products-pane::-webkit-scrollbar,
    .recent-section::-webkit-scrollbar { width: 4px; }
    .cart-items::-webkit-scrollbar-track, .products-pane::-webkit-scrollbar-track,
    .recent-section::-webkit-scrollbar-track { background: transparent; }
    .cart-items::-webkit-scrollbar-thumb, .products-pane::-webkit-scrollbar-thumb,
    .recent-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 20px; font-size: 13px;
      font-weight: 600; z-index: 300; opacity: 0; transition: opacity .3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.ok { border-color: var(--green); color: var(--green); }
    .toast.err { border-color: var(--red); color: var(--red); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1><span class="accent"></span> Push UI</h1>
    </div>
    <div class="header-right">
      <div class="health" id="health">
        <div class="health-dot" id="healthDot"></div>
        <span id="healthText">Connecting</span>
      </div>
      <a href="/ops/assembly/" style="text-decoration:none">
        <button class="icon-btn" title="Assembly KDS" style="font-size:13px;">KDS</button>
      </a>
      <button class="icon-btn" onclick="openSettings()" title="Settings">&#9881;</button>
    </div>
  </div>

  <!-- Main Layout -->
  <div class="main">
    <!-- Left: Product Search + Grid -->
    <div class="products-pane">
      <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="Search products..." autocomplete="off" spellcheck="false">
      </div>
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-station="all" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" data-station="KP" onclick="setFilter('KP', this)">Kitchen</button>
        <button class="filter-btn" data-station="JC" onclick="setFilter('JC', this)">Juice</button>
        <button class="filter-btn" data-station="BM" onclick="setFilter('BM', this)">Bain Marie</button>
        <button class="filter-btn" data-station="SW" onclick="setFilter('SW', this)">Shawarma</button>
        <button class="filter-btn" data-station="GR" onclick="setFilter('GR', this)">Grill</button>
      </div>
      <div class="product-grid" id="productGrid">
        <div class="product-loading">Loading products...</div>
      </div>
    </div>

    <!-- Right: Order Builder Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span>Order Builder</span>
        <button class="clear-btn" onclick="clearCart()">Clear All</button>
      </div>

      <!-- Source + Meta -->
      <div class="order-meta">
        <div class="source-picker">
          <button class="source-btn" id="srcSwiggy" onclick="setSource('swiggy')">Swiggy</button>
          <button class="source-btn" id="srcZomato" onclick="setSource('zomato')">Zomato</button>
        </div>
        <div class="meta-inputs">
          <input type="text" class="meta-input" id="orderIdInput" placeholder="Order ID (e.g. SW-12345)">
          <input type="text" class="meta-input" id="customerInput" placeholder="Customer name (optional)">
        </div>
      </div>

      <!-- Cart Items -->
      <div class="cart-items" id="cartItems">
        <div class="cart-empty" id="cartEmpty">Tap products to add them</div>
      </div>

      <!-- Cart Footer -->
      <div class="cart-footer">
        <div class="cart-summary">
          <span class="cs-label">Items</span>
          <span class="cs-value" id="cartCount">0</span>
        </div>
        <div class="cart-summary">
          <span class="cs-label">Stations</span>
          <span class="cs-value" id="cartStations">0</span>
        </div>
        <button class="push-btn" id="pushBtn" onclick="pushOrder()" disabled>Push Order</button>
        <div class="push-status" id="pushStatus"></div>
      </div>

      <!-- Recent Pushes -->
      <div class="recent-section" id="recentSection" style="display:none;">
        <div class="recent-title">Recent Pushes</div>
        <div id="recentList"></div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2>Push UI Settings</h2>
      <p>Enter your Dashboard API key to connect.</p>
      <label for="apiKeyInput">API Key</label>
      <input type="text" id="apiKeyInput" placeholder="Enter DASHBOARD_API_KEY" autocomplete="off" spellcheck="false">
      <button class="btn-save" onclick="saveSettings()">Connect</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ── State ────────────────────────────────────────────────────────
    const SETTINGS_KEY = 'assembly_kds_settings'; // shared with KDS page
    let apiKey = '';
    let connected = false;
    let allProducts = [];
    let cart = []; // [{odooId, name, price, catId, station, stationAbbr, quantity}]
    let source = ''; // 'swiggy' or 'zomato'
    let currentFilter = 'all';
    let recentPushes = []; // [{source, orderId, time, items}]

    const $ = id => document.getElementById(id);

    // ── Settings (shared with Assembly KDS) ──────────────────────────
    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (raw) {
          const s = JSON.parse(raw);
          if (s.api_key) apiKey = s.api_key;
        }
      } catch (e) {}
      // Load recent pushes
      try {
        const rp = localStorage.getItem('assembly_recent_pushes');
        if (rp) recentPushes = JSON.parse(rp);
      } catch (e) {}
    }

    function saveSettings() {
      const val = $('apiKeyInput').value.trim();
      if (!val) return;
      apiKey = val;
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({ api_key: apiKey }));
      $('settingsModal').classList.remove('open');
      init();
    }

    function openSettings() {
      $('apiKeyInput').value = apiKey;
      $('settingsModal').classList.add('open');
      $('apiKeyInput').focus();
    }

    // ── Health ───────────────────────────────────────────────────────
    function setHealth(ok) {
      connected = ok;
      $('healthDot').className = 'health-dot ' + (ok ? 'ok' : 'err');
      $('healthText').textContent = ok ? 'Connected' : 'Disconnected';
    }

    // ── Toast ────────────────────────────────────────────────────────
    function showToast(msg, type) {
      const t = $('toast');
      t.textContent = msg;
      t.className = 'toast ' + type + ' show';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.classList.remove('show'); }, 2500);
    }

    // ── Source Picker ────────────────────────────────────────────────
    function setSource(s) {
      source = s;
      $('srcSwiggy').className = 'source-btn' + (s === 'swiggy' ? ' selected-swiggy' : '');
      $('srcZomato').className = 'source-btn' + (s === 'zomato' ? ' selected-zomato' : '');
      updatePushBtn();
    }

    // ── Product Loading ─────────────────────────────────────────────
    async function loadProducts() {
      if (!apiKey) return;
      $('productGrid').innerHTML = '<div class="product-loading">Loading products...</div>';
      try {
        const res = await fetch('/api/assembly?action=products&key=' + encodeURIComponent(apiKey));
        if (!res.ok) {
          if (res.status === 401) {
            setHealth(false);
            $('healthText').textContent = 'Invalid Key';
            $('productGrid').innerHTML = '<div class="product-empty">Invalid API key</div>';
            return;
          }
          throw new Error('HTTP ' + res.status);
        }
        const data = await res.json();
        if (data.ok && data.products) {
          allProducts = data.products;
          setHealth(true);
          renderProducts();
        }
      } catch (e) {
        setHealth(false);
        $('productGrid').innerHTML = '<div class="product-empty">Failed to load products</div>';
      }
    }

    // ── Filter ──────────────────────────────────────────────────────
    function setFilter(station, btn) {
      currentFilter = station;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProducts();
    }

    // ── Product Rendering ───────────────────────────────────────────
    function renderProducts() {
      const query = ($('searchInput').value || '').toLowerCase().trim();
      let filtered = allProducts;

      if (currentFilter !== 'all') {
        filtered = filtered.filter(p => p.stationAbbr === currentFilter);
      }
      if (query) {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(query));
      }

      if (filtered.length === 0) {
        $('productGrid').innerHTML = '<div class="product-empty">' +
          (allProducts.length === 0 ? 'No products loaded' : 'No products match') + '</div>';
        return;
      }

      const cartMap = {};
      cart.forEach(c => { cartMap[c.odooId] = c.quantity; });

      let html = '';
      for (const p of filtered) {
        const inCart = cartMap[p.odooId] || 0;
        html += '<div class="product-card' + (inCart ? ' in-cart' : '') + '" onclick="addToCart(' + p.odooId + ')">'
          + (inCart ? '<div class="pc-qty-badge">' + inCart + '</div>' : '')
          + '<div class="pc-name">' + escHtml(p.name) + '</div>'
          + '<div class="pc-bottom">'
          +   '<span class="pc-price">&#8377;' + (p.price || 0) + '</span>'
          +   '<span class="pc-station st-' + escAttr(p.stationAbbr) + '">' + escHtml(p.stationAbbr) + '</span>'
          + '</div>'
          + '</div>';
      }
      $('productGrid').innerHTML = html;
    }

    // ── Cart Operations ─────────────────────────────────────────────
    function addToCart(odooId) {
      const existing = cart.find(c => c.odooId === odooId);
      if (existing) {
        existing.quantity++;
      } else {
        const product = allProducts.find(p => p.odooId === odooId);
        if (!product) return;
        cart.push({ ...product, quantity: 1 });
      }
      renderCart();
      renderProducts(); // update badges
      updatePushBtn();
    }

    function updateQty(odooId, delta) {
      const item = cart.find(c => c.odooId === odooId);
      if (!item) return;
      item.quantity += delta;
      if (item.quantity <= 0) {
        cart = cart.filter(c => c.odooId !== odooId);
      }
      renderCart();
      renderProducts();
      updatePushBtn();
    }

    function removeFromCart(odooId) {
      cart = cart.filter(c => c.odooId !== odooId);
      renderCart();
      renderProducts();
      updatePushBtn();
    }

    function clearCart() {
      cart = [];
      source = '';
      $('orderIdInput').value = '';
      $('customerInput').value = '';
      $('srcSwiggy').className = 'source-btn';
      $('srcZomato').className = 'source-btn';
      renderCart();
      renderProducts();
      updatePushBtn();
      $('pushStatus').textContent = '';
    }

    function renderCart() {
      if (cart.length === 0) {
        $('cartItems').innerHTML = '<div class="cart-empty" id="cartEmpty">Tap products to add them</div>';
        $('cartCount').textContent = '0';
        $('cartStations').textContent = '0';
        return;
      }

      const totalQty = cart.reduce((s, c) => s + c.quantity, 0);
      const stations = new Set(cart.map(c => c.stationAbbr));

      $('cartCount').textContent = totalQty;
      $('cartStations').textContent = stations.size;

      let html = '';
      for (const item of cart) {
        html += '<div class="cart-item">'
          + '<div class="ci-info">'
          +   '<div class="ci-name">' + escHtml(item.name) + '</div>'
          +   '<div class="ci-station">' + escHtml(item.station) + '</div>'
          + '</div>'
          + '<div class="ci-qty">'
          +   '<button onclick="updateQty(' + item.odooId + ', -1)">-</button>'
          +   '<span>' + item.quantity + '</span>'
          +   '<button onclick="updateQty(' + item.odooId + ', 1)">+</button>'
          + '</div>'
          + '<button class="ci-remove" onclick="removeFromCart(' + item.odooId + ')" title="Remove">&#10005;</button>'
          + '</div>';
      }
      $('cartItems').innerHTML = html;
    }

    function updatePushBtn() {
      const canPush = source && cart.length > 0;
      $('pushBtn').disabled = !canPush;
    }

    // ── Push Order ──────────────────────────────────────────────────
    async function pushOrder() {
      if (!source || cart.length === 0) return;

      const btn = $('pushBtn');
      const status = $('pushStatus');
      btn.disabled = true;
      btn.textContent = 'Pushing...';
      status.textContent = '';
      status.className = 'push-status';

      const orderId = $('orderIdInput').value.trim();
      const customer = $('customerInput').value.trim();

      const items = cart.map(c => ({
        odoo_product_id: c.odooId,
        name: c.name,
        quantity: c.quantity,
        price: c.price,
        category_id: c.catId,
      }));

      try {
        const res = await fetch('/api/assembly?action=push&key=' + encodeURIComponent(apiKey), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            source,
            source_order_id: orderId || undefined,
            customer_name: customer || undefined,
            items,
          }),
        });

        const data = await res.json();

        if (res.status === 409) {
          status.textContent = 'Duplicate — already pushed';
          status.className = 'push-status err';
          btn.disabled = false;
          btn.textContent = 'Push Order';
          showToast('Duplicate order!', 'err');
          return;
        }

        if (!res.ok) throw new Error(data.error || 'Push failed');

        // Success
        status.textContent = 'Pushed! ' + (data.odoo_order?.name || '#' + data.assembly_order_id);
        status.className = 'push-status ok';
        showToast('Order pushed successfully', 'ok');

        // Add to recent
        recentPushes.unshift({
          source,
          orderId: orderId || data.odoo_order?.name || '#' + data.assembly_order_id,
          time: new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }),
          items: cart.reduce((s, c) => s + c.quantity, 0),
        });
        if (recentPushes.length > 10) recentPushes = recentPushes.slice(0, 10);
        localStorage.setItem('assembly_recent_pushes', JSON.stringify(recentPushes));
        renderRecent();

        // Clear cart for next order
        cart = [];
        $('orderIdInput').value = '';
        $('customerInput').value = '';
        renderCart();
        renderProducts();
        updatePushBtn();

        // Reset button after a moment
        setTimeout(() => {
          btn.textContent = 'Push Order';
        }, 1500);

      } catch (e) {
        status.textContent = e.message;
        status.className = 'push-status err';
        btn.disabled = false;
        btn.textContent = 'Push Order';
        showToast('Push failed: ' + e.message, 'err');
      }
    }

    // ── Recent Pushes ───────────────────────────────────────────────
    function renderRecent() {
      if (recentPushes.length === 0) {
        $('recentSection').style.display = 'none';
        return;
      }
      $('recentSection').style.display = 'block';

      let html = '';
      for (const r of recentPushes) {
        const cls = r.source === 'swiggy' ? 'ri-swiggy' : 'ri-zomato';
        html += '<div class="recent-item">'
          + '<span class="ri-source ' + cls + '">' + escHtml(r.source.toUpperCase()) + '</span>'
          + '<span class="ri-id">' + escHtml(r.orderId) + '</span>'
          + '<span style="color:var(--muted);font-size:11px;">' + r.items + ' items</span>'
          + '<span class="ri-time">' + escHtml(r.time) + '</span>'
          + '</div>';
      }
      $('recentList').innerHTML = html;
    }

    // ── Utilities ───────────────────────────────────────────────────
    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function escAttr(str) {
      return String(str).replace(/['"&<>\\]/g, c => ({
        "'": '&#39;', '"': '&quot;', '&': '&amp;', '<': '&lt;', '>': '&gt;', '\\': '&#92;'
      }[c] || c));
    }

    // ── Search debounce ─────────────────────────────────────────────
    let searchTimer;
    $('searchInput').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(renderProducts, 200);
    });

    // ── Keyboard shortcuts ──────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        $('settingsModal').classList.remove('open');
      }
    });

    $('apiKeyInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveSettings();
    });

    $('settingsModal').addEventListener('click', e => {
      if (e.target === $('settingsModal')) $('settingsModal').classList.remove('open');
    });

    // Focus search on / key
    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        $('searchInput').focus();
      }
    });

    // ── Init ────────────────────────────────────────────────────────
    function init() {
      loadProducts();
      renderRecent();
    }

    loadSettings();
    if (!apiKey) {
      openSettings();
    } else {
      init();
    }
  </script>
</body>
</html>
