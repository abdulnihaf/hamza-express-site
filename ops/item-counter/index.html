<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HE Item Counter</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f1a; --bg2: #111827; --card: #1a2234; --border: #2d3a4f;
      --text: #f1f5f9; --text2: #94a3b8; --muted: #64748b;
      --orange: #f97316; --yellow: #f59e0b; --green: #10b981; --red: #ef4444;
      --blue: #3b82f6; --purple: #8b5cf6; --cyan: #06b6d4; --pink: #ec4899;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-tap-highlight-color: transparent; }

    .container { max-width: 480px; margin: 0 auto; padding: 16px; }

    /* Header */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .header h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .header h1 .icon { font-size: 22px; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
    .status .dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot.live { background: var(--green); animation: pulse 2s infinite; }
    .dot.loading { background: var(--yellow); }
    .dot.error { background: var(--red); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    /* Period */
    .period { font-size: 11px; color: var(--muted); text-align: center; margin-bottom: 10px; padding: 6px 10px; background: var(--bg2); border-radius: 6px; }

    /* Quick ranges */
    .ranges { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .range-btn { flex: 1; min-width: 60px; padding: 7px 4px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg2); color: var(--text2); font-size: 12px; font-weight: 500; text-align: center; cursor: pointer; transition: all .15s; }
    .range-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); }

    /* Date picker */
    .date-row { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
    .date-row input { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; color: var(--text); font-size: 13px; font-family: 'JetBrains Mono', monospace; }
    .date-row input:focus { outline: none; border-color: var(--orange); }

    /* Hero stat */
    .hero { margin-bottom: 16px; }
    .hero-card { background: var(--card); border: 1px solid rgba(249,115,22,.3); border-radius: 12px; padding: 18px; text-align: center; }
    .hero-card .h-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .hero-card .h-value { font-family: 'JetBrains Mono', monospace; font-size: 42px; font-weight: 800; line-height: 1.1; color: var(--orange); }
    .hero-card .h-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

    /* Category sections */
    .cat-section { margin-bottom: 10px; }
    .cat-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: all .15s; user-select: none; }
    .cat-header:active { transform: scale(.98); }
    .cat-header.open { border-radius: 10px 10px 0 0; border-bottom-color: transparent; }
    .cat-left { display: flex; align-items: center; gap: 8px; }
    .cat-dot { width: 10px; height: 10px; border-radius: 3px; }
    .cat-name { font-size: 14px; font-weight: 600; }
    .cat-right { display: flex; align-items: center; gap: 10px; }
    .cat-count { font-size: 12px; color: var(--text2); }
    .cat-qty { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; }
    .cat-chevron { color: var(--muted); font-size: 14px; transition: transform .2s; }
    .cat-header.open .cat-chevron { transform: rotate(180deg); }

    .cat-items { display: none; border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; overflow: hidden; }
    .cat-items.open { display: block; }

    /* Item rows */
    .item-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-bottom: 1px solid var(--border); background: var(--bg2); }
    .item-row:last-child { border-bottom: none; }
    .item-name { font-size: 14px; font-weight: 500; flex: 1; padding-right: 10px; }
    .item-qty { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; min-width: 40px; text-align: right; }

    /* Grouped item (parent) — has sub-rows beneath */
    .item-group { border-bottom: 1px solid var(--border); }
    .item-group:last-child { border-bottom: none; }
    .group-parent { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; background: var(--bg2); }
    .group-parent .item-name { font-weight: 600; }
    .group-parent .item-qty { font-size: 22px; font-weight: 700; }
    .sub-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 14px 6px 32px; background: var(--bg); border-top: 1px solid rgba(45,58,79,.5); }
    .sub-row .sub-name { font-size: 12px; color: var(--text2); flex: 1; }
    .sub-row .sub-qty { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; color: var(--text2); min-width: 30px; text-align: right; }

    /* Zero state */
    .zero { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }

    /* Footer */
    .footer { text-align: center; font-size: 10px; color: var(--muted); padding: 12px 0 20px; }

    /* Animate qty changes */
    .qty-bump { animation: bump .25s ease; }
    @keyframes bump { 0% { transform: scale(1); } 50% { transform: scale(1.12); } 100% { transform: scale(1); } }

    /* Category colors */
    .cat-indian .cat-dot { background: var(--orange); }
    .cat-tandoor .cat-dot { background: var(--red); }
    .cat-chinese .cat-dot { background: var(--yellow); }
    .cat-biryani .cat-dot { background: var(--green); }
    .cat-fried-chicken .cat-dot { background: var(--cyan); }
    .cat-bane-marie .cat-dot { background: var(--blue); }
    .cat-other .cat-dot { background: var(--purple); }

    .cat-indian .cat-qty { color: var(--orange); }
    .cat-tandoor .cat-qty { color: var(--red); }
    .cat-chinese .cat-qty { color: var(--yellow); }
    .cat-biryani .cat-qty { color: var(--green); }
    .cat-fried-chicken .cat-qty { color: var(--cyan); }
    .cat-bane-marie .cat-qty { color: var(--blue); }
    .cat-other .cat-qty { color: var(--purple); }

    .cat-indian .item-qty { color: var(--orange); }
    .cat-tandoor .item-qty { color: var(--red); }
    .cat-chinese .item-qty { color: var(--yellow); }
    .cat-biryani .item-qty { color: var(--green); }
    .cat-fried-chicken .item-qty { color: var(--cyan); }
    .cat-bane-marie .item-qty { color: var(--blue); }
    .cat-other .item-qty { color: var(--purple); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><span class="icon">🍛</span> Item Counter</h1>
      <div class="status"><div class="dot" id="statusDot"></div><span id="statusText">Loading</span></div>
    </div>
    <div class="period" id="period">Loading...</div>
    <div class="ranges">
      <div class="range-btn active" onclick="setRange('today',this)">Today</div>
      <div class="range-btn" onclick="setRange('yesterday',this)">Yesterday</div>
      <div class="range-btn" onclick="setRange('7d',this)">7 Days</div>
      <div class="range-btn" onclick="setRange('30d',this)">30 Days</div>
    </div>
    <div class="date-row"><input type="date" id="datePick" onchange="pickDate(this.value)"></div>
    <div class="hero">
      <div class="hero-card">
        <div class="h-label">Total Items Sold</div>
        <div class="h-value" id="totalQty">—</div>
        <div class="h-sub" id="totalOrders">0 orders</div>
      </div>
    </div>
    <div id="categoriesContainer"></div>
    <div class="zero" id="zeroState" style="display:none">No items sold in this period</div>
    <div class="footer" id="footer">Last updated: —</div>
  </div>

  <script>
    const API = '/api/sales-insights';
    const $ = id => document.getElementById(id);

    const CAT_ORDER = ['Indian', 'Biryani', 'Tandoor', 'Chinese', 'Fried Chicken', 'Bane Marie'];
    const CAT_CLASS = {
      'Indian': 'cat-indian', 'Tandoor': 'cat-tandoor', 'Chinese': 'cat-chinese',
      'Biryani': 'cat-biryani', 'Fried Chicken': 'cat-fried-chicken', 'Bane Marie': 'cat-bane-marie',
    };

    let currentFrom = null, currentTo = null, isLive = true, refreshTimer = null;
    let prevQtyMap = {};
    let openCategories = new Set();

    // ── Portion grouping logic ────────────────────────────────────────────────
    // Detects items that are the same SKU in different sizes/portions
    // Patterns: "Name — Size", "Name (Size)", "Name Size"
    function groupProducts(products) {
      const groups = [];
      const used = new Set();

      // Build a list sorted by qty desc
      const sorted = [...products].sort((a, b) => b.qty - a.qty);

      // Try to group items that share a base name
      for (let i = 0; i < sorted.length; i++) {
        if (used.has(sorted[i].id)) continue;
        const p = sorted[i];
        const base = getBaseName(p.name);

        // Find siblings: same base name, different sizes
        const siblings = [];
        if (base) {
          for (let j = 0; j < sorted.length; j++) {
            if (i === j || used.has(sorted[j].id)) continue;
            const otherBase = getBaseName(sorted[j].name);
            if (otherBase && otherBase === base) {
              siblings.push(sorted[j]);
            }
          }
        }

        if (siblings.length > 0) {
          // This is a group: parent + siblings
          const all = [p, ...siblings];
          const totalQty = all.reduce((s, x) => s + x.qty, 0);
          all.forEach(x => used.add(x.id));

          // Sort sub-items by qty desc
          all.sort((a, b) => b.qty - a.qty);
          groups.push({
            type: 'group',
            name: base,
            qty: totalQty,
            items: all.map(x => ({ name: getSizePart(x.name), qty: x.qty, id: x.id }))
          });
        } else {
          used.add(p.id);
          groups.push({ type: 'single', name: p.name, qty: p.qty, id: p.id });
        }
      }

      // Sort groups by qty desc
      groups.sort((a, b) => b.qty - a.qty);
      return groups;
    }

    // Extract base name from product name (strip portion/size suffix)
    function getBaseName(name) {
      // Pattern 1: "Name — Size" (em dash)
      if (name.includes(' \u2014 ')) return name.split(' \u2014 ')[0].trim();
      // Pattern 2: "Name (Size)" at end
      const parenMatch = name.match(/^(.+?)\s*\([^)]+\)\s*$/);
      if (parenMatch) return parenMatch[1].trim();
      // Pattern 3: "Name 500ml", "Name 1 Liter" — known size suffixes
      const sizeMatch = name.match(/^(.+?)\s+(\d+\s*(ml|liter|litre|gm|grams|kg|g|pcs?|pc|pieces?))\s*$/i);
      if (sizeMatch) return sizeMatch[1].trim();
      // Pattern 4: "Name - Pack of X"
      const packMatch = name.match(/^(.+?)\s*-\s*(Pack of \d+)/i);
      if (packMatch) return packMatch[1].trim();
      return null; // No size detected — standalone item
    }

    // Extract the size/portion part for sub-row display
    function getSizePart(name) {
      if (name.includes(' \u2014 ')) return name.split(' \u2014 ').slice(1).join(' \u2014 ').trim();
      const parenMatch = name.match(/\(([^)]+)\)\s*$/);
      if (parenMatch) return parenMatch[1];
      const sizeMatch = name.match(/\s+(\d+\s*(ml|liter|litre|gm|grams|kg|g|pcs?|pc|pieces?))\s*$/i);
      if (sizeMatch) return sizeMatch[1];
      const packMatch = name.match(/-\s*(Pack of \d+)/i);
      if (packMatch) return packMatch[1];
      return name;
    }

    // ── Date helpers ──────────────────────────────────────────────────────────
    function getTodayStart() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }
    function toISOLocal(d) {
      const pad = n => n.toString().padStart(2, '0');
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }
    function dateStr(d) {
      const pad = n => n.toString().padStart(2, '0');
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    }
    function fmtDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' }) + ', ' +
        d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    // ── Ranges ────────────────────────────────────────────────────────────────
    function setRange(range, el) {
      document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      if (el) el.classList.add('active');
      $('datePick').value = '';
      const today = getTodayStart();
      switch (range) {
        case 'today': currentFrom = today; currentTo = null; isLive = true; break;
        case 'yesterday': currentFrom = new Date(today.getTime() - 86400000); currentTo = today; isLive = false; break;
        case '7d': currentFrom = new Date(today.getTime() - 7 * 86400000); currentTo = null; isLive = true; break;
        case '30d': currentFrom = new Date(today.getTime() - 30 * 86400000); currentTo = null; isLive = true; break;
      }
      fetchData(); setupRefresh();
    }

    function pickDate(val) {
      if (!val) return;
      document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      const parts = val.split('-');
      const day = new Date(+parts[0], +parts[1] - 1, +parts[2]);
      currentFrom = day; currentTo = new Date(day.getTime() + 86400000); isLive = false;
      fetchData(); setupRefresh();
    }

    function setupRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      if (isLive) refreshTimer = setInterval(fetchData, 30000);
    }

    // ── Fetch & Render ────────────────────────────────────────────────────────
    async function fetchData() {
      setStatus('loading');
      try {
        let url = API + '?from=' + encodeURIComponent(toISOLocal(currentFrom));
        if (currentTo) url += '&to=' + encodeURIComponent(toISOLocal(currentTo));
        const res = await fetch(url);
        const json = await res.json();
        if (!json.success) throw new Error(json.error || 'API error');
        render(json);
        setStatus(isLive ? 'live' : 'ok');
      } catch (e) {
        setStatus('error');
        console.error('Fetch error:', e);
      }
    }

    function setStatus(state) {
      const dot = $('statusDot');
      const txt = $('statusText');
      dot.className = 'dot';
      if (state === 'live') { dot.classList.add('live'); txt.textContent = 'Live'; }
      else if (state === 'loading') { dot.classList.add('loading'); txt.textContent = 'Loading'; }
      else if (state === 'ok') { txt.textContent = 'Updated'; dot.style.background = 'var(--green)'; }
      else { dot.classList.add('error'); txt.textContent = 'Error'; }
    }

    function render(json) {
      const d = json.data;
      const q = json.query;

      $('period').textContent = fmtDate(q.from) + ' \u2192 ' + (isLive ? 'Now' : fmtDate(q.to));
      animateValue('totalQty', d.summary.totalQty);
      $('totalOrders').textContent = d.summary.totalOrders + ' orders';

      // Build category → products map
      const catProducts = {};
      const catTotals = {};
      (d.products || []).forEach(p => {
        const cat = p.category || 'Other';
        if (!catProducts[cat]) { catProducts[cat] = []; catTotals[cat] = 0; }
        catProducts[cat].push(p);
        catTotals[cat] += p.qty;
      });

      const cats = Object.keys(catProducts).sort((a, b) => {
        const ia = CAT_ORDER.indexOf(a), ib = CAT_ORDER.indexOf(b);
        const sa = ia >= 0 ? ia : 100, sb = ib >= 0 ? ib : 100;
        if (sa !== sb) return sa - sb;
        return (catTotals[b] || 0) - (catTotals[a] || 0);
      });

      if (cats.length === 0) {
        $('categoriesContainer').innerHTML = '';
        $('zeroState').style.display = '';
        updateFooter(); return;
      }
      $('zeroState').style.display = 'none';

      const newQtyMap = {};
      let html = '';

      cats.forEach(cat => {
        const cls = CAT_CLASS[cat] || 'cat-other';
        const isOpen = openCategories.has(cat);
        const totalQty = catTotals[cat];

        // Group products by portion size
        const grouped = groupProducts(catProducts[cat]);

        html += '<div class="cat-section ' + cls + '">';
        html += '<div class="cat-header' + (isOpen ? ' open' : '') + '" onclick="toggleCat(this,\'' + esc(cat) + '\')">';
        html += '<div class="cat-left"><div class="cat-dot"></div><span class="cat-name">' + cat + '</span></div>';
        html += '<div class="cat-right">';
        html += '<span class="cat-qty">' + totalQty + '</span>';
        html += '<span class="cat-chevron">\u25BE</span></div>';
        html += '</div>';
        html += '<div class="cat-items' + (isOpen ? ' open' : '') + '">';

        grouped.forEach(g => {
          if (g.type === 'single') {
            // Simple item — single row
            const prev = prevQtyMap[g.id] || 0;
            const bump = prev > 0 && g.qty !== prev ? ' qty-bump' : '';
            newQtyMap[g.id] = g.qty;
            html += '<div class="item-row">';
            html += '<span class="item-name">' + g.name + '</span>';
            html += '<span class="item-qty' + bump + '">' + g.qty + '</span>';
            html += '</div>';
          } else {
            // Grouped item — parent + sub-rows
            html += '<div class="item-group">';
            html += '<div class="group-parent">';
            html += '<span class="item-name">' + g.name + '</span>';
            html += '<span class="item-qty">' + g.qty + '</span>';
            html += '</div>';
            g.items.forEach(sub => {
              const prev = prevQtyMap[sub.id] || 0;
              const bump = prev > 0 && sub.qty !== prev ? ' qty-bump' : '';
              newQtyMap[sub.id] = sub.qty;
              html += '<div class="sub-row">';
              html += '<span class="sub-name">' + sub.name + '</span>';
              html += '<span class="sub-qty' + bump + '">' + sub.qty + '</span>';
              html += '</div>';
            });
            html += '</div>';
          }
        });

        html += '</div></div>';
      });

      $('categoriesContainer').innerHTML = html;
      prevQtyMap = newQtyMap;
      updateFooter();
    }

    function animateValue(id, newVal) {
      const el = $(id);
      const old = parseInt(el.textContent) || 0;
      if (newVal !== old && old > 0) el.classList.add('qty-bump');
      el.textContent = newVal;
      setTimeout(() => el.classList.remove('qty-bump'), 300);
    }

    function toggleCat(el, cat) {
      const items = el.nextElementSibling;
      const isOpen = el.classList.toggle('open');
      items.classList.toggle('open');
      if (isOpen) openCategories.add(cat); else openCategories.delete(cat);
    }

    function updateFooter() {
      const now = new Date();
      $('footer').textContent = 'Updated ' + now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }) + (isLive ? ' \u00b7 auto-refresh 30s' : '');
    }

    function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

    // ── Init ──────────────────────────────────────────────────────────────────
    (function init() {
      currentFrom = getTodayStart();
      currentTo = null; isLive = true;
      $('datePick').value = dateStr(new Date());
      openCategories.add('Indian');
      fetchData(); setupRefresh();
    })();
  </script>
</body>
</html>
